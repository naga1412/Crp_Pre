<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo}=React;

// ─── CONSTANTS ────────────────────────────────────────────────────────────────
const BINANCE_REST='https://api.binance.com/api/v3';
const BINANCE_WS='wss://stream.binance.com:9443/ws';
const TIMEFRAMES=['1m','5m','15m','1h','4h','1d','1w'];
const TF_SECS={'1m':60,'5m':300,'15m':900,'1h':3600,'4h':14400,'1d':86400,'1w':604800};
const BINANCE_TF={'1m':'1m','5m':'5m','15m':'15m','1h':'1h','4h':'4h','1d':'1d','1w':'1w'};
const YF_TF={'1m':['1m','1d'],'5m':['5m','5d'],'15m':['15m','60d'],'1h':['1h','1y'],'4h':['1h','2y'],'1d':['1d','5y'],'1w':['1wk','max']};

// ─── TA ENGINE (pure JS) ──────────────────────────────────────────────────────
function calcEMA(arr,p){
  if(!arr||arr.length<p) return arr.map(()=>arr[arr.length-1]||0);
  const k=2/(p+1),r=[];
  let s=0; for(let i=0;i<p;i++){s+=arr[i];r.push(null);} r[p-1]=s/p;
  for(let i=p;i<arr.length;i++) r.push(arr[i]*k+r[i-1]*(1-k));
  return r;
}
function calcRSI(c,p=14){
  if(c.length<=p) return c.map(()=>50);
  let g=0,l=0;
  for(let i=1;i<=p;i++){const d=c[i]-c[i-1];if(d>=0)g+=d;else l-=d;}
  let ag=g/p,al=l/p;
  const r=new Array(p).fill(50);
  r.push(al<1e-9?100:100-100/(1+ag/al));
  for(let i=p+1;i<c.length;i++){
    const d=c[i]-c[i-1];
    ag=((ag*(p-1))+(d>0?d:0))/p;
    al=((al*(p-1))+(d<0?-d:0))/p;
    r.push(al<1e-9?100:100-100/(1+ag/al));
  }
  return r;
}
function calcATR(h,l,c,p=14){
  const tr=[h[0]-l[0]];
  for(let i=1;i<h.length;i++) tr.push(Math.max(h[i]-l[i],Math.abs(h[i]-c[i-1]),Math.abs(l[i]-c[i-1])));
  let a=tr.slice(0,p).reduce((s,v)=>s+v,0)/p;
  const r=new Array(p-1).fill(null); r.push(a);
  for(let i=p;i<tr.length;i++){a=(a*(p-1)+tr[i])/p;r.push(a);}
  return r;
}
function detectSwings(h,l,lb=5){
  const sh=[],sl=[];
  for(let i=lb;i<h.length-lb;i++){
    if(h.slice(i-lb,i).every(x=>x<h[i])&&h.slice(i+1,i+lb+1).every(x=>x<h[i])) sh.push({idx:i,price:h[i]});
    if(l.slice(i-lb,i).every(x=>x>l[i])&&l.slice(i+1,i+lb+1).every(x=>x>l[i])) sl.push({idx:i,price:l[i]});
  }
  return{sh:sh.slice(-5),sl:sl.slice(-5)};
}
function detectFVG(candles){
  const r=[];
  for(let i=2;i<candles.length;i++){
    if(candles[i].low>candles[i-2].high) r.push({idx:i-1,type:'bull'});
    if(candles[i].high<candles[i-2].low) r.push({idx:i-1,type:'bear'});
  }
  return r.slice(-5);
}
function detectBOS(candles,sw){
  const r=[];
  for(let i=1;i<candles.length;i++){
    for(const s of sw.sh) if(i>s.idx&&candles[i].close>s.price&&candles[i-1].close<=s.price) r.push({idx:i,type:'bull'});
    for(const s of sw.sl) if(i>s.idx&&candles[i].close<s.price&&candles[i-1].close>=s.price) r.push({idx:i,type:'bear'});
  }
  return r.slice(-5);
}
function candleType(c){
  const body=Math.abs(c.close-c.open),range=c.high-c.low||1;
  const uw=c.high-Math.max(c.open,c.close),lw=Math.min(c.open,c.close)-c.low;
  if(body/range>0.75) return c.close>c.open?'Bullish Marubozu':'Bearish Marubozu';
  if(body/range<0.1) return 'Doji';
  if(lw>body*2&&uw<body) return 'Hammer / Bullish Reversal';
  if(uw>body*2&&lw<body) return 'Shooting Star / Bearish';
  return c.close>c.open?'Bullish Candle':'Bearish Candle';
}
// Deterministic pseudo-random: same seed → same sequence every time
function seededRand(seed,i){
  const x=Math.sin(seed*9301+(i+1)*49297+233280)*10000;
  return x-Math.floor(x); // 0..1
}
// Future candles: direction locked to signal, deterministic seed = no random flips
function futureCandlesSim(candles,signal,atr,count){
  const last=candles[candles.length-1];
  // Seed from rounded price so candles only change when price meaningfully moves
  const seed=Math.round(last.close/atr);
  const dir=signal==='LONG'?1:-1;
  let p=last.close;
  return Array.from({length:count},(_,i)=>{
    const r=seededRand(seed,i);
    // Consistent move size: trend momentum decays slightly over projection
    const move=dir*atr*(0.30+r*0.20)*(1-i*0.02);
    const o=p,c=p+move,wick=atr*(0.10+seededRand(seed+1,i)*0.10);
    p=c;
    return{open:o,high:Math.max(o,c)+wick,low:Math.min(o,c)-wick,close:c};
  });
}
// ─── VOLUME PROFILE ENGINE ────────────────────────────────────────────────────
function calcVolumeProfile(candles,numBuckets=100){
  if(!candles||candles.length<10)return null;
  const maxP=Math.max(...candles.map(c=>c.high));
  const minP=Math.min(...candles.map(c=>c.low));
  const rng=maxP-minP;if(rng<=0)return null;
  const bSz=rng/numBuckets;
  const vols=new Array(numBuckets).fill(0);
  for(const c of candles){
    const v=c.volume||0;if(!v)continue;
    const cRng=c.high-c.low||bSz;
    const iLo=Math.max(0,Math.floor((c.low-minP)/bSz));
    const iHi=Math.min(numBuckets-1,Math.ceil((c.high-minP)/bSz));
    for(let i=iLo;i<=iHi;i++){
      const bLo=minP+i*bSz,bHi=bLo+bSz;
      const ov=Math.min(c.high,bHi)-Math.max(c.low,bLo);
      if(ov>0)vols[i]+=v*(ov/cRng);
    }
  }
  let pocIdx=0;
  for(let i=1;i<numBuckets;i++)if(vols[i]>vols[pocIdx])pocIdx=i;
  const poc=minP+(pocIdx+0.5)*bSz;
  const total=vols.reduce((s,v)=>s+v,0);
  const target=total*0.70;
  const inVAarr=new Array(numBuckets).fill(false);
  inVAarr[pocIdx]=true;
  let vaVol=vols[pocIdx],lo=pocIdx-1,hi=pocIdx+1;
  while(vaVol<target&&(lo>=0||hi<numBuckets)){
    const lv=lo>=0?vols[lo]:-1,rv=hi<numBuckets?vols[hi]:-1;
    if(lv>=rv&&lo>=0){inVAarr[lo]=true;vaVol+=vols[lo];lo--;}
    else if(hi<numBuckets){inVAarr[hi]=true;vaVol+=vols[hi];hi++;}
    else break;
  }
  let vahIdx=pocIdx,valIdx=pocIdx;
  for(let i=0;i<numBuckets;i++)if(inVAarr[i]){if(i>vahIdx)vahIdx=i;if(i<valIdx)valIdx=i;}
  const vah=minP+(vahIdx+1)*bSz,val=minP+valIdx*bSz;
  const avg=total/numBuckets;
  const hvn=[],lvn=[];
  for(let i=0;i<numBuckets;i++){
    const p=minP+(i+0.5)*bSz;
    if(vols[i]>avg*2.0)hvn.push(p);
    else if(vols[i]>0&&vols[i]<avg*0.3)lvn.push(p);
  }
  return{poc,vah,val,hvn,lvn,bSz,vols,minP,pocIdx,numBuckets};
}
function vpPOCSignal(candles,poc){
  if(!poc||candles.length<10)return null;
  const last=candles[candles.length-1],prev=candles[candles.length-2];
  if(!prev)return null;
  const tol=poc*0.003;
  if(Math.abs(last.high-poc)<tol&&last.close<poc-tol)return'rejection';
  if(Math.abs(last.low-poc)<tol&&last.close>poc+tol)return'rejection';
  const older=candles.slice(-20,-2);if(older.length<5)return null;
  const was5=older.slice(-5);
  if(was5.every(c=>c.close<poc)&&last.close>poc&&last.low<=poc+tol*2)return'continuation';
  if(was5.every(c=>c.close>poc)&&last.close<poc&&last.high>=poc-tol*2)return'continuation';
  return null;
}
function vpHVNOBConf(hvn,sw){
  const r=[];if(!hvn?.length||!sw)return r;
  for(const h of hvn){
    for(const s of sw.sh)if(Math.abs(h-s.price)/s.price<0.006)r.push({price:h,type:'bear',label:'HVN + Bearish OB'});
    for(const s of sw.sl)if(Math.abs(h-s.price)/s.price<0.006)r.push({price:h,type:'bull',label:'HVN + Bullish OB'});
  }
  return r.slice(0,3);
}
function vpLVNFVGConf(lvn,fvg,candles){
  const r=[];if(!lvn?.length||!fvg?.length)return r;
  for(const f of fvg){
    const c1=candles[f.idx-1],c3=candles[f.idx+1];if(!c1||!c3)continue;
    const mid=f.type==='bull'?(c1.high+c3.low)/2:(c1.low+c3.high)/2;
    for(const l of lvn)if(Math.abs(l-mid)/mid<0.01)r.push({price:l,type:f.type,label:`LVN+${f.type==='bull'?'Bull':'Bear'} FVG`});
  }
  return r.slice(0,3);
}

function generateSetup(candles,price){
  if(!candles||candles.length<55) return null;
  const C=candles.map(c=>c.close),H=candles.map(c=>c.high),L=candles.map(c=>c.low);
  const e9=calcEMA(C,9),e21=calcEMA(C,21),e50=calcEMA(C,50);
  const rsi=calcRSI(C,14),atrArr=calcATR(H,L,C,14);
  const le9=e9[e9.length-1]||price,le21=e21[e21.length-1]||price,le50=e50[e50.length-1]||price;
  const lRSI=rsi[rsi.length-1]||50,lATR=atrArr[atrArr.length-1]||price*0.01;
  const sw=detectSwings(H,L);
  const fvg=detectFVG(candles),bos=detectBOS(candles,sw);

  // ── Volume Profile (current TF) ──────────────────────────────────────────────
  const vp=calcVolumeProfile(candles);
  const pocAbove=!!vp&&price>vp.poc;
  const pocBelow=!!vp&&price<vp.poc;
  const inVA=!!vp&&price>=vp.val&&price<=vp.vah;
  const pocSig=vp?vpPOCSignal(candles,vp.poc):null;
  const hvnConf=vp?vpHVNOBConf(vp.hvn,sw):[];
  const lvnConf=vp?vpLVNFVGConf(vp.lvn,fvg,candles):[];
  // VP contrib: above POC outside VA=10pts bull, below POC outside VA=0pts, in VA or no VP=5pts neutral
  const vpContrib=vp?(pocAbove&&!inVA?10:pocBelow&&!inVA?0:5):5;

  // ── EMA alignment (primary — never overridden by RSI alone) ──────────────
  const bullBias=price>le9&&le9>le21&&le21>le50;  // full bull stack
  const bearBias=price<le9&&le9<le21&&le21<le50;  // full bear stack
  const htf=bullBias?'Bullish':bearBias?'Bearish':'Neutral';

  // ── Bull/bear score — includes VP contribution (10% weight) ───────────────
  const bullPct=Math.min(100,
    (price>le9?18:0)+(price>le21?18:0)+(price>le50?14:0)+
    (lRSI>50?14:0)+(bos.filter(b=>b.type==='bull').length>0?14:0)+
    (fvg.filter(f=>f.type==='bull').length>0?14:0)+
    vpContrib); // max: 18+18+14+14+14+14+10=102→100

  // ── Signal: HTF trend is the MASTER, RSI only fine-tunes at extremes ──────
  // In clear uptrend  → LONG unless RSI extremely overbought (>80)
  // In clear downtrend → SHORT unless RSI extremely oversold (<20) AND bullish BOS
  // Neutral           → follow most recent BOS, else score
  let signal;
  if(bullBias){
    signal = lRSI<80 ? 'LONG' : 'SHORT';
  } else if(bearBias){
    const hasBullBOS=bos.length>0&&bos[bos.length-1].type==='bull';
    signal = (lRSI<20&&hasBullBOS) ? 'LONG' : 'SHORT';
  } else {
    // Neutral zone: last BOS wins, VP POC tiebreak, then score
    const lastBOS=bos[bos.length-1];
    if(lastBOS?.type==='bull'&&lRSI<65) signal='LONG';
    else if(lastBOS?.type==='bear'&&lRSI>35) signal='SHORT';
    else if(pocAbove&&!inVA) signal='LONG';   // above POC outside VA = bullish
    else if(pocBelow&&!inVA) signal='SHORT';  // below POC outside VA = bearish
    else signal=bullPct>=50?'LONG':'SHORT';
  }

  const isL=signal==='LONG';
  const sl=isL?price-lATR*1.5:price+lATR*1.5;
  const tp1=isL?price+lATR*2:price-lATR*2;
  const tp2=isL?price+lATR*4:price-lATR*4;
  const d=Math.abs(price-sl)||1;
  const rh=H.slice(-30).sort((a,b)=>b-a),rl=L.slice(-30).sort((a,b)=>a-b);

  // ── Wyckoff phase ──────────────────────────────────────────────────────────
  let phase='Accumulation';
  if(bullBias&&lRSI>55) phase='Markup';
  else if(bearBias&&lRSI<45) phase='Markdown';
  else if(price>le50&&lRSI>65) phase='Distribution';

  const lc=candles[candles.length-1];
  // Next candle type from actual last candle, direction always matches signal
  const next_dir=isL?'Bullish':'Bearish';

  return{
    signal,htf_bias:htf,phase,bull_pct:bullPct,bear_pct:100-bullPct,
    rsi:lRSI.toFixed(1),atr:lATR.toFixed(price>100?2:6),
    ema9:le9,ema21:le21,ema50:le50,
    entry_zone:[isL?price*0.9998:price,isL?price:price*1.0002],
    stop_loss:sl,take_profit_1:tp1,take_profit_2:tp2,
    rr1:`1:${(Math.abs(tp1-price)/d).toFixed(1)}`,
    rr2:`1:${(Math.abs(tp2-price)/d).toFixed(1)}`,
    // Leverage: lower in high-volatility or extreme RSI
    leverage:lATR/price>0.025?2:lATR/price>0.015?3:lRSI<25||lRSI>75?3:lATR/price<0.008?10:5,
    fvg,bos,
    bsl:[rh[0],rh[1],rh[2]].filter(Boolean),
    ssl:[rl[0],rl[1],rl[2]].filter(Boolean),
    next_dir,                              // always matches signal
    next_type:candleType(lc),
    next_size:lATR/price>0.02?'Large':lATR/price>0.008?'Medium':'Small',
    confidence:bullPct>68||bullPct<32?'High':bullPct>57||bullPct<43?'Medium':'Low',
    future_candles:futureCandlesSim(candles,signal,lATR,12), // deterministic
    // Volume Profile
    vp:vp?{poc:vp.poc,vah:vp.vah,val:vp.val,hvn:(vp.hvn||[]).slice(0,5),lvn:(vp.lvn||[]).slice(0,5),vols:vp.vols,minP:vp.minP,bSz:vp.bSz,pocIdx:vp.pocIdx}:null,
    poc_signal:pocSig,
    hvn_conf:hvnConf,
    lvn_conf:lvnConf,
    in_value_area:inVA,
  };
}

// ─── DATA FETCHING ─────────────────────────────────────────────────────────────
function isCrypto(s){return s.includes('/');}
async function fetchBinance(symbol,tf,limit=600){
  const sym=symbol.replace('/','');
  const r=await fetch(`${BINANCE_REST}/klines?symbol=${sym}&interval=${BINANCE_TF[tf]||'1h'}&limit=${limit}`);
  if(!r.ok) throw new Error(`Binance ${r.status}`);
  return (await r.json()).map(k=>({timestamp:+k[0],open:+k[1],high:+k[2],low:+k[3],close:+k[4],volume:+k[5]}));
}
async function fetchYF(symbol,tf,limit=600){
  const[iv,range]=YF_TF[tf]||['1h','1y'];
  const enc=encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=${iv}&range=${range}&includePrePost=false`);
  let data;
  const proxies=[
    `https://api.allorigins.win/raw?url=${enc}`,
    `https://corsproxy.io/?${enc}`,
  ];
  let lastErr;
  for(const p of proxies){
    try{const r=await fetch(p);if(r.ok){data=await r.json();break;}}
    catch(e){lastErr=e;}
  }
  if(!data) throw new Error(`No data for ${symbol}: ${lastErr}`);
  const res=data?.chart?.result?.[0];
  if(!res) throw new Error(`Empty chart data for ${symbol}`);
  const ts=res.timestamp,q=res.indicators?.quote?.[0];
  if(!ts||!q) throw new Error(`Missing OHLCV for ${symbol}`);
  let candles=ts.map((t,i)=>({timestamp:t*1000,open:q.open?.[i],high:q.high?.[i],low:q.low?.[i],close:q.close?.[i],volume:q.volume?.[i]||0}))
    .filter(c=>c.open&&c.high&&c.low&&c.close&&isFinite(c.close));
  if(tf==='4h'){
    const b=[];
    for(let i=0;i<candles.length;i+=4){
      const s=candles.slice(i,i+4);if(!s.length)continue;
      b.push({timestamp:s[0].timestamp,open:s[0].open,high:Math.max(...s.map(x=>x.high)),low:Math.min(...s.map(x=>x.low)),close:s[s.length-1].close,volume:s.reduce((a,c)=>a+c.volume,0)});
    }
    candles=b;
  }
  return candles.slice(-limit);
}
async function fetchCandles(symbol,tf,limit=600){
  return isCrypto(symbol)?fetchBinance(symbol,tf,limit):fetchYF(symbol,tf,limit);
}

// ─── NEWS (direct RSS via CORS proxy + DOMParser — no 3rd party service) ──────
const RSS_FEEDS=[

const CORS_PROXIES=[
  u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u=>`https://corsproxy.io/?${encodeURIComponent(u)}`,
  u=>`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
];
async function fetchRSS(feed){
  for(const proxy of CORS_PROXIES){
    try{
      const ctrl=new AbortController();
      const tid=setTimeout(()=>ctrl.abort(),8000);
      const r=await fetch(proxy(feed.u),{signal:ctrl.signal});
      clearTimeout(tid);
      if(!r.ok) continue;
      const text=await r.text();
      if(!text||text.trim().startsWith('{')&&!text.includes('<item')) continue; // got JSON error response
      const doc=new DOMParser().parseFromString(text,'text/xml');
      const items=[...doc.querySelectorAll('item')];
      if(!items.length) continue;
      return items.map(el=>{
        // link: sometimes inside CDATA or as text
        const link=el.querySelector('link')?.textContent?.trim()||
                   el.getElementsByTagName('link')?.[0]?.nextSibling?.nodeValue?.trim()||'';
        return{
          title:(el.querySelector('title')?.textContent||'').trim(),
          link, pubDate:(el.querySelector('pubDate')?.textContent||'').trim(),
        };
      }).filter(i=>i.title.length>5);
    }catch(_){continue;}
  }
  return [];
}
const KWB=['rate cut','fed cut','pivot','dovish','stimulus','rally','surge','upgrade','ceasefire','recovery','beats','approves bitcoin','trade deal','soft landing'];
const KWR=['rate hike','hawkish','recession','war','attack','invasion','airstrike','crash','plunge','ban','default','stagflation','crackdown','layoffs','sanctions','nuclear','collapse','tariff'];
const CATS={'FED / RATES':['fed','fomc','powell','rate cut','rate hike','interest rate','cpi','inflation','basis points','treasury yield','monetary policy'],'WAR / GEO':['war','attack','invasion','airstrike','missile','ukraine','russia','israel','gaza','iran','nato','nuclear','geopolit','sanction','troops'],'CRYPTO REG':['sec','cftc','bitcoin etf','crypto regulation','binance','coinbase charged','cbdc','crypto law','crypto ban'],'CRYPTO MARKET':['bitcoin','btc','ethereum','eth','solana','sol','crypto','defi','halving','altcoin','nft'],'EARNINGS':['earnings','revenue','profit','eps','quarterly','beats','misses','guidance','results'],'MACRO / ECONOMY':['gdp','unemployment','jobs report','nonfarm','pmi','recession','imf','world bank','retail sales','deficit'],'STOCK MARKET':["s&p 500","nasdaq","dow jones","wall street","ipo","merger","acquisition","stock market"]};

function scoreItem(title){
  const t=title.toLowerCase();
  const bull=KWB.filter(k=>t.includes(k)).length,bear=KWR.filter(k=>t.includes(k)).length;
  const hi=['war','invasion','attack','rate cut','rate hike','crash','recession','ceasefire','default','nuclear'].some(k=>t.includes(k))?2:1;
  if(bull>bear){const p=Math.min(1+bull*0.7*hi,5);return{sentiment:'bullish',impact_pct:+p.toFixed(1),impact_label:p>=3?'HIGH':p>=1.5?'MEDIUM':'LOW'};}
  if(bear>bull){const p=Math.min(1+bear*0.7*hi,5);return{sentiment:'bearish',impact_pct:+p.toFixed(1),impact_label:p>=3?'HIGH':p>=1.5?'MEDIUM':'LOW'};}
  return{sentiment:'neutral',impact_pct:0.3,impact_label:'LOW'};
}
function detectCat(t){const tl=t.toLowerCase();for(const[c,ks]of Object.entries(CATS))if(ks.some(k=>tl.includes(k)))return c;return'MARKET NEWS';}
function parseDate(s){try{return new Date(s).getTime()||Date.now();}catch{return Date.now();}}
// Fetch fresh items from all RSS feeds in parallel
async function fetchFreshNews(){
  const all=[];
  await Promise.allSettled(RSS_FEEDS.map(async feed=>{
    const items=await fetchRSS(feed);
    for(const it of items){
      if(!it.title) continue;
      const sc=scoreItem(it.title);
      all.push({headline:it.title,url:it.link,source:feed.s,timestamp:it.pubDate?new Date(it.pubDate).toISOString():new Date().toISOString(),...sc,category:detectCat(it.title),fetchedAt:Date.now()});
    }
  }));
  return all;
}

  return{news,symbol_news:symNews.slice(0,10),high_impact:high.slice(0,8),category_summary:cats,overall_sentiment:{bullish:tb,bearish:tr,neutral:news.length-tb-tr,label:tb>tr?'Risk-ON':tr>tb?'Risk-OFF':'Neutral'},fetched_at:new Date().toISOString(),total:news.length};
}

    const last=hist[hist.length-1]?.time||0;
    const maxF=futureCount!==''&&!isNaN(+futureCount)?Math.max(0,+futureCount):undefined;
    const fut=(setup?.future_candles||[]).slice(0,maxF).map((c,i)=>({time:last+delta*(i+1),open:+c.open,high:+c.high,low:+c.low,close:+c.close,color:'rgba(255,200,0,.75)',borderColor:'#FFC800',wickColor:'#FFC800'})).filter(c=>c.open&&c.close);
    const merged=[...hist,...fut].sort((a,b)=>a.time-b.time);
    cSeries.current.setData(merged);
    chartInst.current.timeScale().scrollToRealTime();
    vSeries.current.setData(candles.map(c=>({time:Math.floor(c.timestamp/1000),value:+c.volume||0,color:+c.close>=+c.open?'rgba(38,166,154,.4)':'rgba(239,83,80,.4)'})).filter(c=>c.value>0));
    const markers=[];
    candles.forEach(c=>{
      const t=Math.floor(c.timestamp/1000);
      if(c.bullish_fvg||setup?.fvg?.find?.(f=>f.type==='bull'&&Math.floor(candles[f.idx]?.timestamp/1000)===t)) markers.push({time:t,position:'belowBar',color:'#2962ff',shape:'circle',text:'FVG↑'});
      if(c.bearish_fvg||setup?.fvg?.find?.(f=>f.type==='bear'&&Math.floor(candles[f.idx]?.timestamp/1000)===t)) markers.push({time:t,position:'aboveBar',color:'#ef5350',shape:'circle',text:'FVG↓'});
    });
    setup?.bos?.forEach(b=>{
      const t=Math.floor(candles[b.idx]?.timestamp/1000)||0;
      if(t) markers.push({time:t,position:b.type==='bull'?'belowBar':'aboveBar',color:b.type==='bull'?'#26a69a':'#ef5350',shape:'arrowUp',text:b.type==='bull'?'BOS↑':'BOS↓'});
    });
    if(fut.length) markers.push({time:fut[0].time,position:'aboveBar',color:'#FFC800',shape:'arrowDown',text:'Predicted'});
    (nd?.news||[]).forEach(n=>{
      if(!n.timestamp)return;
      const nt=Math.floor(new Date(n.timestamp).getTime()/1000);
      let closest=null,minD=Infinity;
      for(const c of merged){const d=Math.abs(c.time-nt);if(d<minD&&d<=delta*2){minD=d;closest=c.time;}}
      if(closest) markers.push({time:closest,position:n.sentiment==='bullish'?'belowBar':'aboveBar',color:n.sentiment==='bullish'?'#26a69a':n.sentiment==='bearish'?'#ef5350':'#787b86',shape:'square',text:'📰'});
    });
    markers.sort((a,b)=>a.time-b.time);
    cSeries.current.setMarkers(markers);
    if(hist.length) setPrevClose(hist[hist.length-1].close);
    // ── VP price lines (POC / VAH / VAL / HVN) ────────────────────────────────
    vpLinesRef.current.forEach(l=>{try{cSeries.current.removePriceLine(l);}catch(_){}});
    vpLinesRef.current=[];
    if(setup?.vp&&cSeries.current){
      const{poc,vah,val,hvn=[]}=setup.vp;
      vpLinesRef.current.push(
        cSeries.current.createPriceLine({price:poc,color:'#FF9800',lineWidth:2,lineStyle:0,axisLabelVisible:true,title:'POC'}),
        cSeries.current.createPriceLine({price:vah,color:'#26a69a',lineWidth:1,lineStyle:2,axisLabelVisible:true,title:'VAH'}),
        cSeries.current.createPriceLine({price:val,color:'#ef5350',lineWidth:1,lineStyle:2,axisLabelVisible:true,title:'VAL'}),
      );
      hvn.slice(0,3).forEach(p=>vpLinesRef.current.push(
        cSeries.current.createPriceLine({price:p,color:'#FF980055',lineWidth:1,lineStyle:3,axisLabelVisible:false,title:'HVN'})
      ));
    }
    // ── VP Histogram on canvas ─────────────────────────────────────────────────
    const vpCanvas=vpCanvasRef.current;
    if(vpCanvas&&cSeries.current){
      const dpr=window.devicePixelRatio||1;
      const W=vpCanvas.offsetWidth,H=vpCanvas.offsetHeight;
      vpCanvas.width=W*dpr;vpCanvas.height=H*dpr;
      const ctx=vpCanvas.getContext('2d');
      ctx.scale(dpr,dpr);
      ctx.clearRect(0,0,W,H);
      const v=setup?.vp;
      if(v?.vols&&v.vols.length){
        const{vols,minP,bSz,pocIdx,vah,val,poc}=v;
        const maxVol=Math.max(...vols);
        if(maxVol>0){
          const avg=vols.reduce((s,x)=>s+x,0)/vols.length;
          const barMaxW=Math.round(W*0.13);
          for(let i=0;i<vols.length;i++){
            if(!vols[i])continue;
            const bLo=minP+i*bSz,bHi=bLo+bSz;
            const y1=cSeries.current.priceToCoordinate(bHi);
            const y2=cSeries.current.priceToCoordinate(bLo);
            if(y1==null||y2==null||y2<0||y1>H)continue;
            const bH=Math.max(1,Math.abs(y2-y1));
            const bW=Math.max(1,Math.round((vols[i]/maxVol)*barMaxW));
            const isPOC=i===pocIdx;
            const isHVN=vols[i]>avg*2.0;
            const inVA=bLo>=val&&bHi<=vah;
            ctx.globalAlpha=isPOC?0.90:isHVN?0.75:inVA?0.55:0.38;
            ctx.fillStyle=isPOC?'#FFD600':isHVN?'#FFD600':'#2962ff';
            ctx.fillRect(W-bW,Math.min(y1,y2),bW,bH);
          }
          ctx.globalAlpha=1;
          // POC horizontal line + label
          const pocY=cSeries.current.priceToCoordinate(poc);
          if(pocY!=null&&pocY>=0&&pocY<=H){
            ctx.fillStyle='rgba(255,150,0,0.9)';
            ctx.fillRect(W-barMaxW-2,pocY-1,barMaxW+2,2);
            ctx.font=`bold 9px Inter,sans-serif`;
            ctx.fillStyle='#FF9800';
            ctx.textAlign='right';
            ctx.fillText('POC',W-barMaxW-5,pocY+3.5);
          }
          // VAH / VAL labels
          const vahY=cSeries.current.priceToCoordinate(vah);
          const valY=cSeries.current.priceToCoordinate(val);
          ctx.font='8px Inter,sans-serif';
          if(vahY!=null&&vahY>=0&&vahY<=H){ctx.fillStyle='#26a69a';ctx.textAlign='right';ctx.fillText('VAH',W-barMaxW-5,vahY-2);}
          if(valY!=null&&valY>=0&&valY<=H){ctx.fillStyle='#ef5350';ctx.textAlign='right';ctx.fillText('VAL',W-barMaxW-5,valY+9);}
        }
      }
    }
  },[candles,setup,nd,futureCount]);

  // WebSocket (Binance direct for crypto; poll REST for stocks)
  useEffect(()=>{
    if(wsRef.current){try{wsRef.current.close();}catch(_){}wsRef.current=null;}
    setWsStatus('connecting');
    if(!isCrypto(symbol)){setWsStatus('delayed');return;}
    let dead=false;
    const connect=()=>{
      if(dead)return;
      const sym=symbol.replace('/','').toLowerCase();
      const ws=new WebSocket(`${BINANCE_WS}/${sym}@kline_${tf}`);
      wsRef.current=ws;
      ws.onopen=()=>setWsStatus('live');
      ws.onclose=()=>{setWsStatus('reconnecting');if(!dead)setTimeout(connect,3000);};
      ws.onerror=()=>setWsStatus('error');
      ws.onmessage=e=>{
        try{
          const k=JSON.parse(e.data).k;
          if(!k)return;
          setLivePrice(+k.c);
          const t=Math.floor(+k.t/1000);
          if(t>0&&cSeries.current){
            cSeries.current.update({time:t,open:+k.o,high:+k.h,low:+k.l,close:+k.c});
            vSeries.current?.update({time:t,value:+k.v||0,color:+k.c>=+k.o?'rgba(38,166,154,.4)':'rgba(239,83,80,.4)'});
          }
        }catch(_){}
      };
    };
    connect();
    return()=>{dead=true;try{wsRef.current?.close();}catch(_){}};
  },[symbol,tf]);

  // Fetch candles + setup
  const load=useCallback(async(sym,t,quiet=false)=>{
    if(!quiet)setLoading(true);
    setError(null);
    try{
      const data=await fetchCandles(sym,t,600);
      setCandles(data);
      setLivePrice(data[data.length-1]?.close||null);
      const s=generateSetup(data,data[data.length-1]?.close);
      setSetup(s);
    }catch(e){setError(e.message);}
    finally{if(!quiet)setLoading(false);}
  },[]);

  // MTF Volume Profile: fetch 1W/1D/4H/1H candles → compute VP for each → weighted bias
  const loadMTFVP=useCallback(async(sym)=>{
    const TFS=['1w','1d','4h','1h'];
    const vps={};
    await Promise.allSettled(TFS.map(async t=>{
      try{vps[t]=calcVolumeProfile(await fetchCandles(sym,t,300));}catch(_){}
    }));
    setMtfVP(vps);
  },[]);

  // Initial load + 30s refresh
  useEffect(()=>{
    load(symbol,tf);
    const id=setInterval(()=>load(symbol,tf,true),30000);
    return()=>clearInterval(id);
  },[symbol,tf]);

  // MTF VP fetch — re-runs only on symbol change (not TF)
  useEffect(()=>{
    setMtfVP(null);
    loadMTFVP(symbol);
  },[symbol]);

  // News: fetch fresh headlines, merge into 200-item rolling store, refresh every 60s
  useEffect(()=>{
    newsStore.current=[]; // reset store when symbol changes
    setNd(null);
    const poll=async()=>{
      try{
        const fresh=await fetchFreshNews();
        if(!fresh.length) return;
        // Merge fresh items on top of existing store, deduplicate, cap at 200
        const existing=newsStore.current;
        const seen=new Set(existing.map(n=>n.headline.slice(0,65).toLowerCase()));
        const newOnly=fresh.filter(n=>{const k=n.headline.slice(0,65).toLowerCase();if(seen.has(k))return false;seen.add(k);return true;});
        newsStore.current=[...newOnly,...existing].slice(0,200);
        setNd(buildNd(newsStore.current,symbol));
      }catch(_){}
    };
    poll();
    const id=setInterval(poll,60000);
    return()=>clearInterval(id);
  },[symbol]);

  // Search focus
  useEffect(()=>{if(showSearch)setTimeout(()=>searchRef.current?.focus(),50);},[showSearch]);

  const filtered=useMemo(()=>{
    const q=(query||'').toUpperCase().trim();
    let pool=searchCat?ALL_SYMBOLS.filter(s=>s.type===searchCat):ALL_SYMBOLS;
    if(!q)return pool.slice(0,120);
    return pool.filter(s=>s.symbol.toUpperCase().includes(q)||s.name?.toUpperCase().includes(q)).slice(0,120);
  },[query,searchCat]);

  const selectSym=s=>{setShowSearch(false);setQuery('');setSearchCat('');setSymbol(s);};
  const changeTf=t=>{setTf(t);load(symbol,t);};
  // price must be declared before any useMemo that references it
  const price=livePrice??candles?.[candles.length-1]?.close??null;
  const dec=smartDec(price??0);
  const chg=price&&prevClose?price-prevClose:null;
  const chgPct=chg&&prevClose?chg/prevClose*100:null;
  const chgPos=chg!=null?chg>=0:null;
  const overall=nd?.overall_sentiment||{};
  const macroLbl=overall.label||'';
  const macroC=macroLbl==='Risk-ON'?'#26a69a':macroLbl==='Risk-OFF'?'#ef5350':'#787b86';
  const hiCount=(nd?.high_impact||[]).length;

  // MTF VP bias score: 0–100 (50=neutral), weighted 1W·40%+1D·30%+4H·20%+1H·10%
  const mtfVPScore=useMemo(()=>{
    if(!mtfVP||!price)return null;
    const wts={'1w':0.40,'1d':0.30,'4h':0.20,'1h':0.10};
    let s=0;
    for(const[t,w]of Object.entries(wts)){
      const v=mtfVP[t];if(!v)continue;
      s+=w*(price>v.poc?1:price<v.poc?-1:0);
    }
    return Math.round((s+1)*50); // –1..1 → 0..100
  },[mtfVP,price]);

  // Combined bias: SMC/EMA 70% + MTF VP 30%
  const combinedBias=setup?Math.round((setup.bull_pct??50)*0.7+(mtfVPScore??50)*0.3):null;

  return(
    <div style={{height:'100vh',display:'flex',flexDirection:'column',background:'#131722'}}>
      {/* HEADER */}
      <header style={{height:46,display:'flex',alignItems:'center',gap:8,padding:'0 12px',borderBottom:'1px solid #2a2e39',background:'#1e222d',flexShrink:0,flexWrap:'nowrap',overflow:'hidden'}}>
        <span style={{color:'#2962ff',fontWeight:700,fontSize:14,flexShrink:0}}>⚡ SMC</span>
        <button onClick={()=>setShowSearch(true)} style={{display:'flex',alignItems:'center',gap:6,background:'#131722',border:'1px solid #2a2e39',borderRadius:4,padding:'4px 10px',color:'#d1d4dc',cursor:'pointer',fontSize:13,fontWeight:600,flexShrink:0}}>
          {symbol}<span style={{fontSize:9,color:'#787b86'}}>▼</span>
        </button>
        {price!=null&&<span style={{fontSize:14,fontWeight:700,color:chgPos===false?'#ef5350':chgPos?'#26a69a':'#d1d4dc',flexShrink:0}}>{fmt(price,dec)}</span>}
        {chgPct!=null&&<span style={{fontSize:11,color:chgPos?'#26a69a':'#ef5350',flexShrink:0}}>{chgPos?'+':''}{chgPct.toFixed(2)}%</span>}
        {macroLbl&&<span style={{fontSize:10,color:macroC,background:macroC+'18',padding:'2px 7px',borderRadius:10,border:`1px solid ${macroC}44`,flexShrink:0}}>📰 {macroLbl}{hiCount>0?` · 🔴${hiCount}`:''}</span>}
        <div style={{flex:1}}/>
        <div style={{display:'flex',alignItems:'center',gap:4,background:'#131722',border:'1px solid #2a2e39',borderRadius:4,padding:'2px 6px',flexShrink:0}}>
          <span style={{fontSize:10,color:'#787b86',whiteSpace:'nowrap'}}>🕯</span>
          <input type="number" min="0" max="200" value={futureCount} onChange={e=>setFutureCount(e.target.value)} placeholder="auto"
            style={{width:40,background:'transparent',border:'none',outline:'none',color:'#FFC800',fontSize:11,fontWeight:600,textAlign:'center'}}/>
        </div>
        <div style={{display:'flex',gap:2,background:'#131722',border:'1px solid #2a2e39',borderRadius:4,padding:2,flexShrink:0}}>
          {TIMEFRAMES.map(t=>(
            <button key={t} onClick={()=>changeTf(t)} style={{padding:'3px 8px',borderRadius:3,border:'none',cursor:'pointer',fontSize:11,fontWeight:500,background:tf===t?'#2962ff':'transparent',color:tf===t?'#fff':'#787b86'}}>{t}</button>
          ))}
        </div>
        <div style={{display:'flex',alignItems:'center',gap:4,fontSize:10,color:'#787b86',flexShrink:0}}>
          <div style={{width:6,height:6,borderRadius:'50%',background:error?'#ef5350':wsStatus==='live'?'#26a69a':wsStatus==='delayed'?'#ff9800':'#787b86'}}/>
          {error?'Error':wsStatus==='live'?'Live':wsStatus==='delayed'?'Delayed':'…'}
        </div>
      </header>

      {/* WORKSPACE */}
      <div style={{flex:1,display:'flex',overflow:'hidden'}}>
        {/* Chart */}
        <div style={{flex:1,position:'relative'}}>
          {loading&&<div style={{position:'absolute',inset:0,background:'rgba(19,23,34,.8)',zIndex:10,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:12}}>
            <div style={{width:32,height:32,border:'3px solid #2962ff',borderTopColor:'transparent',borderRadius:'50%',animation:'spin 1s linear infinite'}}/>
            <span style={{color:'#787b86',fontSize:12}}>Loading {symbol} {tf}…</span>
          </div>}
          <div ref={chartRef} style={{width:'100%',height:'100%'}}/>
          <canvas ref={vpCanvasRef} style={{position:'absolute',inset:0,width:'100%',height:'100%',pointerEvents:'none',zIndex:2}}/>
        </div>

        {/* PANEL */}
        <div style={{width:340,borderLeft:'1px solid #2a2e39',background:'#1e222d',overflowY:'auto',flexShrink:0,padding:'8px 6px'}}>
          {error&&<div style={{background:'#ef535015',border:'1px solid #ef535040',borderRadius:6,padding:'8px 12px',marginBottom:8,fontSize:11,color:'#ef5350'}}>⚠ {error}</div>}
          {!setup?(
            <div style={{height:'100%',display:'flex',alignItems:'center',justifyContent:'center',color:'#787b86',fontSize:12,textAlign:'center',padding:24}}>
              {loading?'Analyzing…':'Select a symbol to start.'}
            </div>
          ):(
            <>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'6px 8px 10px'}}>
                <div><p style={{fontSize:11,color:'#787b86'}}>Trade Signal</p><p style={{fontSize:13,fontWeight:700,color:'#d1d4dc',marginTop:2}}>{symbol} · {tf}</p></div>
                <span className={setup.signal==='LONG'?'pulse-bull':'pulse-bear'} style={{padding:'4px 14px',borderRadius:20,fontSize:12,fontWeight:700,background:setup.signal==='LONG'?'#26a69a22':'#ef535022',color:setup.signal==='LONG'?'#26a69a':'#ef5350',border:`1px solid ${setup.signal==='LONG'?'#26a69a55':'#ef535055'}`}}>{setup.signal}</span>
              </div>

              <Section title="HTF Bias & Structure" icon="📊">
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:4,marginBottom:6}}>
                  <Tile label="HTF Bias" value={setup.htf_bias} color={clsDir(setup.htf_bias)}/>
                  <Tile label="Phase" value={setup.phase}/>
                  <Tile label="Confidence" value={setup.confidence} color={setup.confidence==='High'?'text-bull':setup.confidence==='Medium'?'text-yellow-400':'text-bear'}/>
                  <Tile label="RSI (14)" value={setup.rsi} color={+setup.rsi>70?'text-bear':+setup.rsi<30?'text-bull':'text-white'}/>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:6,padding:'4px'}}>
                  <span style={{fontSize:10,color:'#787b86',minWidth:28}}>Bull</span>
                  <div style={{flex:1,height:5,background:'#2a2e39',borderRadius:3,overflow:'hidden'}}>
                    <div style={{height:'100%',borderRadius:3,background:'linear-gradient(90deg,#26a69a,#2962ff)',width:`${combinedBias??setup.bull_pct||50}%`}}/>
                  </div>
                  <span style={{fontSize:10,color:'#787b86',minWidth:28,textAlign:'right'}}>Bear</span>
                </div>
                <p style={{fontSize:10,color:'#787b86',padding:'4px 4px 0'}}>
                  {combinedBias??setup.bull_pct}% bull · {100-(combinedBias??setup.bull_pct)}% bear
                  {mtfVPScore!=null&&<span style={{color:'#FF9800'}}> · VP {mtfVPScore}%</span>}
                </p>
              </Section>

              <Section title="Next Candle Prediction" icon="🕯">
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:4,marginBottom:6}}>
                  <Tile label={`${tf} Type`} value={setup.next_type}/>
                  <Tile label={`${tf} Direction`} value={setup.next_dir} color={clsDir(setup.next_dir)}/>
                  <Tile label="Body Size" value={setup.next_size}/>
                  <Tile label="Confidence" value={setup.confidence}/>
                </div>
              </Section>

              <Section title="Trade Setup" icon="🎯">
                <div style={{padding:'4px 8px 8px',background:'#131722',borderRadius:6,marginBottom:6,borderLeft:`3px solid ${setup.signal==='LONG'?'#26a69a':'#ef5350'}`}}>
                  <p style={{fontSize:10,color:'#787b86',marginBottom:4}}>Entry Zone</p>
                  <p style={{fontSize:14,fontWeight:700,fontFamily:'monospace',color:'#d1d4dc'}}>{fmt(setup.entry_zone?.[0],dec)} – {fmt(setup.entry_zone?.[1],dec)}</p>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:4,marginBottom:4}}>
                  <div style={{background:'#131722',borderRadius:6,padding:'6px 8px',border:'1px solid #26a69a33'}}>
                    <p style={{fontSize:10,color:'#26a69a',fontWeight:600}}>TP 1</p>
                    <p style={{fontSize:12,fontFamily:'monospace',color:'#d1d4dc',marginTop:2}}>{fmt(setup.take_profit_1,dec)}</p>
                    <p style={{fontSize:10,color:'#787b86',marginTop:1}}>{setup.rr1} R:R</p>
                  </div>
                  <div style={{background:'#131722',borderRadius:6,padding:'6px 8px',border:'1px solid #2962ff33'}}>
                    <p style={{fontSize:10,color:'#2962ff',fontWeight:600}}>TP 2</p>
                    <p style={{fontSize:12,fontFamily:'monospace',color:'#d1d4dc',marginTop:2}}>{fmt(setup.take_profit_2,dec)}</p>
                    <p style={{fontSize:10,color:'#787b86',marginTop:1}}>{setup.rr2} R:R</p>
                  </div>
                </div>
                <div style={{background:'#131722',borderRadius:6,padding:'6px 8px',border:'1px solid #ef535033',marginBottom:4}}>
                  <p style={{fontSize:10,color:'#ef5350',fontWeight:600}}>Stop Loss</p>
                  <p style={{fontSize:12,fontFamily:'monospace',color:'#d1d4dc',marginTop:2}}>{fmt(setup.stop_loss,dec)}</p>
                </div>
                <div style={{display:'flex',justifyContent:'space-between',padding:'6px 8px',background:'#131722',borderRadius:6}}>
                  <span style={{fontSize:11,color:'#787b86'}}>Suggested Leverage</span>
                  <span style={{fontSize:11,fontWeight:700,color:'#2962ff'}}>{setup.leverage}x</span>
                </div>
              </Section>

              <Section title="Key Levels" icon="📍" open={false}>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:4}}>
                  <div>
                    <p style={{fontSize:10,color:'#26a69a',fontWeight:600,padding:'4px 8px'}}>BSL (Stop Hunt↑)</p>
                    {setup.bsl.map((l,i)=><p key={i} style={{fontSize:11,fontFamily:'monospace',color:'#d1d4dc',padding:'2px 8px'}}>{fmt(l,dec)}</p>)}
                  </div>
                  <div>
                    <p style={{fontSize:10,color:'#ef5350',fontWeight:600,padding:'4px 8px'}}>SSL (Stop Hunt↓)</p>
                    {setup.ssl.map((l,i)=><p key={i} style={{fontSize:11,fontFamily:'monospace',color:'#d1d4dc',padding:'2px 8px'}}>{fmt(l,dec)}</p>)}
                  </div>
                </div>
                <div style={{marginTop:8,padding:'6px 8px',background:'#131722',borderRadius:6}}>
                  <div style={{display:'flex',justifyContent:'space-between',fontSize:10,marginBottom:4}}>
                    <span style={{color:'#787b86'}}>EMA 9</span><span style={{color:'#d1d4dc',fontFamily:'monospace'}}>{fmt(setup.ema9,dec)}</span>
                  </div>
                  <div style={{display:'flex',justifyContent:'space-between',fontSize:10,marginBottom:4}}>
                    <span style={{color:'#787b86'}}>EMA 21</span><span style={{color:'#d1d4dc',fontFamily:'monospace'}}>{fmt(setup.ema21,dec)}</span>
                  </div>
                  <div style={{display:'flex',justifyContent:'space-between',fontSize:10}}>
                    <span style={{color:'#787b86'}}>EMA 50</span><span style={{color:'#d1d4dc',fontFamily:'monospace'}}>{fmt(setup.ema50,dec)}</span>
                  </div>
                </div>
              </Section>

              <Section title="Volume Profile" icon="📊" open={false}>
                {!setup?.vp?<p style={{fontSize:11,color:'#787b86'}}>Insufficient volume data.</p>:(
                  <>
                    {/* MTF VP Bias Bar */}
                    <div style={{marginBottom:8,padding:'6px 8px',background:'#131722',borderRadius:6}}>
                      <p style={{fontSize:10,color:'#787b86',marginBottom:4}}>MTF VP Bias — 1W·40% + 1D·30% + 4H·20% + 1H·10%</p>
                      {mtfVPScore!=null?(
                        <>
                          <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:3}}>
                            <div style={{flex:1,height:5,background:'#2a2e39',borderRadius:3,overflow:'hidden'}}>
                              <div style={{height:'100%',borderRadius:3,background:mtfVPScore>=50?'linear-gradient(90deg,#26a69a,#2962ff)':'linear-gradient(90deg,#ef5350,#ff9800)',width:`${mtfVPScore}%`}}/>
                            </div>
                            <span style={{fontSize:11,fontWeight:700,color:mtfVPScore>=55?'#26a69a':mtfVPScore<=45?'#ef5350':'#FF9800'}}>{mtfVPScore}%</span>
                          </div>
                          <p style={{fontSize:10,color:mtfVPScore>=55?'#26a69a':mtfVPScore<=45?'#ef5350':'#FF9800'}}>
                            {mtfVPScore>=55?'▲ Bullish VP Structure':mtfVPScore<=45?'▼ Bearish VP Structure':'─ Equilibrium / Value Area'}
                          </p>
                        </>
                      ):<p style={{fontSize:10,color:'#787b86'}}>Fetching MTF data…</p>}
                    </div>
                    {/* Current TF: POC / VAH / VAL */}
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:4,marginBottom:6}}>
                      <div style={{background:'#131722',borderRadius:6,padding:'5px 7px',border:'1px solid #FF980066'}}>
                        <p style={{fontSize:9,color:'#FF9800',fontWeight:700}}>POC</p>
                        <p style={{fontSize:11,fontFamily:'monospace',color:'#d1d4dc',marginTop:1}}>{fmt(setup.vp.poc,dec)}</p>
                      </div>
                      <div style={{background:'#131722',borderRadius:6,padding:'5px 7px',border:'1px solid #26a69a44'}}>
                        <p style={{fontSize:9,color:'#26a69a',fontWeight:700}}>VAH</p>
                        <p style={{fontSize:11,fontFamily:'monospace',color:'#d1d4dc',marginTop:1}}>{fmt(setup.vp.vah,dec)}</p>
                      </div>
                      <div style={{background:'#131722',borderRadius:6,padding:'5px 7px',border:'1px solid #ef535044'}}>
                        <p style={{fontSize:9,color:'#ef5350',fontWeight:700}}>VAL</p>
                        <p style={{fontSize:11,fontFamily:'monospace',color:'#d1d4dc',marginTop:1}}>{fmt(setup.vp.val,dec)}</p>
                      </div>
                    </div>
                    {/* Value Area status */}
                    <p style={{fontSize:10,padding:'2px 4px 6px',color:setup.in_value_area?'#FF9800':'#787b86'}}>
                      {setup.in_value_area?'⚠ Price in Value Area — Low-probability trade zone':'Price outside Value Area'}
                    </p>
                    {/* POC Signal */}
                    {setup.poc_signal&&(
                      <div style={{padding:'5px 8px',marginBottom:6,borderRadius:6,border:`1px solid ${setup.poc_signal==='rejection'?'#ef535055':'#26a69a55'}`,background:setup.poc_signal==='rejection'?'#ef535015':'#26a69a15'}}>
                        <p style={{fontSize:11,fontWeight:700,color:setup.poc_signal==='rejection'?'#ef5350':'#26a69a'}}>
                          {setup.poc_signal==='rejection'?'⚡ POC Rejection — High-Prob Reversal':'⚡ POC Breakout+Retest — High-Prob Continuation'}
                        </p>
                      </div>
                    )}
                    {/* HVN / OB Confluence */}
                    {setup.hvn_conf?.length>0&&(
                      <div style={{marginBottom:6}}>
                        <p style={{fontSize:10,color:'#FF9800',fontWeight:600,padding:'2px 4px 4px'}}>🔥 HVN + Order Block Confluence</p>
                        {setup.hvn_conf.map((c,i)=>(
                          <div key={i} style={{display:'flex',justifyContent:'space-between',padding:'2px 8px',fontSize:10}}>
                            <span style={{color:c.type==='bull'?'#26a69a':'#ef5350'}}>{c.label}</span>
                            <span style={{fontFamily:'monospace',color:'#d1d4dc'}}>{fmt(c.price,dec)}</span>
                          </div>
                        ))}
                      </div>
                    )}
                    {/* LVN / FVG Confluence */}
                    {setup.lvn_conf?.length>0&&(
                      <div style={{marginBottom:6}}>
                        <p style={{fontSize:10,color:'#2962ff',fontWeight:600,padding:'2px 4px 4px'}}>⚡ LVN + FVG Fast Move Zones</p>
                        {setup.lvn_conf.map((c,i)=>(
                          <div key={i} style={{display:'flex',justifyContent:'space-between',padding:'2px 8px',fontSize:10}}>
                            <span style={{color:c.type==='bull'?'#26a69a':'#ef5350'}}>{c.label}</span>
                            <span style={{fontFamily:'monospace',color:'#d1d4dc'}}>{fmt(c.price,dec)}</span>
                          </div>
                        ))}
                      </div>
                    )}
                    {/* MTF VP Breakdown */}
                    {mtfVP&&(
                      <div>
                        <p style={{fontSize:10,color:'#787b86',fontWeight:600,padding:'2px 4px 4px'}}>MTF VP Breakdown</p>
                        {[['1w','1W',0.40],['1d','1D',0.30],['4h','4H',0.20],['1h','1H',0.10]].map(([key,label,w])=>{
                          const v=mtfVP[key];if(!v)return null;
                          const ab=price>v.poc,be=price<v.poc;
                          return(<div key={key} style={{display:'flex',alignItems:'center',gap:6,padding:'3px 4px',fontSize:10}}>
                            <span style={{color:'#787b86',minWidth:22,fontWeight:600}}>{label}</span>
                            <span style={{color:'#787b86',minWidth:28}}>{(w*100).toFixed(0)}%wt</span>
                            <span style={{fontSize:9,padding:'1px 6px',borderRadius:3,background:ab?'#26a69a22':be?'#ef535022':'#FF980022',color:ab?'#26a69a':be?'#ef5350':'#FF9800'}}>{ab?'▲ Bull':be?'▼ Bear':'─ Neut'}</span>
                            <span style={{fontFamily:'monospace',color:'#787b86',marginLeft:'auto',fontSize:9}}>POC {fmt(v.poc,dec)}</span>
                          </div>);
                        })}
                      </div>
                    )}
                  </>
                )}
              </Section>

              <Section title={`News & Macro Impact${hiCount>0?` 🔴${hiCount}`:''}`} icon="📰" open={true}>
                <NewsPanel nd={nd}/>
              </Section>

              <Section title="Analysis Summary" icon="📋">
                <table className="sum-table"><tbody>
                  <tr><td>Asset</td><td>{symbol}</td></tr>
                  <tr><td>HTF Bias</td><td style={{color:setup.htf_bias==='Bullish'?'#26a69a':setup.htf_bias==='Bearish'?'#ef5350':'#d1d4dc'}}>{setup.htf_bias}</td></tr>
                  <tr><td>Phase</td><td>{setup.phase}</td></tr>
                  <tr><td>{tf} Candle</td><td>{setup.next_type} — <span style={{color:setup.next_dir==='Bullish'?'#26a69a':'#ef5350'}}>{setup.next_dir}</span></td></tr>
                  <tr><td>Confidence</td><td>{setup.confidence}</td></tr>
                  <tr><td>Entry</td><td>{fmt(setup.entry_zone?.[0],dec)} – {fmt(setup.entry_zone?.[1],dec)}</td></tr>
                  <tr><td>Stop Loss</td><td>{fmt(setup.stop_loss,dec)}</td></tr>
                  <tr><td>TP1 / TP2</td><td>{fmt(setup.take_profit_1,dec)} / {fmt(setup.take_profit_2,dec)}</td></tr>
                  <tr><td>R:R</td><td>{setup.rr1} / {setup.rr2}</td></tr>
                  <tr><td>Macro</td><td style={{color:macroC}}>{macroLbl||'—'}{hiCount>0?` (${hiCount} high)`:''}</td></tr>
                  <tr><td>RSI</td><td>{setup.rsi}</td></tr>
                  <tr><td>ATR</td><td>{setup.atr}</td></tr>
                </tbody></table>
                {(setup.future_candles?.length>0)&&<p style={{fontSize:10,color:'#FFC800',padding:'6px 4px 0'}}>● {futureCount||setup.future_candles.length} neon yellow predicted candles on chart</p>}
                <p style={{fontSize:9,color:'#787b86',padding:'8px 4px 0'}}>⚠ Not financial advice. Educational use only.</p>
              </Section>

              <div style={{padding:'8px',borderTop:'1px solid #2a2e39',marginTop:8,display:'flex',justifyContent:'space-between',fontSize:10,color:'#787b86'}}>
                <span>Binance · Yahoo Finance · RSS News</span>
                <span>⚡ 30s refresh</span>
              </div>
            </>
          )}
        </div>
      </div>

      {/* SEARCH MODAL */}
      {showSearch&&(
        <div className="search-modal" onClick={()=>{setShowSearch(false);setQuery('');setSearchCat('');}}>
          <div className="search-box" onClick={e=>e.stopPropagation()}>
            <div style={{display:'flex',alignItems:'center',padding:'0 16px',borderBottom:'1px solid #2a2e39'}}>
              <span style={{color:'#787b86',marginRight:8}}>🔍</span>
              <input ref={searchRef} className="search-input" placeholder="Search — BTC/USDT, AAPL, GLD, GC=F, ^GSPC…"
                value={query} onChange={e=>setQuery(e.target.value)}
                onKeyDown={e=>{if(e.key==='Enter'&&filtered.length)selectSym(filtered[0].symbol);if(e.key==='Escape')setShowSearch(false);}}/>
              <button onClick={()=>{setShowSearch(false);setQuery('');setSearchCat('');}} style={{background:'none',border:'none',color:'#787b86',cursor:'pointer',fontSize:16}}>✕</button>
            </div>
            <div style={{display:'flex',gap:0,padding:'6px 12px',borderBottom:'1px solid #2a2e39',flexWrap:'wrap'}}>
              {[{label:'All',val:''},{label:'Crypto',val:'crypto'},{label:'Stocks',val:'stock'},{label:'ETFs',val:'etf'},{label:'Commodities',val:'commodity'},{label:'Indices',val:'index'}].map(({label,val})=>(
                <button key={label} style={{padding:'3px 9px',borderRadius:4,border:'none',cursor:'pointer',fontSize:10,marginRight:3,marginBottom:2,background:searchCat===val?'#2962ff':'transparent',color:searchCat===val?'#fff':'#787b86'}} onClick={()=>setSearchCat(val)}>{label}</button>
              ))}
            </div>
            <div style={{overflowY:'auto',flex:1}}>
              {filtered.length===0&&<p style={{padding:16,color:'#787b86',fontSize:12,textAlign:'center'}}>No results found.</p>}
              {filtered.map(s=>(
                <div key={s.symbol} className="search-result" onClick={()=>selectSym(s.symbol)}>
                  <span className={`badge badge-${s.type}`}>{s.type.toUpperCase()}</span>
                  <div style={{flex:1}}><p style={{fontSize:13,fontWeight:600,color:'#d1d4dc'}}>{s.symbol}</p>{s.name&&<p style={{fontSize:11,color:'#787b86'}}>{s.name}</p>}</div>
                  <span style={{fontSize:10,color:'#787b86'}}>{s.exchange}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
};
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
