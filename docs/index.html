// ─── MAIN APP ─────────────────────────────────────────────────────────────────
const App=()=>{
  const[symbol,setSymbol]=useState('BTC/USDT');
  const[tf,setTf]=useState('1h');
  const[candles,setCandles]=useState(null);
  const[setup,setSetup]=useState(null);
  const[nd,setNd]=useState(null);
  const[livePrice,setLivePrice]=useState(null);
  const[loading,setLoading]=useState(false);
  const[error,setError]=useState(null);
  const[wsStatus,setWsStatus]=useState('connecting');
  const[showSearch,setShowSearch]=useState(false);
  const[query,setQuery]=useState('');
  const[searchCat,setSearchCat]=useState('');
  const[prevClose,setPrevClose]=useState(null);
  const[futureCount,setFutureCount]=useState('');
  const[mtfVP,setMtfVP]=useState(null);
  const[binanceSymbols,setBinanceSymbols]=useState(CRYPTO_LIST);
  const[oiFunding,setOiFunding]=useState(null);
  const[fearGreed,setFearGreed]=useState(null);
  const[intermarket,setIntermarket]=useState(null);

  const chartRef=useRef(null),chartInst=useRef(null),cSeries=useRef(null),vSeries=useRef(null),wsRef=useRef(null),searchRef=useRef(null),vpLinesRef=useRef([]),vpCanvasRef=useRef(null);
  const newsStore=useRef([]); // persistent accumulator — keeps up to 200 items across refreshes

  // Fetch all Binance symbols on mount
  useEffect(()=>{
    fetchAllBinanceSymbols().then(syms=>{if(syms&&syms.length>10)setBinanceSymbols(syms);});
  },[]);

  // Chart init
  useEffect(()=>{
    if(!chartRef.current||chartInst.current)return;
    const chart=LightweightCharts.createChart(chartRef.current,{
      width:chartRef.current.clientWidth,height:chartRef.current.clientHeight,
      layout:{background:{type:'solid',color:'#131722'},textColor:'#787b86'},
      grid:{vertLines:{color:'#1e222d'},horzLines:{color:'#1e222d'}},
      crosshair:{mode:LightweightCharts.CrosshairMode.Normal},
      rightPriceScale:{borderColor:'#2a2e39'},
      timeScale:{borderColor:'#2a2e39',timeVisible:true,secondsVisible:false},
    });
    chartInst.current=chart;
    cSeries.current=chart.addCandlestickSeries({upColor:'#26a69a',downColor:'#ef5350',borderUpColor:'#26a69a',borderDownColor:'#ef5350',wickUpColor:'#26a69a',wickDownColor:'#ef5350'});
    vSeries.current=chart.addHistogramSeries({priceFormat:{type:'volume'},priceScaleId:'vol'});
    chart.priceScale('vol').applyOptions({scaleMargins:{top:0.82,bottom:0}});
    const resize=()=>{if(chartInst.current&&chartRef.current)chartInst.current.applyOptions({width:chartRef.current.clientWidth,height:chartRef.current.clientHeight});};
    window.addEventListener('resize',resize);
    return()=>{window.removeEventListener('resize',resize);chart.remove();chartInst.current=null;};
  },[]);

  // Render candles
  useEffect(()=>{
    if(!candles?.length||!cSeries.current)return;
    const dec=smartDec(candles[candles.length-1]?.close);
    const mm=parseFloat((1/Math.pow(10,Math.min(dec,8))).toFixed(Math.min(dec,8)));
    cSeries.current.applyOptions({priceFormat:{type:'price',precision:Math.min(dec,8),minMove:mm}});
    const hist=candles.map(c=>({time:Math.floor(c.timestamp/1000),open:+c.open,high:+c.high,low:+c.low,close:+c.close})).filter(c=>c.open&&c.close);
    const delta=TF_SECS[tf]||3600;
    const last=hist[hist.length-1]?.time||0;
    const maxF=futureCount!==''&&!isNaN(+futureCount)?Math.max(0,+futureCount):undefined;
    const fut=(setup?.future_candles||[]).slice(0,maxF).map((c,i)=>({time:last+delta*(i+1),open:+c.open,high:+c.high,low:+c.low,close:+c.close,color:'rgba(255,200,0,.75)',borderColor:'#FFC800',wickColor:'#FFC800'})).filter(c=>c.open&&c.close);
    const merged=[...hist,...fut].sort((a,b)=>a.time-b.time);
    cSeries.current.setData(merged);
    chartInst.current.timeScale().scrollToRealTime();
    vSeries.current.setData(candles.map(c=>({time:Math.floor(c.timestamp/1000),value:+c.volume||0,color:+c.close>=+c.open?'rgba(38,166,154,.4)':'rgba(239,83,80,.4)'})).filter(c=>c.value>0));
    const markers=[];
    candles.forEach(c=>{
      const t=Math.floor(c.timestamp/1000);
      if(c.bullish_fvg||setup?.fvg?.find?.(f=>f.type==='bull'&&Math.floor(candles[f.idx]?.timestamp/1000)===t)) markers.push({time:t,position:'belowBar',color:'#2962ff',shape:'circle',text:'FVG↑'});
      if(c.bearish_fvg||setup?.fvg?.find?.(f=>f.type==='bear'&&Math.floor(candles[f.idx]?.timestamp/1000)===t)) markers.push({time:t,position:'aboveBar',color:'#ef5350',shape:'circle',text:'FVG↓'});
    });
    setup?.bos?.forEach(b=>{
      const t=Math.floor(candles[b.idx]?.timestamp/1000)||0;
      if(t) markers.push({time:t,position:b.type==='bull'?'belowBar':'aboveBar',color:b.type==='bull'?'#26a69a':'#ef5350',shape:'arrowUp',text:b.type==='bull'?'BOS↑':'BOS↓'});
    });
    if(fut.length) markers.push({time:fut[0].time,position:'aboveBar',color:'#FFC800',shape:'arrowDown',text:'Predicted'});
    (nd?.news||[]).forEach(n=>{
      if(!n.timestamp)return;
      const nt=Math.floor(new Date(n.timestamp).getTime()/1000);
      let closest=null,minD=Infinity;
      for(const c of merged){const d=Math.abs(c.time-nt);if(d<minD&&d<=delta*2){minD=d;closest=c.time;}}
      if(closest) markers.push({time:closest,position:n.sentiment==='bullish'?'belowBar':'aboveBar',color:n.sentiment==='bullish'?'#26a69a':n.sentiment==='bearish'?'#ef5350':'#787b86',shape:'square',text:'📰'});
    });
    markers.sort((a,b)=>a.time-b.time);
    cSeries.current.setMarkers(markers);
    if(hist.length) setPrevClose(hist[hist.length-1].close);
  },[candles,setup,nd,futureCount]);

  // WebSocket (Binance direct for crypto; poll REST for stocks)
  useEffect(()=>{
    if(wsRef.current){try{wsRef.current.close();}catch(_){}wsRef.current=null;}
    setWsStatus('connecting');
    if(!isCrypto(symbol)){setWsStatus('delayed');return;}
    let dead=false;
    const connect=()=>{
      if(dead)return;
      const sym=symbol.replace('/','').toLowerCase();
      const ws=new WebSocket(`${BINANCE_WS}/${sym}@kline_${tf}`);
      wsRef.current=ws;
      ws.onopen=()=>setWsStatus('live');
      ws.onclose=()=>{setWsStatus('reconnecting');if(!dead)setTimeout(connect,3000);};
      ws.onerror=()=>setWsStatus('error');
      ws.onmessage=e=>{
        try{
          const k=JSON.parse(e.data).k;
          if(!k)return;
          setLivePrice(+k.c);
          const t=Math.floor(+k.t/1000);
          if(t>0&&cSeries.current){
            cSeries.current.update({time:t,open:+k.o,high:+k.h,low:+k.l,close:+k.c});
            vSeries.current?.update({time:t,value:+k.v||0,color:+k.c>=+k.o?'rgba(38,166,154,.4)':'rgba(239,83,80,.4)'});
          }
        }catch(_){}
      };
    };
    connect();
    return()=>{dead=true;try{wsRef.current?.close();}catch(_){}};
  },[symbol,tf]);

  // Fetch candles + setup
  const load=useCallback(async(sym,t,quiet=false)=>{
    if(!quiet)setLoading(true);
    setError(null);
    try{
      const data=await fetchCandles(sym,t,600);
      setCandles(data);
      setLivePrice(data[data.length-1]?.close||null);
      const s=generateSetup(data,data[data.length-1]?.close);
      setSetup(s);
    }catch(e){setError(e.message);}
    finally{if(!quiet)setLoading(false);}
  },[]);

  const loadMTFVP=useCallback(async(sym)=>{
    const tfs=['1w','1d','4h','1h'];
    const results=await Promise.allSettled(tfs.map(t=>fetchCandles(sym,t,300)));
    const vpMap={};
    tfs.forEach((t,i)=>{
      if(results[i].status==='fulfilled') vpMap[t]=calcVolumeProfile(results[i].value);
    });
    setMtfVP(vpMap);
  },[]);

  // Initial load + 30s refresh
  useEffect(()=>{
    load(symbol,tf);
    const id=setInterval(()=>load(symbol,tf,true),30000);
    return()=>clearInterval(id);
  },[symbol,tf]);

  // MTF VP load
  useEffect(()=>{
    setMtfVP(null);
    loadMTFVP(symbol);
  },[symbol]);

  // Fundamentals: OI/Funding + Fear&Greed + Intermarket
  const loadFundamentals=useCallback(async(sym)=>{
    const crypto=isCrypto(sym);
    const[oi,fg,im]=await Promise.allSettled([
      fetchOIandFunding(sym),
      fetchFearGreed(),
      fetchIntermarketData(crypto)
    ]);
    if(oi.status==='fulfilled') setOiFunding(oi.value);
    if(fg.status==='fulfilled') setFearGreed(fg.value);
    if(im.status==='fulfilled') setIntermarket(im.value);
  },[]);

  useEffect(()=>{
    setOiFunding(null);setFearGreed(null);setIntermarket(null);
    loadFundamentals(symbol);
    const id=setInterval(()=>loadFundamentals(symbol),120000);
    return()=>clearInterval(id);
  },[symbol]);

  // News: fetch fresh headlines, merge into 200-item rolling store, refresh every 60s
  useEffect(()=>{
    newsStore.current=[]; // reset store when symbol changes
    setNd(null);
    const poll=async()=>{
      try{
        const fresh=await fetchFreshNews();
        if(!fresh.length) return;
        // Merge fresh items on top of existing store, deduplicate, cap at 200
        const existing=newsStore.current;
        const seen=new Set(existing.map(n=>n.headline.slice(0,65).toLowerCase()));
        const newOnly=fresh.filter(n=>{const k=n.headline.slice(0,65).toLowerCase();if(seen.has(k))return false;seen.add(k);return true;});
        newsStore.current=[...newOnly,...existing].slice(0,200);
        setNd(buildNd(newsStore.current,symbol));
      }catch(_){}
    };
    poll();
    const id=setInterval(poll,60000);
    return()=>clearInterval(id);
  },[symbol]);

  // Search focus
  useEffect(()=>{if(showSearch)setTimeout(()=>searchRef.current?.focus(),50);},[showSearch]);

  // VP price lines on chart
  useEffect(()=>{
    if(!cSeries.current) return;
    try{
      for(const l of vpLinesRef.current){try{cSeries.current.removePriceLine(l);}catch(_){}}
      vpLinesRef.current=[];
      const vp=setup?.vp;
      if(!vp) return;
      if(vp.poc!=null) vpLinesRef.current.push(cSeries.current.createPriceLine({price:vp.poc,color:'#ff9800',lineWidth:2,lineStyle:0,axisLabelVisible:true,title:'POC'}));
      if(vp.vah!=null) vpLinesRef.current.push(cSeries.current.createPriceLine({price:vp.vah,color:'#26a69a',lineWidth:1,lineStyle:2,axisLabelVisible:true,title:'VAH'}));
      if(vp.val!=null) vpLinesRef.current.push(cSeries.current.createPriceLine({price:vp.val,color:'#ef5350',lineWidth:1,lineStyle:2,axisLabelVisible:true,title:'VAL'}));
    }catch(_){}
  },[setup]);

  // VP canvas histogram overlay
  useEffect(()=>{
    const canvas=vpCanvasRef.current;
    if(!canvas) return;
    const ctx=canvas.getContext('2d');
    if(!ctx) return;
    try{
      const W=canvas.parentElement?.clientWidth||0;
      const H=canvas.parentElement?.clientHeight||0;
      if(!W||!H) return;
      const dpr=window.devicePixelRatio||1;
      canvas.width=W*dpr;
      canvas.height=H*dpr;
      ctx.scale(dpr,dpr);
      ctx.clearRect(0,0,W,H);
      const vp=setup?.vp;
      if(!vp||!cSeries.current) return;
      const{vols,minP,bSz,pocIdx,inVA}=vp;
      const numBuckets=vols.length;
      const maxVol=Math.max(...vols);
      if(!maxVol) return;
      const barMaxW=Math.min(W*0.18,80);
      for(let i=0;i<numBuckets;i++){
        if(!vols[i]) continue;
        const priceMid=minP+(i+0.5)*bSz;
        const yCenter=cSeries.current.priceToCoordinate(priceMid);
        if(yCenter==null) continue;
        const barH=Math.max(1,Math.round((bSz/(vp.vah-vp.val||bSz*numBuckets))*H*0.7));
        const barW=Math.max(2,(vols[i]/maxVol)*barMaxW);
        const isPoc=i===pocIdx;
        const isHVN=vp.hvn.some(h=>Math.abs(h-priceMid)<bSz);
        ctx.globalAlpha=isPoc?0.9:0.55;
        ctx.fillStyle=isPoc?'#ff9800':isHVN?'#ffd600':inVA[i]?'#2962ff':'#546e7a';
        ctx.fillRect(W-barW,yCenter-barH/2,barW,Math.max(1,barH));
      }
      ctx.globalAlpha=1;
    }catch(_){}
  },[setup,candles]);

  const momentumSig=useMemo(()=>calcMomentumScore(candles),[candles]);
  const microSig=useMemo(()=>calcMicrostructureScore(candles),[candles]);
  const liqMap=useMemo(()=>calcLiquidityMap(candles),[candles]);
  const oiSig=useMemo(()=>calcOIScore(oiFunding,candles),[oiFunding,candles]);
  const imSig=useMemo(()=>calcIntermarketScore(intermarket,isCrypto(symbol)),[intermarket,symbol]);
  const sentSig=useMemo(()=>calcSentimentScore(fearGreed,nd),[fearGreed,nd]);

  const filtered=useMemo(()=>{
    const q=(query||'').toUpperCase().trim();
    const allPool=[...binanceSymbols,...STOCK_LIST];
    let pool=searchCat?allPool.filter(s=>s.type===searchCat):allPool;
    if(!q)return pool.slice(0,120);
    return pool.filter(s=>s.symbol.toUpperCase().includes(q)||s.name?.toUpperCase().includes(q)).slice(0,120);
  },[query,searchCat,binanceSymbols]);

  const selectSym=s=>{setShowSearch(false);setQuery('');setSearchCat('');setSymbol(s);};
  const changeTf=t=>{setTf(t);load(symbol,t);};
  const price=livePrice??candles?.[candles.length-1]?.close??null;
  const dec=smartDec(price??0);
  const chg=price&&prevClose?price-prevClose:null;
  const chgPct=chg&&prevClose?chg/prevClose*100:null;
  const chgPos=chg!=null?chg>=0:null;
  const overall=nd?.overall_sentiment||{};
  const macroLbl=overall.label||'';
  const macroC=macroLbl==='Risk-ON'?'#26a69a':macroLbl==='Risk-OFF'?'#ef5350':'#787b86';
  const hiCount=(nd?.high_impact||[]).length;

  const mtfVPScore=useMemo(()=>{
    if(!mtfVP||price==null) return null;
    const weights={'1w':40,'1d':30,'4h':20,'1h':10};
    let score=0,total=0;
    for(const[t,w] of Object.entries(weights)){
      const vp=mtfVP[t];
      if(!vp) continue;
      total+=w;
      if(price>vp.poc) score+=w;
      else score-=w*0.5;
    }
    if(!total) return null;
    const pct=Math.round(50+score/total*50);
    return{pct:Math.max(0,Math.min(100,pct)),label:pct>65?'Bullish':pct<35?'Bearish':'Neutral'};
  },[mtfVP,price]);

  const masterBias=useMemo(()=>calcMasterBias(setup,momentumSig,microSig,oiSig,imSig,sentSig,mtfVP,price),[setup,momentumSig,microSig,oiSig,imSig,sentSig,mtfVP,price]);

  return(
    <div style={{height:'100vh',display:'flex',flexDirection:'column',background:'#131722'}}>
      {/* HEADER */}
      <header style={{height:46,display:'flex',alignItems:'center',gap:8,padding:'0 12px',borderBottom:'1px solid #2a2e39',background:'#1e222d',flexShrink:0,flexWrap:'nowrap',overflow:'hidden'}}>
        <span style={{color:'#2962ff',fontWeight:700,fontSize:14,flexShrink:0}}>⚡ SMC</span>
        <button onClick={()=>setShowSearch(true)} style={{display:'flex',alignItems:'center',gap:6,background:'#131722',border:'1px solid #2a2e39',borderRadius:4,padding:'4px 10px',color:'#d1d4dc',cursor:'pointer',fontSize:13,fontWeight:600,flexShrink:0}}>
          {symbol}<span style={{fontSize:9,color:'#787b86'}}>▼</span>
        </button>
        {price!=null&&<span style={{fontSize:14,fontWeight:700,color:chgPos===false?'#ef5350':chgPos?'#26a69a':'#d1d4dc',flexShrink:0}}>{fmt(price,dec)}</span>}
        {chgPct!=null&&<span style={{fontSize:11,color:chgPos?'#26a69a':'#ef5350',flexShrink:0}}>{chgPos?'+':''}{chgPct.toFixed(2)}%</span>}
        {macroLbl&&<span style={{fontSize:10,color:macroC,background:macroC+'18',padding:'2px 7px',borderRadius:10,border:`1px solid ${macroC}44`,flexShrink:0}}>📰 {macroLbl}{hiCount>0?` · 🔴${hiCount}`:''}</span>}
        <div style={{flex:1}}/>
        <div style={{display:'flex',alignItems:'center',gap:4,background:'#131722',border:'1px solid #2a2e39',borderRadius:4,padding:'2px 6px',flexShrink:0}}>
          <span style={{fontSize:10,color:'#787b86',whiteSpace:'nowrap'}}>🕯</span>
          <input type="number" min="0" max="200" value={futureCount} onChange={e=>setFutureCount(e.target.value)} placeholder="auto"
            style={{width:40,background:'transparent',border:'none',outline:'none',color:'#FFC800',fontSize:11,fontWeight:600,textAlign:'center'}}/>
        </div>
        <div style={{display:'flex',gap:2,background:'#131722',border:'1px solid #2a2e39',borderRadius:4,padding:2,flexShrink:0}}>
          {TIMEFRAMES.map(t=>(
            <button key={t} onClick={()=>changeTf(t)} style={{padding:'3px 8px',borderRadius:3,border:'none',cursor:'pointer',fontSize:11,fontWeight:500,background:tf===t?'#2962ff':'transparent',color:tf===t?'#fff':'#787b86'}}>{t}</button>
          ))}
        </div>
        <div style={{display:'flex',alignItems:'center',gap:4,fontSize:10,color:'#787b86',flexShrink:0}}>
          <div style={{width:6,height:6,borderRadius:'50%',background:error?'#ef5350':wsStatus==='live'?'#26a69a':wsStatus==='delayed'?'#ff9800':'#787b86'}}/>
          {error?'Error':wsStatus==='live'?'Live':wsStatus==='delayed'?'Delayed':'…'}
        </div>
      </header>

      {/* WORKSPACE */}
      <div style={{flex:1,display:'flex',overflow:'hidden'}}>
        {/* Chart */}
        <div style={{flex:1,position:'relative'}}>
          {loading&&<div style={{position:'absolute',inset:0,background:'rgba(19,23,34,.8)',zIndex:10,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:12}}>
            <div style={{width:32,height:32,border:'3px solid #2962ff',borderTopColor:'transparent',borderRadius:'50%',animation:'spin 1s linear infinite'}}/>
            <span style={{color:'#787b86',fontSize:12}}>Loading {symbol} {tf}…</span>
          </div>}
          <div ref={chartRef} style={{width:'100%',height:'100%'}}/>
          <canvas ref={vpCanvasRef} style={{position:'absolute',top:0,left:0,pointerEvents:'none',width:'100%',height:'100%'}}/>
        </div>

        {/* PANEL */}
        <div style={{width:340,borderLeft:'1px solid #2a2e39',background:'#1e222d',overflowY:'auto',flexShrink:0,padding:'8px 6px'}}>
          {error&&<div style={{background:'#ef535015',border:'1px solid #ef535040',borderRadius:6,padding:'8px 12px',marginBottom:8,fontSize:11,color:'#ef5350'}}>⚠ {error}</div>}
          {!setup?(
            <div style={{height:'100%',display:'flex',alignItems:'center',justifyContent:'center',color:'#787b86',fontSize:12,textAlign:'center',padding:24}}>
              {loading?'Analyzing…':'Select a symbol to start.'}
            </div>
          ):(
            <>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'6px 8px 10px'}}>
                <div><p style={{fontSize:11,color:'#787b86'}}>Trade Signal</p><p style={{fontSize:13,fontWeight:700,color:'#d1d4dc',marginTop:2}}>{symbol} · {tf}</p></div>
                <span className={setup.signal==='LONG'?'pulse-bull':'pulse-bear'} style={{padding:'4px 14px',borderRadius:20,fontSize:12,fontWeight:700,background:setup.signal==='LONG'?'#26a69a22':'#ef535022',color:setup.signal==='LONG'?'#26a69a':'#ef5350',border:`1px solid ${setup.signal==='LONG'?'#26a69a55':'#ef535055'}`}}>{setup.signal}</span>
              </div>

              {masterBias&&(
                <div style={{margin:'0 0 8px',padding:'10px 12px',background:'#131722',borderRadius:8,border:`2px solid ${masterBias.color}44`}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                    <span style={{fontSize:11,color:'#787b86',fontWeight:600,textTransform:'uppercase',letterSpacing:'.5px',display:'flex',alignItems:'center'}}>Master Bias Score <Info text="Weighted combination of all 8 analysis modules into one score from -100 to +100. Above +60 = Strong Bullish. +30 to +60 = Bullish. -30 to +30 = Neutral (no trade). -30 to -60 = Bearish. Below -60 = Strong Bearish. Only trade when score is outside the neutral zone AND ML Confidence is above 50%."/></span>
                    <span style={{fontSize:11,fontWeight:700,color:masterBias.color,background:masterBias.color+'18',padding:'2px 10px',borderRadius:10,border:`1px solid ${masterBias.color}44`}}>{masterBias.label}</span>
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                    <span style={{fontSize:22,fontWeight:800,color:masterBias.color,fontFamily:'monospace',minWidth:52}}>{masterBias.score>0?'+':''}{masterBias.score}</span>
                    <div style={{flex:1}}>
                      <div style={{height:8,background:'#2a2e39',borderRadius:4,overflow:'hidden',position:'relative'}}>
                        <div style={{position:'absolute',left:'50%',top:0,width:2,height:'100%',background:'#2a2e39',zIndex:1}}/>
                        <div style={{position:'absolute',left:masterBias.score>=0?'50%':'calc(50% + '+masterBias.score/2+'%)',width:Math.abs(masterBias.score)/2+'%',height:'100%',background:masterBias.color,borderRadius:4}}/>
                      </div>
                      <div style={{display:'flex',justifyContent:'space-between',fontSize:9,color:'#787b86',marginTop:2}}>
                        <span>-100 Strong Bear</span><span>0 Neutral</span><span>+100 Strong Bull</span>
                      </div>
                    </div>
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <span style={{fontSize:10,color:'#787b86',display:'flex',alignItems:'center'}}>ML Confidence <Info text="Measures how strongly all signals agree with each other. Above 75% = high signal alignment, flagged as high-probability setup. 50–74% = moderate agreement, trade with normal caution. Below 50% = signals conflicting, reduce position size or wait for clearer setup. Calculated by re-weighting all feature scores using ML-style importance weights."/></span>
                    <div style={{flex:1,height:4,background:'#2a2e39',borderRadius:2,overflow:'hidden'}}>
                      <div style={{width:masterBias.mlConf+'%',height:'100%',background:masterBias.mlConf>75?'#26a69a':masterBias.mlConf>50?'#ff9800':'#ef5350',borderRadius:2}}/>
                    </div>
                    <span style={{fontSize:10,fontWeight:700,color:masterBias.mlConf>75?'#26a69a':masterBias.mlConf>50?'#ff9800':'#ef5350'}}>{masterBias.mlConf}%</span>
                  </div>
                  {masterBias.mlConf>=75&&<p style={{fontSize:9,color:'#26a69a',marginTop:4}}>✓ High-probability setup</p>}
                </div>
              )}

              <Section title="HTF Bias & Structure" icon="📊" info="Higher Timeframe structure analysis using EMA 9/21/50 alignment, RSI, BOS signals, and Wyckoff phase. The bull% bar shows the overall directional score out of 100.">
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:4,marginBottom:6}}>
                  <Tile label="HTF Bias" value={setup.htf_bias} color={clsDir(setup.htf_bias)} info="Higher Timeframe Trend Bias. Bullish = price above EMA9 > EMA21 > EMA50 (stacked correctly). Bearish = inverse stack. Neutral = mixed alignment. This is the primary trend direction filter."/>
                  <Tile label="Phase" value={setup.phase} info="Wyckoff Market Phase. Accumulation = smart money quietly buying at lows. Markup = price rising with momentum. Distribution = smart money selling at highs. Markdown = price falling. Use phase to align with institutional intent."/>
                  <Tile label="Confidence" value={setup.confidence} color={setup.confidence==='High'?'text-bull':setup.confidence==='Medium'?'text-yellow-400':'text-bear'} info="Signal confidence based on how decisively the bull% score deviates from 50. High (>68% or <32%) = strong conviction. Medium (57-68%) = moderate. Low (43-57%) = uncertain — avoid trading in this zone."/>
                  <Tile label="RSI (14)" value={setup.rsi} color={+setup.rsi>70?'text-bear':+setup.rsi<30?'text-bull':'text-white'} info="Relative Strength Index (14 period). Measures momentum speed. Above 70 = overbought — price may be overextended, watch for reversal. Below 30 = oversold — potential bounce zone. Best used for divergence: price makes new high but RSI doesn't = bearish warning."/>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:6,padding:'4px'}}>
                  <span style={{fontSize:10,color:'#787b86',minWidth:28}}>Bull</span>
                  <div style={{flex:1,height:5,background:'#2a2e39',borderRadius:3,overflow:'hidden'}}>
                    <div style={{height:'100%',borderRadius:3,background:'linear-gradient(90deg,#26a69a,#2962ff)',width:`${setup.bull_pct||50}%`}}/>
                  </div>
                  <span style={{fontSize:10,color:'#787b86',minWidth:28,textAlign:'right'}}>Bear</span>
                </div>
                <p style={{fontSize:10,color:'#787b86',padding:'4px 4px 0'}}>{setup.bull_pct}% bull · {setup.bear_pct}% bear</p>
              </Section>

              <Section title="Volume Profile" icon="📊" open={true} info="Shows how much volume was traded at each price level. The histogram on the right edge of the chart visualises this — taller bars = more volume = stronger price levels. Orange line = POC, green dashed = VAH, red dashed = VAL.">
                {setup.vp_poc!=null&&(
                  <div style={{marginBottom:6}}>
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:4,marginBottom:6}}>
                      <Tile label="POC" value={fmt(setup.vp_poc,dec)} color="text-yellow-400" info="Point of Control — the single price level with the highest traded volume. Acts like a price magnet. Price often returns here. Expect a reaction (rejection or breakout) when price touches POC."/>
                      <Tile label="VAH" value={fmt(setup.vp_vah,dec)} color="text-bull" info="Value Area High — upper boundary where 70% of total volume was traded. Price above VAH = trading at a premium. Resistance when approached from below. If price breaks above VAH and holds, it signals bullish acceptance."/>
                      <Tile label="VAL" value={fmt(setup.vp_val,dec)} color="text-bear" info="Value Area Low — lower boundary of the 70% volume zone. Price below VAL = trading at a discount. Support when approached from above. If price breaks below VAL and holds, it signals bearish acceptance."/>
                    </div>
                    {setup.vp_hvn?.length>0&&<p style={{fontSize:10,color:'#ffd600',padding:'2px 4px'}}>HVN: {setup.vp_hvn.slice(0,3).map(p=>fmt(p,dec)).join(' · ')}</p>}
                    {setup.vp_lvn?.length>0&&<p style={{fontSize:10,color:'#546e7a',padding:'2px 4px'}}>LVN: {setup.vp_lvn.slice(0,3).map(p=>fmt(p,dec)).join(' · ')}</p>}
                    {price!=null&&setup.vp_poc!=null&&Math.abs(price-setup.vp_poc)/setup.vp_poc<0.005&&(
                      <div style={{marginTop:4,padding:'4px 8px',background:'#ff980018',borderRadius:4,border:'1px solid #ff980044',fontSize:10,color:'#ff9800'}}>⚡ Price at POC — watch for rejection or breakout</div>
                    )}
                  </div>
                )}
                {mtfVPScore&&(
                  <div style={{marginTop:4}}>
                    <p style={{fontSize:10,color:'#787b86',marginBottom:4}}>MTF VP Bias (1W·1D·4H·1H)</p>
                    <div style={{display:'flex',alignItems:'center',gap:6}}>
                      <span style={{fontSize:10,color:'#787b86',minWidth:28}}>Bull</span>
                      <div style={{flex:1,height:5,background:'#2a2e39',borderRadius:3,overflow:'hidden'}}>
                        <div style={{height:'100%',borderRadius:3,background:mtfVPScore.pct>65?'#26a69a':mtfVPScore.pct<35?'#ef5350':'#787b86',width:`${mtfVPScore.pct}%`}}/>
                      </div>
                      <span style={{fontSize:10,color:'#787b86',minWidth:28,textAlign:'right'}}>Bear</span>
                    </div>
                    <p style={{fontSize:10,color:mtfVPScore.pct>65?'#26a69a':mtfVPScore.pct<35?'#ef5350':'#787b86',padding:'4px 4px 0'}}>{mtfVPScore.label} · {mtfVPScore.pct}%</p>
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:3,marginTop:4}}>
                      {['1w','1d','4h','1h'].map(t=>{const v=mtfVP?.[t];if(!v||price==null)return null;const bull=price>v.poc;return(<div key={t} style={{background:'#131722',borderRadius:4,padding:'4px 6px',display:'flex',justifyContent:'space-between',alignItems:'center'}}><span style={{fontSize:10,color:'#787b86'}}>{t.toUpperCase()} POC</span><span style={{fontSize:10,fontWeight:600,color:bull?'#26a69a':'#ef5350'}}>{fmt(v.poc,dec)} {bull?'↑':'↓'}</span></div>);})}
                    </div>
                  </div>
                )}
                {!setup.vp_poc&&!mtfVPScore&&<p style={{fontSize:11,color:'#787b86'}}>Loading VP…</p>}
              </Section>

              <Section title="Momentum Indicators" icon="📈" open={false} info="Four momentum indicators combined into one score. Each confirms or contradicts the trend. Never use any single indicator alone — look for confluence (2+ agreeing) before acting.">
                {momentumSig&&(<>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:4,marginBottom:6}}>
                    <Tile label="RSI (14)" value={momentumSig.signals.rsi?.value} color={+momentumSig.signals.rsi?.value>70?'text-bear':+momentumSig.signals.rsi?.value<30?'text-bull':'text-white'} info="Relative Strength Index — momentum speed. Above 70 = overbought (potential reversal down). Below 30 = oversold (potential bounce). 50 = neutral. Key signal: divergence — price makes new high but RSI makes lower high = hidden bearish weakness."/>
                    <Tile label="MACD" value={momentumSig.signals.macd?.cross?momentumSig.signals.macd.cross==='bull'?'Bullish Cross':'Bearish Cross':momentumSig.signals.macd?.hist>0?'Bullish':'Bearish'} color={momentumSig.signals.macd?.hist>0?'text-bull':'text-bear'} info="MACD (12/26/9) — trend momentum. Bullish Cross = MACD line crosses above signal line (buy signal). Bearish Cross = crosses below (sell signal). Histogram above zero and expanding = momentum building. Histogram shrinking = momentum fading."/>
                    <Tile label="Stoch RSI K" value={momentumSig.signals.stoch?.k} color={+momentumSig.signals.stoch?.k<20?'text-bull':+momentumSig.signals.stoch?.k>80?'text-bear':'text-white'} info="Stochastic RSI — RSI of RSI. More sensitive than plain RSI. Below 20 = oversold (look for long entries at support). Above 80 = overbought (look for short entries at resistance). K crossing above D = bullish entry signal."/>
                    <Tile label="CMF (20)" value={momentumSig.signals.cmf?.value} color={+momentumSig.signals.cmf?.value>0?'text-bull':'text-bear'} info="Chaikin Money Flow — measures buy/sell pressure over 20 bars using volume × candle position. Above 0 = buying pressure dominant (bullish). Below 0 = selling pressure dominant (bearish). Above +0.25 = strong accumulation. Below -0.25 = strong distribution."/>
                  </div>
                  {momentumSig.signals.rsi?.divergence&&<div style={{padding:'4px 8px',background:'#ff980018',borderRadius:4,border:'1px solid #ff980044',fontSize:10,color:'#ff9800',marginBottom:4}}>⚡ RSI {momentumSig.signals.rsi.divergence.replace('_',' ')} divergence</div>}
                  {momentumSig.signals.bb?.squeeze&&<div style={{padding:'4px 8px',background:'#2962ff18',borderRadius:4,border:'1px solid #2962ff44',fontSize:10,color:'#2962ff',marginBottom:4}}>🔴 BB Squeeze inside Keltner — breakout imminent</div>}
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'4px 4px 0'}}>
                    <span style={{fontSize:10,color:'#787b86'}}>Momentum Score</span>
                    <span style={{fontSize:11,fontWeight:700,color:momentumSig.score>0?'#26a69a':momentumSig.score<0?'#ef5350':'#787b86'}}>{momentumSig.score>0?'+':''}{momentumSig.score}</span>
                  </div>
                </>)}
              </Section>

              <Section title="Market Microstructure" icon="🔬" open={false} info="Analyses the internal mechanics of price movement — who is actually buying vs selling at each candle. Reveals hidden institutional activity invisible on standard candle charts.">
                {microSig&&(<>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:4,marginBottom:6}}>
                    <Tile label="Order Flow" value={microSig.signals.dominance==='buy'?'Buy Dominant':microSig.signals.dominance==='sell'?'Sell Dominant':'Balanced'} color={microSig.signals.dominance==='buy'?'text-bull':microSig.signals.dominance==='sell'?'text-bear':'text-white'} info="Delta dominance over last 5 candles. Each candle's volume is split into buy-side (close near high) vs sell-side (close near low). Buy Dominant = more aggressive buyers. Sell Dominant = more aggressive sellers. Confirms or contradicts the price direction."/>
                    <Tile label="BVIX Proxy" value={microSig.bvix+'%'} color={microSig.bvix>5?'text-yellow-400':'text-white'} info="Volatility proxy — ATR(14) expressed as % of current price. Higher % = more volatile, wider stop-losses needed. Below 2% = low volatility (breakout possible). Above 5% = high volatility (reduce position size, expect larger swings)."/>
                    <Tile label="Absorption Zones" value={microSig.signals.absorptionZones} color={microSig.signals.absorptionZones>0?'text-yellow-400':'text-white'} info="Count of candles with high volume but small price range. This means large orders are absorbing price movement — a sign of institutional activity. Often appears at reversals where smart money is accumulating or distributing against retail pressure."/>
                    <Tile label="Delta Div" value={microSig.signals.cdDivergence?microSig.signals.cdDir:'None'} color={microSig.signals.cdDivergence?'text-yellow-400':'text-white'} info="Cumulative Delta Divergence — when price direction and net buying/selling pressure disagree. Price rising but delta falling = buyers are weakening, bearish warning. Price falling but delta rising = sellers are drying up, bullish warning. One of the strongest leading reversal signals."/>
                  </div>
                  {microSig.signals.cdDivergence&&<div style={{padding:'4px 8px',background:'#ff980018',borderRadius:4,border:'1px solid #ff980044',fontSize:10,color:'#ff9800',marginBottom:4}}>⚠ Cumulative delta divergence — {microSig.signals.cdDir}</div>}
                  {liqMap?.grabs?.length>0&&<div style={{padding:'4px 8px',background:'#ef535018',borderRadius:4,border:'1px solid #ef535044',fontSize:10,color:'#ef5350',marginBottom:4}}>⚡ {liqMap.grabs.length} liquidity grab(s) detected</div>}
                  <div style={{display:'flex',justifyContent:'space-between',padding:'4px 4px 0',fontSize:10}}>
                    <span style={{color:'#787b86'}}>Microstructure Score</span>
                    <span style={{fontWeight:700,color:microSig.score>0?'#26a69a':microSig.score<0?'#ef5350':'#787b86'}}>{microSig.score>0?'+':''}{microSig.score}</span>
                  </div>
                </>)}
              </Section>

              <Section title="OI & Funding Rate" icon="📊" open={false} info="Futures market data from Binance. Open Interest shows how many contracts are open. Funding Rate reveals whether the market is overleveraged long or short — extreme values are contrarian signals. Only available for crypto assets.">
                {oiFunding?(
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:4}}>
                    <Tile label="Open Interest" value={oiFunding.openInterest?Number(oiFunding.openInterest).toLocaleString(undefined,{notation:'compact',maximumFractionDigits:2}):'—'} info="Total number of outstanding futures contracts. Rising OI + rising price = strong trend (new money entering). Rising OI + falling price = strong downtrend. Falling OI + price move = short covering or profit taking — weaker move, likely to reverse."/>
                    <Tile label="Funding Rate" value={oiFunding.fundingRate!=null?(oiFunding.fundingRate*100).toFixed(4)+'%':'—'} color={oiFunding.fundingRate>0.001?'text-bear':oiFunding.fundingRate<-0.001?'text-bull':'text-white'} info="Fee paid every 8 hours between long and short traders. Positive = longs pay shorts (too many longs). Negative = shorts pay longs (too many shorts). Above +0.1% = market overleveraged long → contrarian bearish signal. Below -0.1% = overleveraged short → contrarian bullish signal. Extreme spikes = high-probability reversal zone."/>
                    <div style={{gridColumn:'1/-1',padding:'4px 8px',background:'#131722',borderRadius:4,fontSize:10,color:'#787b86'}}>{oiSig?.fundingSignal||'—'}</div>
                    {oiFunding.fundingRate!=null&&Math.abs(oiFunding.fundingRate)>0.001&&<div style={{gridColumn:'1/-1',padding:'4px 8px',background:oiFunding.fundingRate>0?'#ef535018':'#26a69a18',borderRadius:4,border:`1px solid ${oiFunding.fundingRate>0?'#ef535044':'#26a69a44'}`,fontSize:10,color:oiFunding.fundingRate>0?'#ef5350':'#26a69a'}}>⚡ {oiFunding.fundingRate>0.001?'Market overleveraged LONG — contrarian bearish signal':'Market overleveraged SHORT — contrarian bullish signal'}</div>}
                  </div>
                ):<p style={{fontSize:11,color:'#787b86'}}>{isCrypto(symbol)?'Loading futures data…':'OI data only for crypto'}</p>}
              </Section>

              <Section title="Intermarket Analysis" icon="🌐" open={false} info="Tracks macro market relationships that drive crypto and stock prices. These external forces can override technical setups — always check macro context before entering trades.">
                {intermarket?(
                  <div>
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:4,marginBottom:6}}>
                      {[['DXY',intermarket.dxyChg,true],['SPX',intermarket.spxChg,false],['Gold',intermarket.goldChg,false],['BTC.D',intermarket.btcDom?parseFloat(intermarket.btcDom).toFixed(1)+'%':null,false]].map(([label,val,inv])=>(
                        <div key={label} style={{background:'#131722',borderRadius:4,padding:'5px 8px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                          <span style={{fontSize:10,color:'#787b86'}}>{label}</span>
                          {val!=null?<span style={{fontSize:10,fontWeight:600,color:label==='BTC.D'?'#787b86':(typeof val==='number'?(inv?val<0:'#26a69a'?val>0:val<0):false)?'#26a69a':'#ef5350'}}>
                            {typeof val==='number'?(val>0?'+':'')+val.toFixed(2)+'%':val}
                          </span>:<span style={{fontSize:10,color:'#787b86'}}>—</span>}
                        </div>
                      ))}
                    </div>
                    {isCrypto(symbol)&&intermarket.dxyChg!=null&&(<div style={{padding:'4px 8px',background:'#131722',borderRadius:4,fontSize:10,color:'#787b86',marginBottom:4}}>
                      DXY {intermarket.dxyChg>0.3?'rising → bearish crypto pressure':intermarket.dxyChg<-0.3?'falling → bullish tailwind':'neutral'}
                      {intermarket.spxChg!=null&&` · SPX ${intermarket.spxChg>0.5?'risk-on ↑':intermarket.spxChg<-0.5?'risk-off ↓':'flat'}`}
                    </div>)}
                    <div style={{display:'flex',justifyContent:'space-between',padding:'4px 4px 0',fontSize:10}}>
                      <span style={{color:'#787b86'}}>Intermarket Score</span>
                      <span style={{fontWeight:700,color:imSig?.score>0?'#26a69a':imSig?.score<0?'#ef5350':'#787b86'}}>{imSig?.score>0?'+':''}{imSig?.score||0}</span>
                    </div>
                  </div>
                ):<p style={{fontSize:11,color:'#787b86'}}>Loading intermarket data…</p>}
              </Section>

              <Section title="Sentiment & Fear/Greed" icon="🧠" open={false} info="Market emotion indicators. Used as contrarian signals — extreme fear often marks bottoms, extreme greed marks tops. Combined with news NLP sentiment to score overall market mood.">
                {fearGreed&&(
                  <div style={{marginBottom:8}}>
                    <div style={{display:'flex',alignItems:'center',gap:8,padding:'6px 8px',background:'#131722',borderRadius:6,marginBottom:6}}>
                      <div style={{width:36,height:36,borderRadius:'50%',background:fearGreed.value<=25?'#26a69a22':fearGreed.value>=75?'#ef535022':'#ff980022',border:`2px solid ${fearGreed.value<=25?'#26a69a':fearGreed.value>=75?'#ef5350':'#ff9800'}`,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                        <span style={{fontSize:14,fontWeight:800,color:fearGreed.value<=25?'#26a69a':fearGreed.value>=75?'#ef5350':'#ff9800'}}>{fearGreed.value}</span>
                      </div>
                      <div>
                        <p style={{fontSize:12,fontWeight:700,color:'#d1d4dc'}}>{fearGreed.label}</p>
                        <p style={{fontSize:10,color:'#787b86'}}>Fear & Greed Index · prev: {fearGreed.previous}</p>
                      </div>
                      <div style={{marginLeft:'auto'}}>
                        {fearGreed.value<=25&&<span style={{fontSize:10,color:'#26a69a',fontWeight:600}}>Contrarian Bull</span>}
                        {fearGreed.value>=75&&<span style={{fontSize:10,color:'#ef5350',fontWeight:600}}>Contrarian Bear</span>}
                      </div>
                    </div>
                    <div style={{height:6,background:'linear-gradient(90deg,#26a69a,#ff9800,#ef5350)',borderRadius:3,position:'relative',marginBottom:4}}>
                      <div style={{position:'absolute',left:`${fearGreed.value}%`,top:-2,width:10,height:10,background:'#fff',borderRadius:'50%',transform:'translateX(-50%)',border:'2px solid #131722'}}/>
                    </div>
                    <div style={{display:'flex',justifyContent:'space-between',fontSize:9,color:'#787b86'}}>
                      <span>0 Extreme Fear</span><span>50</span><span>100 Extreme Greed</span>
                    </div>
                  </div>
                )}
                <div style={{display:'flex',justifyContent:'space-between',padding:'4px 4px 0',fontSize:10}}>
                  <span style={{color:'#787b86'}}>Sentiment Score</span>
                  <span style={{fontWeight:700,color:sentSig?.score>0?'#26a69a':sentSig?.score<0?'#ef5350':'#787b86'}}>{sentSig?.score>0?'+':''}{sentSig?.score||0}</span>
                </div>
              </Section>

              <Section title="Signal Breakdown" icon="⚖" open={false} info="Shows exactly how the Master Bias Score was calculated. Each row = one module. Bar extends right (green) = bullish contribution, left (red) = bearish. Number = raw score. % = weight in the final calculation. Dominant bars drive the overall signal.">
                {masterBias&&(<>
                  <div style={{marginBottom:6}}>
                    {masterBias.features.map((f,i)=>(
                      <div key={i} style={{display:'flex',alignItems:'center',gap:6,marginBottom:4}}>
                        <span style={{fontSize:10,color:'#787b86',minWidth:90,whiteSpace:'nowrap'}}>{f.n}</span>
                        <div style={{flex:1,height:4,background:'#2a2e39',borderRadius:2,overflow:'hidden',position:'relative'}}>
                          <div style={{position:'absolute',left:'50%',top:0,width:1,height:'100%',background:'#2a2e3988'}}/>
                          <div style={{position:'absolute',left:f.v>=0?'50%':`${50+f.v/2}%`,width:`${Math.abs(f.v)/2}%`,height:'100%',background:f.v>0?'#26a69a':'#ef5350',borderRadius:2}}/>
                        </div>
                        <span style={{fontSize:10,fontWeight:600,color:f.v>0?'#26a69a':f.v<0?'#ef5350':'#787b86',minWidth:32,textAlign:'right'}}>{f.v>0?'+':''}{Math.round(f.v)}</span>
                        <span style={{fontSize:9,color:'#787b86',minWidth:28}}>{Math.round(f.w*100)}%</span>
                      </div>
                    ))}
                  </div>
                </>)}
              </Section>

              <Section title="Next Candle Prediction" icon="🕯" info="Predicts the likely characteristics of the next candle based on current momentum, EMA alignment, and RSI. The neon yellow candles on the chart show the projected price path. Use the input in the header to control how many future candles to display.">
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:4,marginBottom:6}}>
                  <Tile label={`${tf} Type`} value={setup.next_type} info="Expected candlestick pattern for the next bar. Marubozu = strong directional candle with no wicks. Doji = indecision, market at inflection point. Hammer = bullish reversal signal at lows. Shooting Star = bearish reversal signal at highs."/>
                  <Tile label={`${tf} Direction`} value={setup.next_dir} color={clsDir(setup.next_dir)} info="Expected direction for the next candle based on the last 3 closes, EMA alignment, and RSI. Bullish = more closing up expected. Bearish = more closing down expected. Not a guaranteed signal — use with HTF bias confirmation."/>
                  <Tile label="Body Size" value={setup.next_size} info="Predicted candle body size relative to ATR. Large (>2% ATR) = significant move expected, possible breakout or strong trend candle. Medium = normal trending candle. Small (<0.8% ATR) = consolidation or indecision, breakout may follow."/>
                  <Tile label="Confidence" value={setup.confidence} info="Overall signal confidence. High = bull% above 68 or below 32 (strong directional conviction). Medium = 57–68 or 32–43. Low = 43–57 (conflicting signals, avoid trading). Always wait for High or Medium confidence before entering."/>
                </div>
              </Section>

              <Section title="Trade Setup" icon="🎯" info="Complete trade plan calculated from current price, ATR volatility, and signal direction. All levels are dynamically recalculated every 30 seconds. Not financial advice — use as a starting framework only.">
                <div style={{padding:'4px 8px 8px',background:'#131722',borderRadius:6,marginBottom:6,borderLeft:`3px solid ${setup.signal==='LONG'?'#26a69a':'#ef5350'}`}}>
                  <p style={{fontSize:10,color:'#787b86',marginBottom:4}}>Entry Zone <Info text="The optimal price range to enter the trade. For LONG: slightly below current price. For SHORT: slightly above. Entering within this zone gives the best risk-to-reward ratio relative to the calculated stop loss."/></p>
                  <p style={{fontSize:14,fontWeight:700,fontFamily:'monospace',color:'#d1d4dc'}}>{fmt(setup.entry_zone?.[0],dec)} – {fmt(setup.entry_zone?.[1],dec)}</p>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:4,marginBottom:4}}>
                  <div style={{background:'#131722',borderRadius:6,padding:'6px 8px',border:'1px solid #26a69a33'}}>
                    <p style={{fontSize:10,color:'#26a69a',fontWeight:600,display:'flex',alignItems:'center'}}>TP 1 <Info text="Take Profit 1 — first target at 2× ATR from entry. Higher probability of being reached. Recommended to take 50–70% of position here to lock in profit, then trail stop on remainder."/></p>
                    <p style={{fontSize:12,fontFamily:'monospace',color:'#d1d4dc',marginTop:2}}>{fmt(setup.take_profit_1,dec)}</p>
                    <p style={{fontSize:10,color:'#787b86',marginTop:1}}>{setup.rr1} R:R</p>
                  </div>
                  <div style={{background:'#131722',borderRadius:6,padding:'6px 8px',border:'1px solid #2962ff33'}}>
                    <p style={{fontSize:10,color:'#2962ff',fontWeight:600,display:'flex',alignItems:'center'}}>TP 2 <Info text="Take Profit 2 — extended target at 4× ATR from entry. Lower probability but much higher reward. Only move remaining position here after TP1 is hit and stop is moved to breakeven. Represents the full trend extension."/></p>
                    <p style={{fontSize:12,fontFamily:'monospace',color:'#d1d4dc',marginTop:2}}>{fmt(setup.take_profit_2,dec)}</p>
                    <p style={{fontSize:10,color:'#787b86',marginTop:1}}>{setup.rr2} R:R</p>
                  </div>
                </div>
                <div style={{background:'#131722',borderRadius:6,padding:'6px 8px',border:'1px solid #ef535033',marginBottom:4}}>
                  <p style={{fontSize:10,color:'#ef5350',fontWeight:600,display:'flex',alignItems:'center'}}>Stop Loss <Info text="Stop loss at 1.5× ATR below entry (LONG) or above entry (SHORT). Placed beyond normal volatility so random wicks don't stop you out. Never move your stop loss further away — if price reaches it, the setup has failed."/></p>
                  <p style={{fontSize:12,fontFamily:'monospace',color:'#d1d4dc',marginTop:2}}>{fmt(setup.stop_loss,dec)}</p>
                </div>
                <div style={{display:'flex',justifyContent:'space-between',padding:'6px 8px',background:'#131722',borderRadius:6}}>
                  <span style={{fontSize:11,color:'#787b86',display:'flex',alignItems:'center'}}>Suggested Leverage <Info text="Recommended futures leverage based on ATR volatility and RSI extremes. Lower leverage in high volatility or overbought/oversold conditions (ATR >2% of price or RSI >70/<30 = 3x). Medium volatility = 5x. Low volatility = up to 10x. Higher leverage = higher liquidation risk."/></span>
                  <span style={{fontSize:11,fontWeight:700,color:'#2962ff'}}>{setup.leverage}x</span>
                </div>
              </Section>

              <Section title="Key Levels" icon="📍" open={false} info="Critical price levels where stop-loss orders are clustered. Institutional players hunt these levels to trigger stops before reversing. Knowing these helps you avoid being stopped out and identify high-probability reversal zones.">
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:4}}>
                  <div>
                    <p style={{fontSize:10,color:'#26a69a',fontWeight:600,padding:'4px 8px',display:'flex',alignItems:'center'}}>BSL (Stop Hunt↑) <Info text="Buy-Side Liquidity — stop-loss orders from short sellers sitting just above recent swing highs. Institutions push price up to grab this liquidity before reversing down. When price wicks above a BSL level and closes back below, it's a high-probability short signal."/></p>
                    {setup.bsl.map((l,i)=><p key={i} style={{fontSize:11,fontFamily:'monospace',color:'#d1d4dc',padding:'2px 8px'}}>{fmt(l,dec)}</p>)}
                  </div>
                  <div>
                    <p style={{fontSize:10,color:'#ef5350',fontWeight:600,padding:'4px 8px',display:'flex',alignItems:'center'}}>SSL (Stop Hunt↓) <Info text="Sell-Side Liquidity — stop-loss orders from long buyers sitting just below recent swing lows. Institutions push price down to sweep these stops before reversing up. When price wicks below a SSL level and closes back above, it's a high-probability long signal."/></p>
                    {setup.ssl.map((l,i)=><p key={i} style={{fontSize:11,fontFamily:'monospace',color:'#d1d4dc',padding:'2px 8px'}}>{fmt(l,dec)}</p>)}
                  </div>
                </div>
                <div style={{marginTop:8,padding:'6px 8px',background:'#131722',borderRadius:6}}>
                  <div style={{display:'flex',justifyContent:'space-between',fontSize:10,marginBottom:4}}>
                    <span style={{color:'#787b86',display:'flex',alignItems:'center'}}>EMA 9 <Info text="9-period Exponential Moving Average — the fastest EMA. Tracks short-term momentum. Price above EMA9 = short-term bullish. Acts as dynamic support in strong uptrends, resistance in downtrends. Crosses with EMA21 give early trend change signals."/></span><span style={{color:'#d1d4dc',fontFamily:'monospace'}}>{fmt(setup.ema9,dec)}</span>
                  </div>
                  <div style={{display:'flex',justifyContent:'space-between',fontSize:10,marginBottom:4}}>
                    <span style={{color:'#787b86',display:'flex',alignItems:'center'}}>EMA 21 <Info text="21-period EMA — medium-term trend filter. Often used as the first major pullback zone in a trend. Price bouncing off EMA21 in an uptrend = high-probability long entry. EMA9 crossing above EMA21 = bullish signal."/></span><span style={{color:'#d1d4dc',fontFamily:'monospace'}}>{fmt(setup.ema21,dec)}</span>
                  </div>
                  <div style={{display:'flex',justifyContent:'space-between',fontSize:10}}>
                    <span style={{color:'#787b86',display:'flex',alignItems:'center'}}>EMA 50 <Info text="50-period EMA — major trend dividing line. Price above EMA50 = bullish macro environment. Below = bearish. Institutions watch the 50 EMA closely. A cross of EMA9 and EMA21 above EMA50 = strong bullish alignment (Golden Cross setup)."/></span><span style={{color:'#d1d4dc',fontFamily:'monospace'}}>{fmt(setup.ema50,dec)}</span>
                  </div>
                </div>
              </Section>

              <Section title={`News & Macro Impact${hiCount>0?` 🔴${hiCount}`:''}`} icon="📰" open={true} info="Live news aggregated from CNBC, Yahoo Finance, CoinDesk and Google News. Each headline is scored bullish/bearish using keyword NLP. HIGH IMPACT events (red badge) can override technical setups — always check before entering trades.">
                <NewsPanel nd={nd}/>
              </Section>

              <Section title="Analysis Summary" icon="📋" info="Quick-reference table combining all key outputs into one place. Use this as a final checklist before executing a trade — check that HTF Bias, Signal, and Confidence all align before entering.">
                <table className="sum-table"><tbody>
                  <tr><td>Asset</td><td>{symbol}</td></tr>
                  <tr><td>HTF Bias</td><td style={{color:setup.htf_bias==='Bullish'?'#26a69a':setup.htf_bias==='Bearish'?'#ef5350':'#d1d4dc'}}>{setup.htf_bias}</td></tr>
                  <tr><td>Phase</td><td>{setup.phase}</td></tr>
                  <tr><td>{tf} Candle</td><td>{setup.next_type} — <span style={{color:setup.next_dir==='Bullish'?'#26a69a':'#ef5350'}}>{setup.next_dir}</span></td></tr>
                  <tr><td>Confidence</td><td>{setup.confidence}</td></tr>
                  <tr><td>Entry</td><td>{fmt(setup.entry_zone?.[0],dec)} – {fmt(setup.entry_zone?.[1],dec)}</td></tr>
                  <tr><td>Stop Loss</td><td>{fmt(setup.stop_loss,dec)}</td></tr>
                  <tr><td>TP1 / TP2</td><td>{fmt(setup.take_profit_1,dec)} / {fmt(setup.take_profit_2,dec)}</td></tr>
                  <tr><td>R:R</td><td>{setup.rr1} / {setup.rr2}</td></tr>
                  <tr><td>Macro</td><td style={{color:macroC}}>{macroLbl||'—'}{hiCount>0?` (${hiCount} high)`:''}</td></tr>
                  <tr><td>RSI</td><td>{setup.rsi}</td></tr>
                  <tr><td>ATR</td><td>{setup.atr}</td></tr>
                </tbody></table>
                {(setup.future_candles?.length>0)&&<p style={{fontSize:10,color:'#FFC800',padding:'6px 4px 0'}}>● {futureCount||setup.future_candles.length} neon yellow predicted candles on chart</p>}
                <p style={{fontSize:9,color:'#787b86',padding:'8px 4px 0'}}>⚠ Not financial advice. Educational use only.</p>
              </Section>

              <div style={{padding:'8px',borderTop:'1px solid #2a2e39',marginTop:8,display:'flex',justifyContent:'space-between',fontSize:10,color:'#787b86'}}>
                <span>Binance · Yahoo Finance · RSS News</span>
                <span>⚡ 30s refresh</span>
              </div>
            </>
          )}
        </div>
      </div>

      {/* SEARCH MODAL */}
      {showSearch&&(
        <div className="search-modal" onClick={()=>{setShowSearch(false);setQuery('');setSearchCat('');}}>
          <div className="search-box" onClick={e=>e.stopPropagation()}>
            <div style={{display:'flex',alignItems:'center',padding:'0 16px',borderBottom:'1px solid #2a2e39'}}>
              <span style={{color:'#787b86',marginRight:8}}>🔍</span>
              <input ref={searchRef} className="search-input" placeholder="Search — BTC/USDT, AAPL, GLD, GC=F, ^GSPC…"
                value={query} onChange={e=>setQuery(e.target.value)}
                onKeyDown={e=>{if(e.key==='Enter'&&filtered.length)selectSym(filtered[0].symbol);if(e.key==='Escape')setShowSearch(false);}}/>
              <button onClick={()=>{setShowSearch(false);setQuery('');setSearchCat('');}} style={{background:'none',border:'none',color:'#787b86',cursor:'pointer',fontSize:16}}>✕</button>
            </div>
            <div style={{display:'flex',gap:0,padding:'6px 12px',borderBottom:'1px solid #2a2e39',flexWrap:'wrap'}}>
              {[{label:'All',val:''},{label:'Crypto',val:'crypto'},{label:'Stocks',val:'stock'},{label:'ETFs',val:'etf'},{label:'Commodities',val:'commodity'},{label:'Indices',val:'index'}].map(({label,val})=>(
                <button key={label} style={{padding:'3px 9px',borderRadius:4,border:'none',cursor:'pointer',fontSize:10,marginRight:3,marginBottom:2,background:searchCat===val?'#2962ff':'transparent',color:searchCat===val?'#fff':'#787b86'}} onClick={()=>setSearchCat(val)}>{label}</button>
              ))}
            </div>
            <div style={{overflowY:'auto',flex:1}}>
              {filtered.length===0&&<p style={{padding:16,color:'#787b86',fontSize:12,textAlign:'center'}}>No results found.</p>}
              {filtered.map(s=>(
                <div key={s.symbol} className="search-result" onClick={()=>selectSym(s.symbol)}>
                  <span className={`badge badge-${s.type}`}>{s.type.toUpperCase()}</span>
                  <div style={{flex:1}}><p style={{fontSize:13,fontWeight:600,color:'#d1d4dc'}}>{s.symbol}</p>{s.name&&<p style={{fontSize:11,color:'#787b86'}}>{s.name}</p>}</div>
                  <span style={{fontSize:10,color:'#787b86'}}>{s.exchange}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
};
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
