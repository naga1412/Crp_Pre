<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo}=React;

// ─── CONSTANTS ────────────────────────────────────────────────────────────────
const BINANCE_REST='https://api.binance.com/api/v3';
const BINANCE_WS='wss://stream.binance.com:9443/ws';
const TIMEFRAMES=['1m','5m','15m','1h','4h','1d','1w'];
const TF_SECS={'1m':60,'5m':300,'15m':900,'1h':3600,'4h':14400,'1d':86400,'1w':604800};
const BINANCE_TF={'1m':'1m','5m':'5m','15m':'15m','1h':'1h','4h':'4h','1d':'1d','1w':'1w'};
const YF_TF={'1m':['1m','1d'],'5m':['5m','5d'],'15m':['15m','60d'],'1h':['1h','1y'],'4h':['1h','2y'],'1d':['1d','5y'],'1w':['1wk','max']};

// ─── TA ENGINE (pure JS) ──────────────────────────────────────────────────────
function calcEMA(arr,p){
  if(!arr||arr.length<p) return arr.map(()=>arr[arr.length-1]||0);
  const k=2/(p+1),r=[];
  let s=0; for(let i=0;i<p;i++){s+=arr[i];r.push(null);} r[p-1]=s/p;
  for(let i=p;i<arr.length;i++) r.push(arr[i]*k+r[i-1]*(1-k));
  return r;
}
function calcRSI(c,p=14){
  if(c.length<=p) return c.map(()=>50);
  let g=0,l=0;
  for(let i=1;i<=p;i++){const d=c[i]-c[i-1];if(d>=0)g+=d;else l-=d;}
  let ag=g/p,al=l/p;
  const r=new Array(p).fill(50);
  r.push(al<1e-9?100:100-100/(1+ag/al));
  for(let i=p+1;i<c.length;i++){
    const d=c[i]-c[i-1];
    ag=((ag*(p-1))+(d>0?d:0))/p;
    al=((al*(p-1))+(d<0?-d:0))/p;
    r.push(al<1e-9?100:100-100/(1+ag/al));
  }
  return r;
}
function calcATR(h,l,c,p=14){
  const tr=[h[0]-l[0]];
  for(let i=1;i<h.length;i++) tr.push(Math.max(h[i]-l[i],Math.abs(h[i]-c[i-1]),Math.abs(l[i]-c[i-1])));
  let a=tr.slice(0,p).reduce((s,v)=>s+v,0)/p;
  const r=new Array(p-1).fill(null); r.push(a);
  for(let i=p;i<tr.length;i++){a=(a*(p-1)+tr[i])/p;r.push(a);}
  return r;
}
function detectSwings(h,l,lb=5){
  const sh=[],sl=[];
  for(let i=lb;i<h.length-lb;i++){
    if(h.slice(i-lb,i).every(x=>x<h[i])&&h.slice(i+1,i+lb+1).every(x=>x<h[i])) sh.push({idx:i,price:h[i]});
    if(l.slice(i-lb,i).every(x=>x>l[i])&&l.slice(i+1,i+lb+1).every(x=>x>l[i])) sl.push({idx:i,price:l[i]});
  }
  return{sh:sh.slice(-5),sl:sl.slice(-5)};
}
function detectFVG(candles){
  const r=[];
  for(let i=2;i<candles.length;i++){
    if(candles[i].low>candles[i-2].high) r.push({idx:i-1,type:'bull'});
    if(candles[i].high<candles[i-2].low) r.push({idx:i-1,type:'bear'});
  }
  return r.slice(-5);
}
function detectBOS(candles,sw){
  const r=[];
  for(let i=1;i<candles.length;i++){
    for(const s of sw.sh) if(i>s.idx&&candles[i].close>s.price&&candles[i-1].close<=s.price) r.push({idx:i,type:'bull'});
    for(const s of sw.sl) if(i>s.idx&&candles[i].close<s.price&&candles[i-1].close>=s.price) r.push({idx:i,type:'bear'});
  }
  return r.slice(-5);
}
function candleType(c){
  const body=Math.abs(c.close-c.open),range=c.high-c.low||1;
  const uw=c.high-Math.max(c.open,c.close),lw=Math.min(c.open,c.close)-c.low;
  if(body/range>0.75) return c.close>c.open?'Bullish Marubozu':'Bearish Marubozu';
  if(body/range<0.1) return 'Doji';
  if(lw>body*2&&uw<body) return 'Hammer / Bullish Reversal';
  if(uw>body*2&&lw<body) return 'Shooting Star / Bearish';
  return c.close>c.open?'Bullish Candle':'Bearish Candle';
}
function calcVolumeProfile(candles,numBuckets=100){
  if(!candles||candles.length<10)return null;
  const maxP=Math.max(...candles.map(c=>c.high));
  const minP=Math.min(...candles.map(c=>c.low));
  const rng=maxP-minP; if(rng<=0)return null;
  const bSz=rng/numBuckets;
  const vols=new Array(numBuckets).fill(0);
  for(const c of candles){
    const v=c.volume||0; if(!v)continue;
    const cRng=c.high-c.low||bSz;
    const iLo=Math.max(0,Math.floor((c.low-minP)/bSz));
    const iHi=Math.min(numBuckets-1,Math.ceil((c.high-minP)/bSz));
    for(let i=iLo;i<=iHi;i++){
      const bLo=minP+i*bSz,bHi=bLo+bSz;
      const ov=Math.min(c.high,bHi)-Math.max(c.low,bLo);
      if(ov>0) vols[i]+=v*(ov/cRng);
    }
  }
  let pocIdx=0;
  for(let i=1;i<numBuckets;i++) if(vols[i]>vols[pocIdx]) pocIdx=i;
  const poc=minP+(pocIdx+0.5)*bSz;
  const total=vols.reduce((s,v)=>s+v,0);
  const target=total*0.70;
  const inVA=new Array(numBuckets).fill(false);
  inVA[pocIdx]=true;
  let vaVol=vols[pocIdx],lo=pocIdx-1,hi=pocIdx+1;
  while(vaVol<target&&(lo>=0||hi<numBuckets)){
    const lv=lo>=0?vols[lo]:-1,rv=hi<numBuckets?vols[hi]:-1;
    if(lv>=rv&&lo>=0){inVA[lo]=true;vaVol+=vols[lo];lo--;}
    else if(hi<numBuckets){inVA[hi]=true;vaVol+=vols[hi];hi++;}
    else break;
  }
  let vahIdx=pocIdx,valIdx=pocIdx;
  for(let i=0;i<numBuckets;i++) if(inVA[i]){if(i>vahIdx)vahIdx=i;if(i<valIdx)valIdx=i;}
  const vah=minP+(vahIdx+1)*bSz,val=minP+valIdx*bSz;
  const avg=total/numBuckets;
  const hvn=[],lvn=[];
  for(let i=0;i<numBuckets;i++){
    const p=minP+(i+0.5)*bSz;
    if(vols[i]>avg*2.0) hvn.push(p);
    else if(vols[i]>0&&vols[i]<avg*0.3) lvn.push(p);
  }
  return{poc,vah,val,hvn,lvn,bSz,vols,minP,pocIdx,inVA};
}
// ─── MOMENTUM INDICATORS ──────────────────────────────────────────────────────
function calcMACD(C,fast=12,slow=26,sig=9){
  const ef=calcEMA(C,fast),es=calcEMA(C,slow);
  const ml=ef.map((v,i)=>(v!=null&&es[i]!=null)?v-es[i]:null);
  const valid=ml.filter(v=>v!=null);
  if(valid.length<sig) return{macd:0,signal:0,hist:0,cross:null,expansion:false};
  const sl=calcEMA(valid,sig);
  const hl=sl.map((v,i)=>(v!=null&&valid[i]!=null)?valid[i]-v:null);
  const lm=ml[ml.length-1]||0,pm=ml[ml.length-2]||0;
  const ls=sl[sl.length-1]||0,lh=hl[hl.length-1]||0,ph=hl[hl.length-2]||0;
  return{macd:lm,signal:ls,hist:lh,prevHist:ph,cross:lm>ls&&pm<=ls?'bull':lm<ls&&pm>=ls?'bear':null,expansion:Math.abs(lh)>Math.abs(ph)};
}
function calcStochRSI(C,per=14,sk=3,sd=3){
  const rsi=calcRSI(C,per);
  const sr=[];
  for(let i=per;i<rsi.length;i++){const w=rsi.slice(i-per,i);const mn=Math.min(...w),mx=Math.max(...w);sr.push(mx-mn<1e-9?0.5:(rsi[i]-mn)/(mx-mn));}
  const smK=[];for(let i=sk-1;i<sr.length;i++) smK.push(sr.slice(i-sk+1,i+1).reduce((a,b)=>a+b,0)/sk);
  const smD=[];for(let i=sd-1;i<smK.length;i++) smD.push(smK.slice(i-sd+1,i+1).reduce((a,b)=>a+b,0)/sd);
  return{k:(smK[smK.length-1]||0.5)*100,d:(smD[smD.length-1]||0.5)*100};
}
function calcCMF(candles,per=20){
  if(candles.length<per) return 0;
  let mfv=0,vol=0;
  for(const c of candles.slice(-per)){const hl=c.high-c.low||1;const mfm=((c.close-c.low)-(c.high-c.close))/hl;mfv+=mfm*(c.volume||0);vol+=c.volume||0;}
  return vol>0?mfv/vol:0;
}
function calcBB(C,per=20,mult=2){
  if(C.length<per) return null;
  const r=C.slice(-per);const mid=r.reduce((a,b)=>a+b,0)/per;
  const std=Math.sqrt(r.reduce((a,b)=>a+(b-mid)**2,0)/per);
  return{upper:mid+mult*std,middle:mid,lower:mid-mult*std,bandwidth:(mult*2*std)/mid};
}
function calcKeltner(candles,per=20,mult=1.5){
  if(candles.length<per) return null;
  const C=candles.map(c=>c.close);const ema=calcEMA(C,per);const mid=ema[ema.length-1];
  const atrA=calcATR(candles.map(c=>c.high),candles.map(c=>c.low),C,per);const atr=atrA[atrA.length-1];
  return{upper:mid+mult*atr,middle:mid,lower:mid-mult*atr,atr};
}
function detectRSIDivergence(C,rsi){
  if(C.length<12||rsi.length<12) return null;
  const pc=C.slice(-12),rc=rsi.slice(-12);
  const pPrev=pc.slice(0,6),pLast=pc.slice(6);
  const rPrev=rc.slice(0,6),rLast=rc.slice(6);
  const pH=Math.max(...pPrev),pL=Math.min(...pPrev),rH=Math.max(...rPrev),rL=Math.min(...rPrev);
  const cpH=Math.max(...pLast),cpL=Math.min(...pLast),crH=Math.max(...rLast),crL=Math.min(...rLast);
  if(cpH>pH&&crH<rH) return 'bearish_regular';
  if(cpL<pL&&crL>rL) return 'bullish_regular';
  if(cpH<pH&&crH>rH) return 'bullish_hidden';
  if(cpL>pL&&crL<rL) return 'bearish_hidden';
  return null;
}
// ─── MARKET MICROSTRUCTURE ────────────────────────────────────────────────────
function calcDelta(candles){
  return candles.map(c=>{
    const rng=c.high-c.low||1;
    const buyF=(c.close-c.low)/rng;
    return{buy:c.volume*buyF,sell:c.volume*(1-buyF),delta:c.volume*(2*buyF-1),total:c.volume||0};
  });
}
function detectAbsorption(candles,atrVal){
  const vols=candles.map(c=>c.volume||0);
  const avg=vols.reduce((a,b)=>a+b,0)/vols.length||1;
  return candles.map((c,i)=>((c.volume||0)>avg*2&&(c.high-c.low)<atrVal*0.5)?{price:(c.high+c.low)/2,idx:i,strength:(c.volume||0)/avg}:null).filter(Boolean);
}
function detectLiquidityGrabs(candles,levels){
  const g=[];
  for(let i=2;i<candles.length;i++){
    const c=candles[i],p=candles[i-1];
    for(const lv of levels){
      if(c.high>lv&&c.close<lv&&c.close<p.close) g.push({idx:i,price:lv,type:'bear'});
      if(c.low<lv&&c.close>lv&&c.close>p.close) g.push({idx:i,price:lv,type:'bull'});
    }
  }
  return g.slice(-5);
}
function calcBVIXProxy(candles,per=14){
  const a=calcATR(candles.map(c=>c.high),candles.map(c=>c.low),candles.map(c=>c.close),per);
  return ((a[a.length-1]||0)/(candles[candles.length-1]?.close||1))*100;
}
// ─── SCORING ENGINES ──────────────────────────────────────────────────────────
function calcMomentumScore(candles){
  if(!candles||candles.length<55) return{score:0,signals:{}};
  const C=candles.map(c=>c.close);
  const rsi=calcRSI(C,14);const lRSI=rsi[rsi.length-1]||50;
  const macd=calcMACD(C);const stoch=calcStochRSI(C);const cmf=calcCMF(candles);
  const bb=calcBB(C);const klt=calcKeltner(candles);const div=detectRSIDivergence(C,rsi);
  let sc=0;
  const rsiSc=lRSI>70?-15:lRSI<30?15:lRSI>55?8:lRSI<45?-8:0; sc+=rsiSc;
  if(div==='bullish_regular'||div==='bullish_hidden') sc+=15;
  if(div==='bearish_regular'||div==='bearish_hidden') sc-=15;
  const mSc=macd.cross==='bull'?15:macd.cross==='bear'?-15:macd.hist>0&&macd.expansion?8:macd.hist<0&&macd.expansion?-8:macd.hist>0?4:macd.hist<0?-4:0; sc+=mSc;
  const sSc=stoch.k<20?10:stoch.k>80?-10:stoch.k>stoch.d?4:-4; sc+=sSc;
  const cSc=cmf>0.05?10:cmf<-0.05?-10:cmf>0?4:-4; sc+=cSc;
  let squeeze=false;
  if(bb&&klt) squeeze=bb.upper<klt.upper&&bb.lower>klt.lower;
  return{score:Math.max(-100,Math.min(100,sc)),bb,klt,squeeze,signals:{
    rsi:{value:lRSI.toFixed(1),score:rsiSc,divergence:div},
    macd:{value:macd.macd?.toFixed(5),hist:macd.hist?.toFixed(5),cross:macd.cross,score:mSc},
    stoch:{k:stoch.k.toFixed(1),d:stoch.d.toFixed(1),score:sSc},
    cmf:{value:cmf.toFixed(3),score:cSc},
    bb:{bandwidth:bb?.bandwidth?.toFixed(4),squeeze}
  }};
}
function calcMicrostructureScore(candles){
  if(!candles||candles.length<20) return{score:0,signals:{}};
  const atrA=calcATR(candles.map(c=>c.high),candles.map(c=>c.low),candles.map(c=>c.close),14);
  const atr=atrA[atrA.length-1]||1;
  const deltas=calcDelta(candles);
  const cums=[];let cum=0;deltas.forEach(d=>{cum+=d.delta;cums.push(cum);});
  const rc=candles.map(c=>c.close).slice(-10),rd=cums.slice(-10);
  const priceUp=rc[9]>rc[0],deltaUp=rd[9]>rd[0];
  const cdDiv=priceUp!==deltaUp;
  const last5=deltas.slice(-5);
  const buyP=last5.reduce((a,b)=>a+b.buy,0),sellP=last5.reduce((a,b)=>a+b.sell,0);
  const dom=buyP>sellP*1.2?'buy':sellP>buyP*1.2?'sell':'neutral';
  const absorb=detectAbsorption(candles.slice(-30),atr);
  const bvix=calcBVIXProxy(candles);
  let sc=0;
  if(dom==='buy') sc+=20;else if(dom==='sell') sc-=20;
  if(cdDiv&&priceUp) sc-=15;else if(cdDiv&&!priceUp) sc+=15;
  if(absorb.length>0) sc+=5;
  return{score:Math.max(-100,Math.min(100,sc)),absorb,bvix,signals:{dominance:dom,cdDivergence:cdDiv,cdDir:priceUp?'price↑/delta↓':'price↓/delta↑',absorptionZones:absorb.length,bvix:bvix.toFixed(2)}};
}
function calcLiquidityMap(candles){
  if(!candles||candles.length<20) return{clusters:[],grabs:[],bsl:[],ssl:[]};
  const H=candles.map(c=>c.high),L=candles.map(c=>c.low);
  const sw=detectSwings(H,L);

  const grabs=detectLiquidityGrabs(candles.slice(-50),[...bsl,...ssl]);

}
function calcOIScore(oiData,candles){
  if(!oiData) return{score:0,signal:'No OI Data',fundingSignal:'—'};
  const fr=oiData.fundingRate;
  let sc=0;
  const fsig=fr==null?'—':fr>0.001?'Overleveraged Long':fr<-0.001?'Overleveraged Short':fr>0.0003?'Slight Long Bias':fr<-0.0003?'Slight Short Bias':'Neutral';
  if(fr!=null){if(fr>0.001)sc-=20;else if(fr<-0.001)sc+=20;else if(fr>0.0003)sc-=10;else if(fr<-0.0003)sc+=10;}
  return{score:Math.max(-100,Math.min(100,sc)),signal:'Futures',fundingSignal:fsig,fundingRate:fr,openInterest:oiData.openInterest};
}
function calcIntermarketScore(im,crypto){
  if(!im) return{score:0,signals:{}};
  const{dxyChg,spxChg,goldChg,btcDom}=im;let sc=0;
  if(crypto){if(dxyChg!=null)sc+=(dxyChg>0.3?-10:dxyChg<-0.3?10:0);if(spxChg!=null)sc+=(spxChg>0.5?10:spxChg<-0.5?-10:0);}
  else{if(dxyChg!=null)sc+=(dxyChg>0.3?-5:dxyChg<-0.3?5:0);if(spxChg!=null)sc+=(spxChg>0.5?15:spxChg<-0.5?-15:0);}
  return{score:Math.max(-50,Math.min(50,sc)),signals:{dxyChg,spxChg,goldChg,btcDom}};

function calcSentimentScore(fg,nd){

  if(fg?.value!=null){if(fg.value<=25)sc+=20;else if(fg.value>=75)sc-=20;else if(fg.value<=40)sc+=10;else if(fg.value>=60)sc-=10;}
  if(nd){const{bullish=0,bearish=0}=nd.overall_sentiment||{};const tot=bullish+bearish||1;sc+=Math.max(-10,Math.min(10,(bullish-bearish)/tot*10));}

}
function calcMasterBias(setup,momSig,microSig,oiSig,imSig,sentSig,mtfVP,price){
  if(!setup) return null;
  const bPct=setup.bull_pct||50;
  const smcRaw=(bPct-50)*2;
  const wPhase={'Markup':30,'Accumulation':15,'Distribution':-15,'Markdown':-30};
  const wyRaw=wPhase[setup.phase]||0;
  let vpRaw=0;
  if(mtfVP&&price!=null){const W={'1w':40,'1d':30,'4h':20,'1h':10};let ws=0,wt=0;for(const[t,w]of Object.entries(W)){const vp=mtfVP[t];if(vp){wt+=w;ws+=(price>vp.poc?w:-w*0.5);}}if(wt>0)vpRaw=Math.round(ws/wt*100);}
  const features=[
    {n:'SMC',v:smcRaw,w:0.20},{n:'Wyckoff',v:wyRaw,w:0.10},{n:'VP',v:vpRaw,w:0.10},
    {n:'OI/Funding',v:oiSig?.score||0,w:0.10},{n:'Momentum',v:momSig?.score||0,w:0.10},
    {n:'Microstructure',v:microSig?.score||0,w:0.10},{n:'Sentiment',v:sentSig?.score||0,w:0.05},
    {n:'Intermarket',v:imSig?.score||0,w:0.05},
  ];
  const weighted=features.reduce((a,f)=>a+f.v*f.w,0);
  const mlBoost=weighted*0.10;
  const master=Math.max(-100,Math.min(100,weighted+mlBoost));
  const mlConf=Math.round(Math.min(100,50+Math.abs(weighted)/2));
  const label=master>60?'Strong Bullish':master>30?'Bullish':master<-60?'Strong Bearish':master<-30?'Bearish':'Neutral';
  const color=master>30?'#26a69a':master<-30?'#ef5350':'#787b86';
  return{score:Math.round(master),label,color,mlConf,features:features.sort((a,b)=>Math.abs(b.v*b.w)-Math.abs(a.v*a.w))};
}

function futureCandlesSim(candles,signal,atr,count){
  let p=candles[candles.length-1].close;
  return Array.from({length:count},(_,i)=>{
    const dir=signal==='LONG'?1:-1;
    const move=dir*atr*0.38*(1+Math.sin(i)*0.2);
    const o=p,c=p+move,wick=atr*0.15;
    p=c;
    return{open:o,high:Math.max(o,c)+wick,low:Math.min(o,c)-wick,close:c};
  });

function generateSetup(candles,price){
  if(!candles||candles.length<55) return null;
  const C=candles.map(c=>c.close),H=candles.map(c=>c.high),L=candles.map(c=>c.low);
  const e9=calcEMA(C,9),e21=calcEMA(C,21),e50=calcEMA(C,50);
  const rsi=calcRSI(C,14),atrArr=calcATR(H,L,C,14);
  const le9=e9[e9.length-1]||price,le21=e21[e21.length-1]||price,le50=e50[e50.length-1]||price;
  const lRSI=rsi[rsi.length-1]||50,lATR=atrArr[atrArr.length-1]||price*0.01;
  const sw=detectSwings(H,L);
  const fvg=detectFVG(candles),bos=detectBOS(candles,sw);
  const bullBias=price>le9&&le9>le21&&le21>le50;
  const bearBias=price<le9&&le9<le21&&le21<le50;
  const htf=bullBias?'Bullish':bearBias?'Bearish':'Neutral';
  const vp=calcVolumeProfile(candles);
  const vpBull=vp?(price>vp.val&&price<vp.poc?5:price>vp.poc?5:0):0;
  const bullPct=(price>le9?25:0)+(price>le21?20:0)+(price>le50?15:0)+(lRSI>50?20:0)+(bos.filter(b=>b.type==='bull').length>0?20:0)+vpBull;
  let signal=bearBias&&lRSI>35?'SHORT':'LONG';
  if(bullBias&&lRSI<72) signal='LONG';
  if(vp&&bullPct>=48&&bullPct<=52) signal=price>vp.poc?'LONG':'SHORT';
  const isL=signal==='LONG';
  const sl=isL?price-lATR*1.5:price+lATR*1.5;
  const tp1=isL?price+lATR*2:price-lATR*2;
  const tp2=isL?price+lATR*4:price-lATR*4;
  const d=Math.abs(price-sl)||1;
  const rh=H.slice(-30).sort((a,b)=>b-a),rl=L.slice(-30).sort((a,b)=>a-b);
  let phase='Accumulation';
  if(bullBias&&lRSI>55) phase='Markup';
  else if(bearBias&&lRSI<45) phase='Markdown';
  else if(price>le50&&lRSI>60) phase='Distribution';
  const lc=candles[candles.length-1];
  const TF_DEF={'1m':60,'5m':24,'15m':12,'1h':8,'4h':6,'1d':1,'1w':1};
  return{
    signal,htf_bias:htf,phase,bull_pct:bullPct,bear_pct:100-bullPct,
    rsi:lRSI.toFixed(1),atr:lATR.toFixed(price>100?2:6),
    ema9:le9,ema21:le21,ema50:le50,
    entry_zone:[isL?price*0.9998:price,isL?price:price*1.0002],
    stop_loss:sl,take_profit_1:tp1,take_profit_2:tp2,
    rr1:`1:${(Math.abs(tp1-price)/d).toFixed(1)}`,
    rr2:`1:${(Math.abs(tp2-price)/d).toFixed(1)}`,
    leverage:lRSI<30||lRSI>70?3:lATR/price<0.01?10:5,
    fvg,bos,
    bsl:[rh[0],rh[1],rh[2]].filter(Boolean),
    ssl:[rl[0],rl[1],rl[2]].filter(Boolean),
    next_dir:C.slice(-3)[2]>C.slice(-3)[0]?'Bullish':'Bearish',
    next_type:candleType(lc),
    next_size:lATR/price>0.02?'Large':lATR/price>0.008?'Medium':'Small',
    confidence:bullPct>68||bullPct<32?'High':bullPct>57||bullPct<43?'Medium':'Low',
    future_candles:futureCandlesSim(candles,signal,lATR,12),
    vp_poc:vp?.poc||null,vp_vah:vp?.vah||null,vp_val:vp?.val||null,
    vp_hvn:vp?.hvn||[],vp_lvn:vp?.lvn||[],vp,
  };
}

function isCrypto(s){return s.includes('/');}
async function fetchBinance(symbol,tf,limit=600){
  const sym=symbol.replace('/','');
  const r=await fetch(`${BINANCE_REST}/klines?symbol=${sym}&interval=${BINANCE_TF[tf]||'1h'}&limit=${limit}`);
  if(!r.ok) throw new Error(`Binance ${r.status}`);
  return (await r.json()).map(k=>({timestamp:+k[0],open:+k[1],high:+k[2],low:+k[3],close:+k[4],volume:+k[5]}));
}
async function fetchYF(symbol,tf,limit=600){
  const[iv,range]=YF_TF[tf]||['1h','1y'];
  const enc=encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=${iv}&range=${range}&includePrePost=false`);
  let data;
  const proxies=[
    `https://api.allorigins.win/raw?url=${enc}`,
    `https://corsproxy.io/?${enc}`,
  ];
  let lastErr;
  for(const p of proxies){
    try{const r=await fetch(p);if(r.ok){data=await r.json();break;}}
    catch(e){lastErr=e;}
  }
  if(!data) throw new Error(`No data for ${symbol}: ${lastErr}`);
  const res=data?.chart?.result?.[0];
  if(!res) throw new Error(`Empty chart data for ${symbol}`);
  const ts=res.timestamp,q=res.indicators?.quote?.[0];
  if(!ts||!q) throw new Error(`Missing OHLCV for ${symbol}`);
  let candles=ts.map((t,i)=>({timestamp:t*1000,open:q.open?.[i],high:q.high?.[i],low:q.low?.[i],close:q.close?.[i],volume:q.volume?.[i]||0}))
    .filter(c=>c.open&&c.high&&c.low&&c.close&&isFinite(c.close));
  if(tf==='4h'){
    const b=[];
    for(let i=0;i<candles.length;i+=4){
      const s=candles.slice(i,i+4);if(!s.length)continue;
      b.push({timestamp:s[0].timestamp,open:s[0].open,high:Math.max(...s.map(x=>x.high)),low:Math.min(...s.map(x=>x.low)),close:s[s.length-1].close,volume:s.reduce((a,c)=>a+c.volume,0)});
    }
    candles=b;
  }
  return candles.slice(-limit);
}
async function fetchCandles(symbol,tf,limit=600){
  return isCrypto(symbol)?fetchBinance(symbol,tf,limit):fetchYF(symbol,tf,limit);
}

const CORS_PROXIES=[
  u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u=>`https://corsproxy.io/?${encodeURIComponent(u)}`,
  u=>`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,

async function fetchRSS(feed){
  for(const proxy of CORS_PROXIES){
    try{
      const ctrl=new AbortController();
      const tid=setTimeout(()=>ctrl.abort(),8000);
      const r=await fetch(proxy(feed.u),{signal:ctrl.signal});
      clearTimeout(tid);
      if(!r.ok) continue;
      const text=await r.text();
      if(!text||text.trim().startsWith('{')&&!text.includes('<item')) continue; // got JSON error response
      const doc=new DOMParser().parseFromString(text,'text/xml');
      const items=[...doc.querySelectorAll('item')];
      if(!items.length) continue;
      return items.map(el=>{
        // link: sometimes inside CDATA or as text
        const link=el.querySelector('link')?.textContent?.trim()||
                   el.getElementsByTagName('link')?.[0]?.nextSibling?.nodeValue?.trim()||'';
        return{
          title:(el.querySelector('title')?.textContent||'').trim(),
          link, pubDate:(el.querySelector('pubDate')?.textContent||'').trim(),
        };
      }).filter(i=>i.title.length>5);
    }catch(_){continue;}
  }
  return [];
}

function scoreItem(title){
  const t=title.toLowerCase();
  const bull=KWB.filter(k=>t.includes(k)).length,bear=KWR.filter(k=>t.includes(k)).length;
  const hi=['war','invasion','attack','rate cut','rate hike','crash','recession','ceasefire','default','nuclear'].some(k=>t.includes(k))?2:1;
  if(bull>bear){const p=Math.min(1+bull*0.7*hi,5);return{sentiment:'bullish',impact_pct:+p.toFixed(1),impact_label:p>=3?'HIGH':p>=1.5?'MEDIUM':'LOW'};}
  if(bear>bull){const p=Math.min(1+bear*0.7*hi,5);return{sentiment:'bearish',impact_pct:+p.toFixed(1),impact_label:p>=3?'HIGH':p>=1.5?'MEDIUM':'LOW'};}
  return{sentiment:'neutral',impact_pct:0.3,impact_label:'LOW'};
}

async function fetchFreshNews(){
  const all=[];

    const items=await fetchRSS(feed);
    for(const it of items){
      if(!it.title) continue;

}

// Build a name lookup from the hardcoded list so we can enrich dynamic symbols
const KNOWN_NAMES={};
CRYPTO_LIST.forEach(c=>{const b=c.symbol.split('/')[0];KNOWN_NAMES[b]=c.name;});

async function fetchAllBinanceSymbols(){
  try{
    const r=await fetch('https://api.binance.com/api/v3/exchangeInfo');
    if(!r.ok) return null;
    const d=await r.json();
    const usdt=d.symbols
      .filter(s=>s.status==='TRADING'&&s.quoteAsset==='USDT')
      .map(s=>({symbol:s.baseAsset+'/USDT',name:KNOWN_NAMES[s.baseAsset]||s.baseAsset,exchange:'Binance',type:'crypto'}))
      .sort((a,b)=>a.symbol.localeCompare(b.symbol));
    return usdt;
  }catch(_){return null;}
}

function smartDec(p){if(!p||p<=0)return 2;if(p<0.0001)return 8;if(p<0.01)return 6;if(p<1)return 4;if(p<100)return 3;if(p<10000)return 2;return 1;}
function fmt(v,d){if(v==null)return'—';return Number(v).toLocaleString(undefined,{minimumFractionDigits:Math.min(d??2,8),maximumFractionDigits:Math.min(d??2,8)});}
function clsDir(d){return d==='Bullish'?'text-bull':'text-bear';}
const tsToSec=ts=>{const s=String(ts).replace(' ','T');return Math.floor(new Date(s.endsWith('Z')?s:s+'Z').getTime()/1000);};
