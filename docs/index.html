<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo}=React;

// ─── CONSTANTS ────────────────────────────────────────────────────────────────
const BINANCE_REST='https://api.binance.com/api/v3';
const BINANCE_FAPI='https://fapi.binance.com/fapi/v1';
const BINANCE_WS='wss://stream.binance.com:9443/ws';
const BINANCE_FWS='wss://fstream.binance.com/ws';
const TIMEFRAMES=['1m','5m','15m','1h','4h','1d','1w'];
const TF_SECS={'1m':60,'5m':300,'15m':900,'1h':3600,'4h':14400,'1d':86400,'1w':604800};
const BINANCE_TF={'1m':'1m','5m':'5m','15m':'15m','1h':'1h','4h':'4h','1d':'1d','1w':'1w'};
const YF_TF={'1m':['1m','1d'],'5m':['5m','5d'],'15m':['15m','60d'],'1h':['1h','1y'],'4h':['1h','2y'],'1d':['1d','5y'],'1w':['1wk','max']};

// ─── TA ENGINE (pure JS) ──────────────────────────────────────────────────────
function calcEMA(arr,p){
  if(!arr||arr.length<p) return arr.map(()=>arr[arr.length-1]||0);
  const k=2/(p+1),r=[];
  let s=0; for(let i=0;i<p;i++){s+=arr[i];r.push(null);} r[p-1]=s/p;
  for(let i=p;i<arr.length;i++) r.push(arr[i]*k+r[i-1]*(1-k));
  return r;
}
function calcRSI(c,p=14){
  if(c.length<=p) return c.map(()=>50);
  let g=0,l=0;
  for(let i=1;i<=p;i++){const d=c[i]-c[i-1];if(d>=0)g+=d;else l-=d;}
  let ag=g/p,al=l/p;
  const r=new Array(p).fill(50);
  r.push(al<1e-9?100:100-100/(1+ag/al));
  for(let i=p+1;i<c.length;i++){
    const d=c[i]-c[i-1];
    ag=((ag*(p-1))+(d>0?d:0))/p;
    al=((al*(p-1))+(d<0?-d:0))/p;
    r.push(al<1e-9?100:100-100/(1+ag/al));
  }
  return r;
}
function calcATR(h,l,c,p=14){
  const tr=[h[0]-l[0]];
  for(let i=1;i<h.length;i++) tr.push(Math.max(h[i]-l[i],Math.abs(h[i]-c[i-1]),Math.abs(l[i]-c[i-1])));
  let a=tr.slice(0,p).reduce((s,v)=>s+v,0)/p;
  const r=new Array(p-1).fill(null); r.push(a);
  for(let i=p;i<tr.length;i++){a=(a*(p-1)+tr[i])/p;r.push(a);}
  return r;
}
function detectSwings(h,l,lb=5){
  const sh=[],sl=[];
  for(let i=lb;i<h.length-lb;i++){
    if(h.slice(i-lb,i).every(x=>x<h[i])&&h.slice(i+1,i+lb+1).every(x=>x<h[i])) sh.push({idx:i,price:h[i]});
    if(l.slice(i-lb,i).every(x=>x>l[i])&&l.slice(i+1,i+lb+1).every(x=>x>l[i])) sl.push({idx:i,price:l[i]});
  }
  return{sh:sh.slice(-5),sl:sl.slice(-5)};
}
function detectFVG(candles){
  const r=[];
  for(let i=2;i<candles.length;i++){
    if(candles[i].low>candles[i-2].high) r.push({idx:i-1,type:'bull'});
    if(candles[i].high<candles[i-2].low) r.push({idx:i-1,type:'bear'});
  }
  return r.slice(-5);
}
function detectBOS(candles,sw){
  const r=[];
  for(let i=1;i<candles.length;i++){
    for(const s of sw.sh) if(i>s.idx&&candles[i].close>s.price&&candles[i-1].close<=s.price) r.push({idx:i,type:'bull'});
    for(const s of sw.sl) if(i>s.idx&&candles[i].close<s.price&&candles[i-1].close>=s.price) r.push({idx:i,type:'bear'});
  }
  return r.slice(-5);
}
function candleType(c){
  const body=Math.abs(c.close-c.open),range=c.high-c.low||1;
  const uw=c.high-Math.max(c.open,c.close),lw=Math.min(c.open,c.close)-c.low;
  if(body/range>0.75) return c.close>c.open?'Bullish Marubozu':'Bearish Marubozu';
  if(body/range<0.1) return 'Doji';
  if(lw>body*2&&uw<body) return 'Hammer / Bullish Reversal';
  if(uw>body*2&&lw<body) return 'Shooting Star / Bearish';
  return c.close>c.open?'Bullish Candle':'Bearish Candle';
}
function calcVolumeProfile(candles,numBuckets=100){
  if(!candles||candles.length<10)return null;
  const maxP=Math.max(...candles.map(c=>c.high));
  const minP=Math.min(...candles.map(c=>c.low));
  const rng=maxP-minP; if(rng<=0)return null;
  const bSz=rng/numBuckets;
  const vols=new Array(numBuckets).fill(0);
  for(const c of candles){
    const v=c.volume||0; if(!v)continue;
    const cRng=c.high-c.low||bSz;
    const iLo=Math.max(0,Math.floor((c.low-minP)/bSz));
    const iHi=Math.min(numBuckets-1,Math.ceil((c.high-minP)/bSz));
    for(let i=iLo;i<=iHi;i++){
      const bLo=minP+i*bSz,bHi=bLo+bSz;
      const ov=Math.min(c.high,bHi)-Math.max(c.low,bLo);
      if(ov>0) vols[i]+=v*(ov/cRng);
    }
  }
  let pocIdx=0;
  for(let i=1;i<numBuckets;i++) if(vols[i]>vols[pocIdx]) pocIdx=i;
  const poc=minP+(pocIdx+0.5)*bSz;
  const total=vols.reduce((s,v)=>s+v,0);
  const target=total*0.70;
  const inVA=new Array(numBuckets).fill(false);
  inVA[pocIdx]=true;
  let vaVol=vols[pocIdx],lo=pocIdx-1,hi=pocIdx+1;
  while(vaVol<target&&(lo>=0||hi<numBuckets)){
    const lv=lo>=0?vols[lo]:-1,rv=hi<numBuckets?vols[hi]:-1;
    if(lv>=rv&&lo>=0){inVA[lo]=true;vaVol+=vols[lo];lo--;}
    else if(hi<numBuckets){inVA[hi]=true;vaVol+=vols[hi];hi++;}
    else break;
  }
  let vahIdx=pocIdx,valIdx=pocIdx;
  for(let i=0;i<numBuckets;i++) if(inVA[i]){if(i>vahIdx)vahIdx=i;if(i<valIdx)valIdx=i;}
  const vah=minP+(vahIdx+1)*bSz,val=minP+valIdx*bSz;
  const avg=total/numBuckets;
  const hvn=[],lvn=[];
  for(let i=0;i<numBuckets;i++){
    const p=minP+(i+0.5)*bSz;
    if(vols[i]>avg*2.0) hvn.push(p);
    else if(vols[i]>0&&vols[i]<avg*0.3) lvn.push(p);
  }
  return{poc,vah,val,hvn,lvn,bSz,vols,minP,pocIdx,inVA};
}
// ─── MOMENTUM INDICATORS ──────────────────────────────────────────────────────
function calcMACD(C,fast=12,slow=26,sig=9){
  const ef=calcEMA(C,fast),es=calcEMA(C,slow);
  const ml=ef.map((v,i)=>(v!=null&&es[i]!=null)?v-es[i]:null);
  const valid=ml.filter(v=>v!=null);
  if(valid.length<sig) return{macd:0,signal:0,hist:0,cross:null,expansion:false};
  const sl=calcEMA(valid,sig);
  const hl=sl.map((v,i)=>(v!=null&&valid[i]!=null)?valid[i]-v:null);
  const lm=ml[ml.length-1]||0,pm=ml[ml.length-2]||0;
  const ls=sl[sl.length-1]||0,lh=hl[hl.length-1]||0,ph=hl[hl.length-2]||0;
  return{macd:lm,signal:ls,hist:lh,prevHist:ph,cross:lm>ls&&pm<=ls?'bull':lm<ls&&pm>=ls?'bear':null,expansion:Math.abs(lh)>Math.abs(ph)};
}
function calcStochRSI(C,per=14,sk=3,sd=3){
  const rsi=calcRSI(C,per);
  const sr=[];
  for(let i=per;i<rsi.length;i++){const w=rsi.slice(i-per,i);const mn=Math.min(...w),mx=Math.max(...w);sr.push(mx-mn<1e-9?0.5:(rsi[i]-mn)/(mx-mn));}
  const smK=[];for(let i=sk-1;i<sr.length;i++) smK.push(sr.slice(i-sk+1,i+1).reduce((a,b)=>a+b,0)/sk);
  const smD=[];for(let i=sd-1;i<smK.length;i++) smD.push(smK.slice(i-sd+1,i+1).reduce((a,b)=>a+b,0)/sd);
  return{k:(smK[smK.length-1]||0.5)*100,d:(smD[smD.length-1]||0.5)*100};
}
function calcCMF(candles,per=20){
  if(candles.length<per) return 0;
  let mfv=0,vol=0;
  for(const c of candles.slice(-per)){const hl=c.high-c.low||1;const mfm=((c.close-c.low)-(c.high-c.close))/hl;mfv+=mfm*(c.volume||0);vol+=c.volume||0;}
  return vol>0?mfv/vol:0;
}
function calcBB(C,per=20,mult=2){
  if(C.length<per) return null;
  const r=C.slice(-per);const mid=r.reduce((a,b)=>a+b,0)/per;
  const std=Math.sqrt(r.reduce((a,b)=>a+(b-mid)**2,0)/per);
  return{upper:mid+mult*std,middle:mid,lower:mid-mult*std,bandwidth:(mult*2*std)/mid};
}
function calcKeltner(candles,per=20,mult=1.5){
  if(candles.length<per) return null;
  const C=candles.map(c=>c.close);const ema=calcEMA(C,per);const mid=ema[ema.length-1];
  const atrA=calcATR(candles.map(c=>c.high),candles.map(c=>c.low),C,per);const atr=atrA[atrA.length-1];
  return{upper:mid+mult*atr,middle:mid,lower:mid-mult*atr,atr};
}
function detectRSIDivergence(C,rsi){
  if(C.length<12||rsi.length<12) return null;
  const pc=C.slice(-12),rc=rsi.slice(-12);
  const pPrev=pc.slice(0,6),pLast=pc.slice(6);
  const rPrev=rc.slice(0,6),rLast=rc.slice(6);
  const pH=Math.max(...pPrev),pL=Math.min(...pPrev),rH=Math.max(...rPrev),rL=Math.min(...rPrev);
  const cpH=Math.max(...pLast),cpL=Math.min(...pLast),crH=Math.max(...rLast),crL=Math.min(...rLast);
  if(cpH>pH&&crH<rH) return 'bearish_regular';
  if(cpL<pL&&crL>rL) return 'bullish_regular';
  if(cpH<pH&&crH>rH) return 'bullish_hidden';
  if(cpL>pL&&crL<rL) return 'bearish_hidden';
  return null;
}
// ─── MARKET MICROSTRUCTURE ────────────────────────────────────────────────────
function calcDelta(candles){
  return candles.map(c=>{
    const rng=c.high-c.low||1;
    const buyF=(c.close-c.low)/rng;
    return{buy:c.volume*buyF,sell:c.volume*(1-buyF),delta:c.volume*(2*buyF-1),total:c.volume||0};
  });
}
function detectAbsorption(candles,atrVal){
  const vols=candles.map(c=>c.volume||0);
  const avg=vols.reduce((a,b)=>a+b,0)/vols.length||1;
  return candles.map((c,i)=>((c.volume||0)>avg*2&&(c.high-c.low)<atrVal*0.5)?{price:(c.high+c.low)/2,idx:i,strength:(c.volume||0)/avg}:null).filter(Boolean);
}
function detectLiquidityGrabs(candles,levels){
  const g=[];
  for(let i=2;i<candles.length;i++){
    const c=candles[i],p=candles[i-1];
    for(const lv of levels){
      if(c.high>lv&&c.close<lv&&c.close<p.close) g.push({idx:i,price:lv,type:'bear'});
      if(c.low<lv&&c.close>lv&&c.close>p.close) g.push({idx:i,price:lv,type:'bull'});
    }
  }
  return g.slice(-5);
}
function calcBVIXProxy(candles,per=14){
  const a=calcATR(candles.map(c=>c.high),candles.map(c=>c.low),candles.map(c=>c.close),per);
  return ((a[a.length-1]||0)/(candles[candles.length-1]?.close||1))*100;
}
// VWAP — reset daily at UTC midnight
function calcVWAP(candles){
  if(!candles||candles.length<2) return [];
  const out=[];
  let sumPV=0,sumV=0,lastDay=-1;
  for(const c of candles){
    const day=Math.floor(c.timestamp/86400000);
    if(day!==lastDay){sumPV=0;sumV=0;lastDay=day;}
    const tp=(c.high+c.low+c.close)/3;
    sumPV+=tp*(c.volume||0);sumV+=c.volume||0;
    out.push({time:Math.floor(c.timestamp/1000),value:sumV>0?sumPV/sumV:c.close});
  }
  return out;
}
// Parabolic SAR
function calcPSAR(highs,lows,af0=0.02,afMax=0.2){
  const n=highs.length;if(n<2)return{sar:[],bull:[]};
  let bull=highs[1]>highs[0];
  let sar=bull?lows[0]:highs[0];
  let ep=bull?highs[0]:lows[0];
  let af=af0;
  const sarArr=[sar],bullArr=[bull];
  for(let i=1;i<n;i++){
    sar=sar+af*(ep-sar);
    if(bull){sar=Math.min(sar,lows[i-1],i>1?lows[i-2]:lows[i-1]);}
    else{sar=Math.max(sar,highs[i-1],i>1?highs[i-2]:highs[i-1]);}
    let reverse=false;
    if(bull&&lows[i]<sar){reverse=true;sar=ep;bull=false;ep=lows[i];af=af0;}
    else if(!bull&&highs[i]>sar){reverse=true;sar=ep;bull=true;ep=highs[i];af=af0;}
    if(!reverse){
      if(bull&&highs[i]>ep){ep=highs[i];af=Math.min(af+af0,afMax);}
      else if(!bull&&lows[i]<ep){ep=lows[i];af=Math.min(af+af0,afMax);}
    }
    sarArr.push(sar);bullArr.push(bull);
  }
  return{sar:sarArr,bull:bullArr};
}
// Ichimoku Cloud
function calcIchimoku(highs,lows,closes){
  const mid=(h,l,p)=>{const sl=h.slice(-p),ll=l.slice(-p);return(Math.max(...sl)+Math.min(...ll))/2;};
  const n=closes.length;
  const tenkan=[],kijun=[],senkouA=[],senkouB=[],chikou=[];
  for(let i=0;i<n;i++){
    const H=highs.slice(0,i+1),L=lows.slice(0,i+1);
    tenkan.push(i>=8?mid(H,L,9):null);
    kijun.push(i>=25?mid(H,L,26):null);
    senkouA.push(i>=25&&tenkan[i]!=null&&kijun[i]!=null?(tenkan[i]+kijun[i])/2:null);
    senkouB.push(i>=51?mid(H,L,52):null);
    chikou.push(closes[i]);
  }
  return{tenkan,kijun,senkouA,senkouB,chikou};
}
// ADX + DI
function calcADX(highs,lows,closes,p=14){
  const n=highs.length;if(n<p+1)return{adx:[],pdi:[],mdi:[]};
  const tr=[],pdm=[],mdm=[];
  for(let i=1;i<n;i++){
    const hl=highs[i]-lows[i],hpc=Math.abs(highs[i]-closes[i-1]),lpc=Math.abs(lows[i]-closes[i-1]);
    tr.push(Math.max(hl,hpc,lpc));
    const up=highs[i]-highs[i-1],dn=lows[i-1]-lows[i];
    pdm.push(up>dn&&up>0?up:0);
    mdm.push(dn>up&&dn>0?dn:0);
  }
  const smTR=[tr.slice(0,p).reduce((a,b)=>a+b,0)];
  const smPDM=[pdm.slice(0,p).reduce((a,b)=>a+b,0)];
  const smMDM=[mdm.slice(0,p).reduce((a,b)=>a+b,0)];
  for(let i=p;i<tr.length;i++){smTR.push(smTR[smTR.length-1]-smTR[smTR.length-1]/p+tr[i]);smPDM.push(smPDM[smPDM.length-1]-smPDM[smPDM.length-1]/p+pdm[i]);smMDM.push(smMDM[smMDM.length-1]-smMDM[smMDM.length-1]/p+mdm[i]);}
  const pdi=smPDM.map((v,i)=>smTR[i]>0?v/smTR[i]*100:0);
  const mdi=smMDM.map((v,i)=>smTR[i]>0?v/smTR[i]*100:0);
  const dx=pdi.map((v,i)=>{const s=v+mdi[i];return s>0?Math.abs(v-mdi[i])/s*100:0;});
  const adx=[dx.slice(0,p).reduce((a,b)=>a+b,0)/p];
  for(let i=p;i<dx.length;i++) adx.push((adx[adx.length-1]*(p-1)+dx[i])/p);
  const pad=new Array(p).fill(null);
  return{adx:[...pad,...adx],pdi:[...pad,...pdi],mdi:[...pad,...mdi]};
}
// CCI
function calcCCI(highs,lows,closes,p=20){
  const n=closes.length;const out=[];
  for(let i=0;i<n;i++){
    if(i<p-1){out.push(null);continue;}
    const sl=closes.slice(i-p+1,i+1),hl=highs.slice(i-p+1,i+1),ll=lows.slice(i-p+1,i+1);
    const tp=sl.map((_,j)=>(hl[j]+ll[j]+sl[j])/3);
    const avg=tp.reduce((a,b)=>a+b,0)/p;
    const md=tp.reduce((a,b)=>a+Math.abs(b-avg),0)/p;
    out.push(md===0?0:(tp[tp.length-1]-avg)/(0.015*md));
  }
  return out;
}
// Williams %R
function calcWilliamsR(highs,lows,closes,p=14){
  return closes.map((_,i)=>{
    if(i<p-1) return null;
    const hh=Math.max(...highs.slice(i-p+1,i+1)),ll=Math.min(...lows.slice(i-p+1,i+1));
    return hh===ll?-50:(closes[i]-hh)/(hh-ll)*100;
  });
}
// OBV
function calcOBV(closes,volumes){
  const out=[0];
  for(let i=1;i<closes.length;i++){
    out.push(out[i-1]+(closes[i]>closes[i-1]?volumes[i]:closes[i]<closes[i-1]?-volumes[i]:0));
  }
  return out;
}
// MFI (Money Flow Index)
function calcMFI(highs,lows,closes,volumes,p=14){
  const tp=closes.map((_,i)=>(highs[i]+lows[i]+closes[i])/3);
  const out=[];
  for(let i=0;i<closes.length;i++){
    if(i<p){out.push(null);continue;}
    let pm=0,nm=0;
    for(let j=i-p+1;j<=i;j++){
      const mf=tp[j]*(volumes[j]||0);
      if(j>0&&tp[j]>tp[j-1])pm+=mf;else nm+=mf;
    }
    out.push(nm===0?100:pm===0?0:100-100/(1+pm/nm));
  }
  return out;
}

// ─── SCORE HELPERS for new analysis modules ───────────────────────────────────
function scorePDHL(pdhl,price){
  if(!pdhl||price==null) return 0;
  const{pdh,pdl,sweptH,sweptL}=pdhl;
  // Swept PDL + price back above PDL → Smart Money collected liquidity → LONG
  if(sweptL&&pdl&&price>pdl) return 30;
  // Swept PDH + price back below PDH → Smart Money distributed → SHORT
  if(sweptH&&pdh&&price<pdh) return -30;
  // Still above PDH (potential breakout) or still below PDL (breakdown)
  if(sweptH&&pdh&&price>pdh) return 10;
  if(sweptL&&pdl&&price<pdl) return -10;
  // No sweep: price near PDH = resistance (-10), near PDL = support (+10)
  if(pdh&&pdl){
    const range=pdh-pdl;
    if(range>0){
      const pos=(price-pdl)/range; // 0=at PDL, 1=at PDH
      if(pos>0.9) return -10;     // hugging PDH resistance
      if(pos<0.1) return 10;      // hugging PDL support
    }
  }
  return 0;
}
function scoreLSRatio(lsRatio){
  if(!lsRatio) return 0;
  const{longPct}=lsRatio;
  // Contrarian: crowd extremes are usually wrong
  if(longPct>=70) return -35;   // extremely crowded long → SHORT lean
  if(longPct>=65) return -25;
  if(longPct>=60) return -12;
  if(longPct<=30) return 35;    // extremely crowded short → LONG lean
  if(longPct<=35) return 25;
  if(longPct<=40) return 12;
  return 0;
}
function scoreRS(rsData){
  if(!rsData) return 0;
  const{rs}=rsData;
  if(rs>=4)  return 35;   // massively outperforming BTC → strong LONG signal
  if(rs>=2)  return 20;
  if(rs>=1)  return 10;
  if(rs<=-4) return -35;  // massively underperforming BTC → strong SHORT signal
  if(rs<=-2) return -20;
  if(rs<=-1) return -10;
  return 0;
}

function calcMasterBias(setup,momSig,microSig,oiSig,imSig,sentSig,mtfVP,price,pdhlSig,lsSig,rsSig){

// ─── DEEP LEARNING SUPERVISOR ENGINE ──────────────────────────────────────────
// Pure-JS multi-head feedforward neural network with continuous learning.
// Features from EVERY analysis engine: TA, SMC, Wyckoff, VP, OI/Funding, Sentiment, News
// 8-candle sequence window → 96 inputs → 3 outputs (direction, magnitude, volatility)
// Self-corrects on its own mistakes. Logs news reactions for pattern recognition.
// Weights + memory saved to A:\crypto_prediction_model (falls back to localStorage).
class NeuralNet{
  constructor(layers=[96,64,32,3]){
    this.layers=layers;
    this.W=[];this.B=[];
    for(let i=1;i<layers.length;i++){
      const scale=Math.sqrt(2/layers[i-1]);
      this.W.push(Array.from({length:layers[i]},()=>Array.from({length:layers[i-1]},()=>(Math.random()*2-1)*scale)));
      this.B.push(Array.from({length:layers[i]},()=>0));
    }
  }
  _sig(x){return 1/(1+Math.exp(-Math.max(-15,Math.min(15,x))));}
  _forward(inp){
    let a=[inp];
    for(let l=0;l<this.W.length;l++){
      const prev=a[l],cur=[];
      for(let j=0;j<this.W[l].length;j++){
        let z=this.B[l][j];
        for(let k=0;k<prev.length;k++) z+=this.W[l][j][k]*prev[k];
        cur.push(this._sig(z));
      }
      a.push(cur);
    }
    return a;
  }
  predict(inp){const a=this._forward(inp);return a[a.length-1];} // returns array (multi-output)
  train(data,lr=0.02,epochs=80){
    for(let e=0;e<epochs;e++){
      for(let i=data.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[data[i],data[j]]=[data[j],data[i]];}
      for(const{input:inp,output:tgt,weight:w=1}of data){
        const a=this._forward(inp);
        const nL=this.W.length;
        const deltas=[a[nL].map((o,i)=>(o-tgt[i])*o*(1-o)*w)];
        for(let l=nL-2;l>=0;l--){
          const d=[];
          for(let j=0;j<this.W[l].length;j++){
            let e2=0;for(let k=0;k<deltas[0].length;k++) e2+=deltas[0][k]*this.W[l+1][k][j];
            d.push(e2*a[l+1][j]*(1-a[l+1][j]));
          }
          deltas.unshift(d);
        }
        for(let l=0;l<this.W.length;l++){
          for(let j=0;j<this.W[l].length;j++){
            this.B[l][j]-=lr*deltas[l][j];
            for(let k=0;k<this.W[l][j].length;k++) this.W[l][j][k]-=lr*deltas[l][j]*a[l][k];
          }
        }
      }
    }
  }
  toJSON(){return{layers:this.layers,W:this.W,B:this.B};}
  static fromJSON(j){const n=new NeuralNet(j.layers);n.W=j.W;n.B=j.B;return n;}
}

// Storage keys
const _NN_KEY='smc_deep_nn_v7';
const _NN_STATS_KEY='smc_deep_stats_v7';
const _NN_OUTCOMES_KEY='smc_deep_outcomes_v7'; // pending predictions awaiting validation
const _NN_NEWS_KEY='smc_deep_news_v7'; // news→price reaction memory

// Feature vector size per candle: 12 → 8-candle window = 96 inputs
const SEQ_LEN=8;
const FEATURES_PER_CANDLE=12;
const NN_LAYERS=[96,64,32,3]; // 3 outputs: [bullish_prob, magnitude, volatility]

let _nnInst=null;
let _nnStats={totalCandles:0,accuracy:50,sessions:0,lastTrained:null,correctPredictions:0,totalValidated:0,corrections:0,newsLogged:0,recentCorrect:0,recentTotal:0,immediateRetrains:0};
// Dirty tracking — only write to disk when model state actually changed
let _fsDirtySessionStamp=null; // last sessions count written to disk
let _fsDirtyCorStamp=null;     // last corrections count written

function _getNN(){
  if(_nnInst) return _nnInst;
  try{
    const s=localStorage.getItem(_NN_KEY);
    if(s){
      const j=JSON.parse(s);
      // Verify architecture matches — if not, start fresh
      if(JSON.stringify(j.layers)===JSON.stringify(NN_LAYERS)){_nnInst=NeuralNet.fromJSON(j);return _nnInst;}
    }
  }catch(_2){}
  _nnInst=new NeuralNet(NN_LAYERS);
  return _nnInst;
}
function _loadNNStats(){
  try{const s=localStorage.getItem(_NN_STATS_KEY);if(s)_nnStats={..._nnStats,...JSON.parse(s)};}catch(_2){}
  return _nnStats;
}
_loadNNStats();

// Extract 12 features for a single candle at idx (reads across ALL analysis engines)
function _candleFeatures(candles,idx){
  if(idx<20||idx>=candles.length) return null;
  const sl=candles.slice(0,idx+1);
  const C=sl.map(c=>c.close),H=sl.map(c=>c.high),L=sl.map(c=>c.low),V=sl.map(c=>c.volume||1);
  const n=C.length;
  const c=candles[idx];
  // 1. RSI
  const rsiArr=calcRSI(C);const rsi=(rsiArr[n-1]||50)/100;
  // 2. MACD hist normalized
  const macd=calcMACD(C);
  const atrA=calcATR(H,L,C);const atr=atrA[atrA.length-1]||1;
  const histN=Math.max(0,Math.min(1,(macd.hist/(atr||1)+3)/6));
  // 3. BB position
  const bb=calcBB(C);const bbPos=bb?Math.max(0,Math.min(1,(C[n-1]-bb.lower)/(bb.upper-bb.lower||1))):0.5;
  // 4. StochRSI K
  const stoch=calcStochRSI(C);const stochN=(stoch.k||50)/100;
  // 5. Volume ratio
  const avgV=V.slice(-20).reduce((a,b)=>a+b,0)/20||1;const volR=Math.min(1,(V[n-1]/avgV)/3);
  // 6. Body direction
  const bodyDir=c.close>=c.open?1:0;
  // 7. Body size/range
  const bodyFrac=Math.abs(c.close-c.open)/((c.high-c.low)||1);
  // 8. Price vs EMA9
  const e9=calcEMA(C,9);const abv9=C[n-1]>(e9[n-1]||0)?1:0;
  // 9. Price vs EMA21
  const e21=calcEMA(C,21);const abv21=C[n-1]>(e21[n-1]||0)?1:0;
  // 10. Price vs EMA50 (long-term bias)
  const e50=calcEMA(C,Math.min(50,n-1));const abv50=C[n-1]>(e50[n-1]||0)?1:0;
  // 11. 5-bar slope (short momentum)
  const slope5=(C[n-1]-C[n-6])/(atr*5||1);const slope5N=Math.max(0,Math.min(1,(slope5+2)/4));
  // 12. CMF (volume-weighted money flow)
  const cmf=calcCMF(sl);const cmfN=Math.max(0,Math.min(1,(cmf+1)/2));
  return[rsi,histN,bbPos,stochN,volR,bodyDir,bodyFrac,abv9,abv21,abv50,slope5N,cmfN];
}

// Build 8-candle sequence window → flattened 96-input vector
function _buildSequenceInput(candles,idx){
  if(idx<SEQ_LEN+20||idx>=candles.length) return null;
  const seq=[];
  for(let k=SEQ_LEN-1;k>=0;k--){
    const f=_candleFeatures(candles,idx-k);
    if(!f) return null;
    seq.push(...f);
  }
  return seq;
}

// Labels: [direction, magnitude, volatility] for the NEXT candle after idx
function _buildLabels(candles,idx){
  if(idx+1>=candles.length) return null;
  const c=candles[idx],n=candles[idx+1];
  const C=candles.slice(0,idx+1).map(x=>x.close);
  const H=candles.slice(0,idx+1).map(x=>x.high),L=candles.slice(0,idx+1).map(x=>x.low);
  const atrA=calcATR(H,L,C);const atr=atrA[atrA.length-1]||1;
  // Label 1: direction (bullish=1)
  const dir=n.close>c.close?1:0;
  // Label 2: magnitude (abs move / 2*ATR, clamped 0-1)
  const mag=Math.min(1,Math.abs(n.close-c.close)/(atr*2||1));
  // Label 3: volatility (range / 3*ATR, clamped 0-1)
  const vol=Math.min(1,(n.high-n.low)/(atr*3||1));
  return[dir,mag,vol];
}

// Train on fresh candle batch + merge stored correction samples for self-correction
function trainNNOnCandles(candles){
  if(!candles||candles.length<SEQ_LEN+40) return null;
  // Skip if candle count hasn't grown by at least 2 since last training
  // (prevents redundant training when you switch back to same chart quickly)
  const lastCount=_nnStats._lastTrainCandleCount||0;
  const newCount=candles.length;
  const hasFreshCorrections=(()=>{try{const s=JSON.parse(localStorage.getItem(_NN_OUTCOMES_KEY)||'[]');return s.some(o=>o.validated&&o.wrongDirection&&!o._trained);}catch(_2){return false;}})();
  if(newCount-lastCount<2&&!hasFreshCorrections) return null; // nothing new to learn
  _nnStats._lastTrainCandleCount=newCount;
  const net=_getNN();
  const data=[];
  // Build training pairs from current batch
  for(let i=SEQ_LEN+20;i<candles.length-1;i++){
    const inp=_buildSequenceInput(candles,i);
    if(!inp) continue;
    const lbl=_buildLabels(candles,i);
    if(!lbl) continue;
    data.push({input:inp,output:lbl,weight:1});
  }
  if(data.length<20) return null;
  // Add stored error-correction samples with 5x weight (model learns harder from its mistakes)
  try{
    const stored=JSON.parse(localStorage.getItem(_NN_OUTCOMES_KEY)||'[]');
    const corrections=stored.filter(o=>o.validated&&o.wrongDirection).slice(-150);
    corrections.forEach(o=>{if(o.input&&o.actualLabels){data.push({input:o.input,output:o.actualLabels,weight:5});o._trained=true;}});
    if(corrections.length) localStorage.setItem(_NN_OUTCOMES_KEY,JSON.stringify(stored));
  }catch(_2){}
  // Train — 20 epochs is enough for convergence; 50 was the main browser lag cause
  net.train(data,0.02,20);
  // Accuracy on direction head
  let correct=0;
  data.forEach(d=>{const out=net.predict(d.input);if((out[0]>=0.5?1:0)===d.output[0])correct++;});
  const acc=Math.round(correct/data.length*100);
  _nnStats.totalCandles+=data.length;
  _nnStats.accuracy=Math.round(_nnStats.accuracy*0.6+acc*0.4);
  _nnStats.sessions++;
  _nnStats.lastTrained=Date.now();
  try{
    localStorage.setItem(_NN_KEY,JSON.stringify(net.toJSON()));
    localStorage.setItem(_NN_STATS_KEY,JSON.stringify(_nnStats));
  }catch(_2){}
  return{accuracy:_nnStats.accuracy,totalCandles:_nnStats.totalCandles,sessions:_nnStats.sessions,batchSize:data.length,corrections:_nnStats.corrections};
}

// Inference: returns {prob, magnitude, volatility, signal, confidence, accuracy, stats}
function runNNPredict(candles,symbol,tf){
  const net=_getNN();
  if(_nnStats.totalCandles<100||!candles||candles.length<SEQ_LEN+25) return null;
  try{
    const inp=_buildSequenceInput(candles,candles.length-1);
    if(!inp) return null;
    const out=net.predict(inp);
    const prob=out[0],magnitude=out[1],volatility=out[2];
    const signal=prob>=0.58?'LONG':prob<=0.42?'SHORT':'NEUTRAL';
    const confidence=Math.round(Math.abs(prob-0.5)*200);
    // Log this prediction for later validation (self-correction)
    if(symbol&&tf){
      try{
        const pending=JSON.parse(localStorage.getItem(_NN_OUTCOMES_KEY)||'[]');
        pending.push({
          ts:Date.now(),symbol,tf,
          input:inp,
          prediction:[prob,magnitude,volatility],
          anchorPrice:candles[candles.length-1].close,
          anchorTime:candles[candles.length-1].timestamp,
          validated:false
        });
        // Keep last 500 pending predictions
        if(pending.length>500) pending.splice(0,pending.length-500);
        localStorage.setItem(_NN_OUTCOMES_KEY,JSON.stringify(pending));
      }catch(_2){}
    }
    return{
      prob,magnitude,volatility,signal,confidence,
      accuracy:_nnStats.accuracy,totalCandles:_nnStats.totalCandles,sessions:_nnStats.sessions,
      corrections:_nnStats.corrections,newsLogged:_nnStats.newsLogged,
      recentAcc:_nnStats.recentTotal?Math.round(_nnStats.recentCorrect/_nnStats.recentTotal*100):null,
      immediateRetrains:_nnStats.immediateRetrains||0,
      expectedMove:Math.round(magnitude*100)/100,  // 0-1 scaled move
      expectedVol:Math.round(volatility*100)/100
    };
  }catch(_2){return null;}
}

// SELF-CORRECTION: walk pending predictions, find ones whose "next candle" is now known,
// compare prediction vs actual, tag wrong ones for retraining with high weight
function validatePendingPredictions(candles,symbol,tf){
  if(!candles||candles.length<2) return {validated:0,correct:0,wrong:0};
  try{
    const pending=JSON.parse(localStorage.getItem(_NN_OUTCOMES_KEY)||'[]');
    let validated=0,correct=0,wrong=0;
    const wrongSamples=[];
    for(const p of pending){
      if(p.validated||p.symbol!==symbol||p.tf!==tf) continue;
      // Find the candle AFTER the anchor time
      const anchorIdx=candles.findIndex(c=>c.timestamp===p.anchorTime);
      if(anchorIdx<0||anchorIdx+1>=candles.length) continue;
      const nextC=candles[anchorIdx+1];
      const anchorC=candles[anchorIdx];
      const actualDir=nextC.close>anchorC.close?1:0;
      const H=candles.slice(0,anchorIdx+1).map(x=>x.high);
      const L=candles.slice(0,anchorIdx+1).map(x=>x.low);
      const C=candles.slice(0,anchorIdx+1).map(x=>x.close);
      const atrA=calcATR(H,L,C);const atr=atrA[atrA.length-1]||1;
      const actualMag=Math.min(1,Math.abs(nextC.close-anchorC.close)/(atr*2||1));
      const actualVol=Math.min(1,(nextC.high-nextC.low)/(atr*3||1));
      const predDir=p.prediction[0]>=0.5?1:0;
      p.validated=true;
      p.actualDir=actualDir;
      p.actualLabels=[actualDir,actualMag,actualVol];
      p.wrongDirection=predDir!==actualDir;
      validated++;
      if(p.wrongDirection){
        wrong++;_nnStats.corrections++;
        if(p.input&&p.actualLabels) wrongSamples.push({input:p.input,output:p.actualLabels,weight:5});
      }else correct++;
    }
    if(validated>0){
      _nnStats.correctPredictions+=correct;
      _nnStats.totalValidated+=validated;
      // Rolling recent-50 accuracy — honest live feedback
      _nnStats.recentCorrect=(_nnStats.recentCorrect||0)+correct;
      _nnStats.recentTotal=(_nnStats.recentTotal||0)+validated;
      if(_nnStats.recentTotal>50){
        const scale=50/_nnStats.recentTotal;
        _nnStats.recentCorrect=Math.round(_nnStats.recentCorrect*scale);
        _nnStats.recentTotal=50;
      }
      // IMMEDIATE RETRAIN: if the model was wrong on any candle, re-fit now with weight=5
      if(wrongSamples.length>0){
        try{
          const net=_getNN();
          net.train(wrongSamples,0.03,8);  // targeted correction — 8 epochs is plenty at 3x LR
          _nnStats.immediateRetrains=(_nnStats.immediateRetrains||0)+1;
          localStorage.setItem(_NN_KEY,JSON.stringify(net.toJSON()));
        }catch(_3){}
      }
      localStorage.setItem(_NN_OUTCOMES_KEY,JSON.stringify(pending));
      localStorage.setItem(_NN_STATS_KEY,JSON.stringify(_nnStats));
    }
    return{validated,correct,wrong,retrained:wrongSamples.length>0,liveAccuracy:_nnStats.totalValidated?Math.round(_nnStats.correctPredictions/_nnStats.totalValidated*100):null,recentAcc:_nnStats.recentTotal?Math.round(_nnStats.recentCorrect/_nnStats.recentTotal*100):null};
  }catch(_2){return{validated:0,correct:0,wrong:0};}
}

// NEWS REACTION LOGGING: when news arrives, log feature snapshot + price reaction
function logNewsReaction(newsItem,candles,symbol){
  if(!newsItem||!candles||candles.length<SEQ_LEN+25) return;
  // Only learn from HIGH-IMPACT news — medium/low news doesn't reliably move price
  if(!newsItem.impact||newsItem.impact!=='high') return;
  // Only learn non-neutral sentiment (neutral news carries no directional signal)
  if(!newsItem.sentiment||newsItem.sentiment==='neutral') return;
  try{
    const newsTs=new Date(newsItem.timestamp||Date.now()).getTime();
    // Find the candle closest to the news timestamp
    let anchorIdx=-1,minDiff=Infinity;
    for(let i=candles.length-1;i>=SEQ_LEN+20;i--){
      const d=Math.abs(candles[i].timestamp-newsTs);
      if(d<minDiff){minDiff=d;anchorIdx=i;}
    }
    if(anchorIdx<0) return;
    const inp=_buildSequenceInput(candles,anchorIdx);
    if(!inp) return;
    const log=JSON.parse(localStorage.getItem(_NN_NEWS_KEY)||'[]');
    log.push({
      ts:Date.now(),
      symbol,
      newsTitle:(newsItem.title||'').slice(0,120),
      newsSentiment:newsItem.sentiment||'neutral',
      newsImpact:newsItem.impact||'medium',
      anchorPrice:candles[anchorIdx].close,
      anchorTime:candles[anchorIdx].timestamp,
      input:inp,
      validated:false
    });
    if(log.length>1000) log.splice(0,log.length-1000);
    localStorage.setItem(_NN_NEWS_KEY,JSON.stringify(log));
    _nnStats.newsLogged++;
    localStorage.setItem(_NN_STATS_KEY,JSON.stringify(_nnStats));
  }catch(_2){}
}

// Validate news reactions — after 5-10 candles we know how price actually moved
function validateNewsReactions(candles,symbol){
  if(!candles||candles.length<3) return 0;
  try{
    const log=JSON.parse(localStorage.getItem(_NN_NEWS_KEY)||'[]');
    let validated=0;
    for(const n of log){
      if(n.validated||n.symbol!==symbol) continue;
      const anchorIdx=candles.findIndex(c=>c.timestamp===n.anchorTime);
      if(anchorIdx<0||anchorIdx+5>=candles.length) continue;
      const futureC=candles[anchorIdx+5];
      const priceChg=(futureC.close-n.anchorPrice)/n.anchorPrice;
      n.validated=true;
      n.priceReactionPct=+(priceChg*100).toFixed(3);
      n.actualDir=priceChg>0?1:0;
      validated++;
    }
    if(validated>0) localStorage.setItem(_NN_NEWS_KEY,JSON.stringify(log));
    return validated;
  }catch(_2){return 0;}
}

// ─── FILE SYSTEM STORAGE → A:\crypto_prediction_model ────────────────────────
// Uses File System Access API (Chrome/Edge 86+). User picks the folder once;
// handle is stored in IndexedDB so permission persists across sessions.
const _FS_IDB='smc_fs_v1';
let _fsDirHandle=null;
let _fsStatus='idle'; // idle | connected | denied | unsupported

function _isFSSupported(){return typeof window!=='undefined'&&'showDirectoryPicker'in window;}

async function _openIDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open(_FS_IDB,1);
    r.onupgradeneeded=e=>e.target.result.createObjectStore('handles');
    r.onsuccess=e=>res(e.target.result);
    r.onerror=()=>rej(r.error);
  });
}
async function _saveHandle(h){
  try{const db=await _openIDB();await new Promise((res,rej)=>{const tx=db.transaction('handles','readwrite');tx.objectStore('handles').put(h,'modelDir');tx.oncomplete=res;tx.onerror=rej;});}catch(_2){}
}
async function _loadHandle(){
  try{const db=await _openIDB();return new Promise(res=>{const tx=db.transaction('handles','readonly');const r=tx.objectStore('handles').get('modelDir');r.onsuccess=()=>res(r.result||null);r.onerror=()=>res(null);});}catch(_2){return null;}
}

// Try to reconnect to previously chosen folder (called on app init)
async function fsAutoConnect(){
  if(!_isFSSupported()){_fsStatus='unsupported';return false;}
  try{
    const h=await _loadHandle();
    if(!h){_fsStatus='idle';return false;}
    const perm=await h.queryPermission({mode:'readwrite'});
    if(perm==='granted'){_fsDirHandle=h;_fsStatus='connected';await _fsSyncFromDisk();return true;}
    // Permission prompt on user gesture only — can't auto-request
    _fsStatus='idle';
    return false;
  }catch(_2){_fsStatus='idle';return false;}
}

// Called on button click — lets user pick A:\crypto_prediction_model
async function fsPickFolder(){
  if(!_isFSSupported()) return false;
  try{
    const h=await window.showDirectoryPicker({mode:'readwrite',startIn:'desktop'});
    _fsDirHandle=h;
    _fsStatus='connected';
    await _saveHandle(h);
    await _fsSyncFromDisk(); // load any existing model first
    return true;
  }catch(_2){_fsStatus='denied';return false;}
}

async function _fsWrite(filename,data){
  if(!_fsDirHandle) return;
  try{
    const fh=await _fsDirHandle.getFileHandle(filename,{create:true});
    const w=await fh.createWritable();
    await w.write(typeof data==='string'?data:JSON.stringify(data,null,2));
    await w.close();
  }catch(e){console.warn('[FS write failed]',filename,e?.message||e);}
}
async function _fsRead(filename){
  if(!_fsDirHandle) return null;
  try{
    const fh=await _fsDirHandle.getFileHandle(filename);
    const f=await fh.getFile();
    return JSON.parse(await f.text());
  }catch(_2){return null;}
}

// Load existing model weights + memory from disk (if folder already has them)
async function _fsSyncFromDisk(){
  const w=await _fsRead('model_weights.json');
  if(w){
    try{
      // Only load if architecture matches
      if(JSON.stringify(w.layers)===JSON.stringify(NN_LAYERS)){
        _nnInst=NeuralNet.fromJSON(w);
      }
    }catch(_2){}
  }
  const s=await _fsRead('training_stats.json');
  if(s) _nnStats={..._nnStats,...s};
  // Restore outcomes + news memory into localStorage for the engine to use
  const outcomes=await _fsRead('prediction_outcomes.json');
  if(outcomes){try{localStorage.setItem(_NN_OUTCOMES_KEY,JSON.stringify(outcomes));}catch(_2){}}
  const news=await _fsRead('news_reactions.json');
  if(news){try{localStorage.setItem(_NN_NEWS_KEY,JSON.stringify(news));}catch(_2){}}
}

// Save model + stats + prediction outcomes + news memory
// Only writes when model state changed since last save (avoids redundant writes)
async function fsSaveModel(force=false){
  if(!_fsDirHandle) return;
  const sessChanged=_nnStats.sessions!==_fsDirtySessionStamp;
  const corChanged=_nnStats.corrections!==_fsDirtyCorStamp;
  if(!force&&!sessChanged&&!corChanged) return; // nothing new to persist
  const net=_getNN();
  await _fsWrite('model_weights.json',net.toJSON());
  await _fsWrite('training_stats.json',_nnStats);
  // Mirror outcomes + news memory to disk
  try{
    const outcomes=JSON.parse(localStorage.getItem(_NN_OUTCOMES_KEY)||'[]');
    await _fsWrite('prediction_outcomes.json',outcomes);
  }catch(_2){}
  try{
    const news=JSON.parse(localStorage.getItem(_NN_NEWS_KEY)||'[]');
    await _fsWrite('news_reactions.json',news);
  }catch(_2){}
  // Update stamps so we don't re-write same data
  _fsDirtySessionStamp=_nnStats.sessions;
  _fsDirtyCorStamp=_nnStats.corrections;
}

function calcRS(coinCandles,btcCandles,lookback=20){
  if(!coinCandles||!btcCandles||coinCandles.length<lookback||btcCandles.length<lookback) return null;
  const cStart=coinCandles[coinCandles.length-lookback].close;
  const cEnd=coinCandles[coinCandles.length-1].close;
  const bStart=btcCandles[btcCandles.length-lookback].close;
  const bEnd=btcCandles[btcCandles.length-1].close;
  const coinChg=((cEnd-cStart)/cStart)*100;
  const btcChg=((bEnd-bStart)/bStart)*100;
  const rs=coinChg-btcChg;
  return{coinChg,btcChg,rs,signal:rs>1?'STRONG':rs<-1?'WEAK':'NEUTRAL'};
}

function futureCandlesSim(candles,signal,atr,count,ctx){
  // ctx = {momScore, microScore, vpData, macd, squeeze, rsiVal, bbData, cmf, stoch}
  const p0=candles[candles.length-1].close;
  const vp=ctx?.vpData||null;
  const rsi=ctx?.rsiVal||50;
  const bb=ctx?.bbData||null;
  const macd=ctx?.macd||{};
  const squeeze=ctx?.squeeze||false;

  // ── NN inference (no new logging — prediction already logged by runNNPredict) ──
  let nnProb=null,nnMag=0.40,nnVol=0.35;
  if(_nnStats.totalCandles>=100){
    try{
      const inp=_buildSequenceInput(candles,candles.length-1);
      if(inp){const out=_getNN().predict(inp);nnProb=out[0];nnMag=Math.max(0.05,out[1]);nnVol=Math.max(0.05,out[2]);}
    }catch(_2){}
  }

  // Confidence & final direction
  const nnConf=nnProb!==null?Math.abs(nnProb-0.5)*2:0.25;
  const fallbackDir=signal==='LONG'?1:-1;
  const primaryDir=nnProb!==null&&_nnStats.totalCandles>=150
    ?(nnProb>=0.54?1:nnProb<=0.46?-1:fallbackDir):fallbackDir;

  // RSI dampening (extreme RSI = exhaustion, reduce body sizes)
  const rsiDamp=rsi>78?0.50:rsi<22?0.50:rsi>68?0.75:rsi<32?0.75:1.0;

  // Measure recent ACTUAL candle sizes — ghost candles must be proportional to real ones
  const last20=candles.slice(-20);
  const avgBody=last20.reduce((s,c)=>s+Math.abs(c.close-c.open),0)/last20.length;
  const avgRange=last20.reduce((s,c)=>s+c.high-c.low,0)/last20.length||atr;

  // Base sizes: NN magnitude/volatility calibrate direction & confidence,
  // but floor is always 70% of recent actual candle body so ghosts look realistic.
  // When NN is early/uncertain (low nnMag), real candle size still wins.
  const baseBody=Math.max(avgBody*0.70, nnMag*2*atr);
  const baseRange=Math.max(avgRange*0.60, nnVol*3*atr);

  // ── STRUCTURE SEQUENCE ──
  // ── STRUCTURE SEQUENCE — supports up to 50 candles with full pattern cycles ──
  // highConf: Elliott-style 5-wave impulse with 3-wave corrections (repeating)
  // medConf:  impulse → consolidation → breakout cycles
  // lowConf:  ranging / H&S-like topping/bottoming structures
  const seq=[];
  if(nnConf>0.35){
    // Elliott 5-wave pattern repeating: i-ii-iii-iv-v then corrective a-b-c
    // wave:  imp cont cont pb  cont | pb   imp  cont pb  cont | pb  imp ...
    const wave8=['impulse','continuation','continuation','pullback','continuation','pullback','inside','breakout'];
    for(let i=0;i<count;i++) seq.push(wave8[i%wave8.length]);
  } else if(nnConf>0.15){
    // Consolidation breakout cycles: impulse → 3 inside → breakout → pullback → repeat
    const wave6=['impulse','inside','inside','inside','breakout','pullback'];
    for(let i=0;i<count;i++) seq.push(wave6[i%wave6.length]);
  } else {
    // Low confidence — ranging structure that can form H&S, double top/bottom
    // Pattern: push up → retrace → push same high → retrace deeper → breakdown
    const hsPat=['continuation','pullback','inside','continuation','pullback','inside','continuation','pullback','range','inside','pullback','range'];
    for(let i=0;i<count;i++) seq.push(hsPat[i%hsPat.length]);
  }

  // Pinbar injection near VP / BB levels
  if(vp||bb){
    let proj=p0;
    const keyLevels=[vp?.poc,vp?.vah,vp?.val,bb?.upper,bb?.lower].filter(Boolean);
    for(let i=0;i<seq.length;i++){
      proj+=primaryDir*baseBody*(seq[i]==='pullback'?-0.38:seq[i]==='inside'?0.05:0.55)*Math.max(0.15,1-i*0.02);
      const near=keyLevels.some(l=>Math.abs(proj-l)/atr<0.9);
      if(near&&(seq[i]==='impulse'||seq[i]==='continuation')) seq[i]='pinbar';
    }
  }

  // ── BUILD OHLC ──
  let price=p0;
  const result=[];
  for(let i=0;i<count;i++){
    const type=seq[i]||'range';
    // Decay: gentle slope so candle 50 is still ~40% of candle 1 (not flat)
    // Formula: starts at 1.0, floors at 0.40 around candle 30, stays there
    const decay=Math.max(0.40,1-i*0.018);
    let bbFactor=1;
    if(bb){
      if(price>bb.upper&&primaryDir>0) bbFactor=0.35;
      if(price<bb.lower&&primaryDir<0) bbFactor=0.35;
    }

    let bodySize,wickH,wickL,candleDir;
    const bd=baseBody*decay*rsiDamp;
    const rg=baseRange*decay;
    switch(type){
      case 'impulse':
        candleDir=primaryDir;
        bodySize=bd*bbFactor*(0.55+0.45*nnConf);
        wickH=rg*0.15*(primaryDir>0?0.25:0.75);
        wickL=rg*0.15*(primaryDir>0?0.75:0.25);
        break;
      case 'continuation':
        candleDir=primaryDir;
        bodySize=bd*0.55*bbFactor;
        wickH=rg*0.12*(primaryDir>0?0.20:0.60);
        wickL=rg*0.12*(primaryDir>0?0.60:0.20);
        break;
      case 'pullback':
        candleDir=-primaryDir;
        bodySize=bd*0.38; // Fibonacci 38.2% retracement
        wickH=rg*0.10;
        wickL=rg*0.10;
        break;
      case 'inside':
        candleDir=primaryDir;
        bodySize=bd*0.18;
        wickH=rg*0.18;
        wickL=rg*0.18;
        break;
      case 'breakout':
        candleDir=primaryDir;
        bodySize=bd*0.88*bbFactor;
        wickH=rg*0.08*(primaryDir>0?0.10:0.50);
        wickL=rg*0.08*(primaryDir>0?0.50:0.10);
        break;
      case 'pinbar':
        candleDir=-primaryDir*0.08; // tiny body, big rejection wick
        bodySize=bd*0.07;
        wickH=primaryDir>0?rg*0.72:rg*0.10;
        wickL=primaryDir>0?rg*0.10:rg*0.72;
        break;
      case 'range':

        wickH=rg*0.22;
        wickL=rg*0.22;
        break;
    }

    const o=price;
    const c=o+candleDir*Math.max(atr*0.0005,bodySize);
    const h=Math.max(o,c)+Math.max(0,wickH);
    const l=Math.min(o,c)-Math.max(0,wickL);

    price=c;
  }
  return result;
}
function generateSetup(candles,price){
  if(!candles||candles.length<55) return null;
  const C=candles.map(c=>c.close),H=candles.map(c=>c.high),L=candles.map(c=>c.low);
  const e9=calcEMA(C,9),e21=calcEMA(C,21),e50=calcEMA(C,50);
  const rsi=calcRSI(C,14),atrArr=calcATR(H,L,C,14);
  const le9=e9[e9.length-1]||price,le21=e21[e21.length-1]||price,le50=e50[e50.length-1]||price;
  const lRSI=rsi[rsi.length-1]||50,lATR=atrArr[atrArr.length-1]||price*0.01;
  const sw=detectSwings(H,L);
  const fvg=detectFVG(candles),bos=detectBOS(candles,sw);
  const bullBias=price>le9&&le9>le21&&le21>le50;
  const bearBias=price<le9&&le9<le21&&le21<le50;
  const htf=bullBias?'Bullish':bearBias?'Bearish':'Neutral';
  const vp=calcVolumeProfile(candles);
  const vpBull=vp?(price>vp.val&&price<vp.poc?5:price>vp.poc?5:0):0;
  const bullPct=Math.min(100,(price>le9?25:0)+(price>le21?20:0)+(price>le50?15:0)+(lRSI>50?20:0)+(bos.filter(b=>b.type==='bull').length>0?20:0)+vpBull);
  let signal=bearBias&&lRSI>35?'SHORT':'LONG';
  if(bullBias&&lRSI<72) signal='LONG';
  if(vp&&bullPct>=48&&bullPct<=52) signal=price>vp.poc?'LONG':'SHORT';
  const isL=signal==='LONG';
  const sl=isL?price-lATR*1.5:price+lATR*1.5;
  const tp1=isL?price+lATR*2:price-lATR*2;
  const tp2=isL?price+lATR*4:price-lATR*4;
  const d=Math.abs(price-sl)||1;
  const rh=H.slice(-30).sort((a,b)=>b-a),rl=L.slice(-30).sort((a,b)=>a-b);
  let phase='Accumulation';
  if(bullBias&&lRSI>55) phase='Markup';
  else if(bearBias&&lRSI<45) phase='Markdown';
  else if(price>le50&&lRSI>60) phase='Distribution';
  const lc=candles[candles.length-1];
  // Compute full TA context for enhanced prediction
  const _macd=calcMACD(C);const _stoch=calcStochRSI(C);const _cmf=calcCMF(candles);
  const _bb=calcBB(C);const _klt=calcKeltner(candles);
  const _squeeze=_bb&&_klt?_bb.upper<_klt.upper&&_bb.lower>_klt.lower:false;
  const _momSig=calcMomentumScore(candles);const _microSig=calcMicrostructureScore(candles);
  const predCtx={momScore:_momSig.score,microScore:_microSig.score,vpData:vp,macd:_macd,squeeze:_squeeze,rsiVal:lRSI,bbData:_bb,cmf:_cmf,stoch:_stoch};
  return{
    signal,htf_bias:htf,phase,bull_pct:bullPct,bear_pct:100-bullPct,
    rsi:lRSI.toFixed(1),atr:lATR.toFixed(price>100?2:6),
    ema9:le9,ema21:le21,ema50:le50,
    entry_zone:[isL?price*0.9998:price,isL?price:price*1.0002],
    stop_loss:sl,take_profit_1:tp1,take_profit_2:tp2,
    rr1:`1:${(Math.abs(tp1-price)/d).toFixed(1)}`,
    rr2:`1:${(Math.abs(tp2-price)/d).toFixed(1)}`,
    leverage:lRSI<30||lRSI>70?3:lATR/price<0.01?10:5,
    fvg,bos,
    bsl:[rh[0],rh[1],rh[2]].filter(Boolean),
    ssl:[rl[0],rl[1],rl[2]].filter(Boolean),
    next_dir:C.slice(-3)[2]>C.slice(-3)[0]?'Bullish':'Bearish',
    next_type:candleType(lc),
    next_size:lATR/price>0.02?'Large':lATR/price>0.008?'Medium':'Small',
    confidence:bullPct>68||bullPct<32?'High':bullPct>57||bullPct<43?'Medium':'Low',
    future_candles:futureCandlesSim(candles,signal,lATR,50,predCtx),
    vp_poc:vp?.poc||null,vp_vah:vp?.vah||null,vp_val:vp?.val||null,
    vp_hvn:vp?.hvn||[],vp_lvn:vp?.lvn||[],vp,

}

function isCrypto(s){return s.includes('/');}
const FUTURES_ONLY=new Set(); // cache futures-only symbols
function parseKlines(json){return json.map(k=>({timestamp:+k[0],open:+k[1],high:+k[2],low:+k[3],close:+k[4],volume:+k[5]}));}
// Global flag — user can toggle SPOT vs PERP (persisted to localStorage)
let _usePerpData = localStorage.getItem('smc_use_perp') !== 'false'; // default: true (futures)

async function fetchBinance(symbol,tf,limit=600){
  const sym=symbol.replace('/','');
  const iv=BINANCE_TF[tf]||'1h';
  // PERP mode: always use futures endpoint first (matches Binance Futures chart)
  if(_usePerpData){
    try{
      const r=await fetch(`${BINANCE_FAPI}/klines?symbol=${sym}&interval=${iv}&limit=${limit}`);
      if(r.ok){FUTURES_ONLY.add(sym);return parseKlines(await r.json());}
    }catch(_){}
  }
  // SPOT mode or futures failed: try spot
  if(!FUTURES_ONLY.has(sym)){
    try{
      const r=await fetch(`${BINANCE_REST}/klines?symbol=${sym}&interval=${iv}&limit=${limit}`);
      if(r.ok) return parseKlines(await r.json());
    }catch(_){}
  }
  // Last resort: futures
  const r2=await fetch(`${BINANCE_FAPI}/klines?symbol=${sym}&interval=${iv}&limit=${limit}`);
  if(!r2.ok) throw new Error(`Binance ${r2.status}`);
  FUTURES_ONLY.add(sym);
  return parseKlines(await r2.json());
}
async function fetchYF(symbol,tf,limit=600){
  const[iv,range]=YF_TF[tf]||['1h','1y'];
  const enc=encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=${iv}&range=${range}&includePrePost=false`);
  let data;
  const proxies=[
    `https://api.allorigins.win/raw?url=${enc}`,
    `https://corsproxy.io/?${enc}`,
  ];
  let lastErr;
  for(const p of proxies){
    try{const r=await fetch(p);if(r.ok){data=await r.json();break;}}
    catch(e){lastErr=e;}
  }
  if(!data) throw new Error(`No data for ${symbol}: ${lastErr}`);
  const res=data?.chart?.result?.[0];
  if(!res) throw new Error(`Empty chart data for ${symbol}`);
  const ts=res.timestamp,q=res.indicators?.quote?.[0];
  if(!ts||!q) throw new Error(`Missing OHLCV for ${symbol}`);
  let candles=ts.map((t,i)=>({timestamp:t*1000,open:q.open?.[i],high:q.high?.[i],low:q.low?.[i],close:q.close?.[i],volume:q.volume?.[i]||0}))
    .filter(c=>c.open&&c.high&&c.low&&c.close&&isFinite(c.close));
  if(tf==='4h'){
    const b=[];
    for(let i=0;i<candles.length;i+=4){
      const s=candles.slice(i,i+4);if(!s.length)continue;
      b.push({timestamp:s[0].timestamp,open:s[0].open,high:Math.max(...s.map(x=>x.high)),low:Math.min(...s.map(x=>x.low)),close:s[s.length-1].close,volume:s.reduce((a,c)=>a+c.volume,0)});
    }
    candles=b;
  }
  return candles.slice(-limit);
}
async function fetchCandles(symbol,tf,limit=600){
  return isCrypto(symbol)?fetchBinance(symbol,tf,limit):fetchYF(symbol,tf,limit);
}

async function fetchRSS(feed){
  for(const proxy of CORS_PROXIES){
    try{
      const ctrl=new AbortController();
      const tid=setTimeout(()=>ctrl.abort(),8000);
      const r=await fetch(proxy(feed.u),{signal:ctrl.signal});
      clearTimeout(tid);
      if(!r.ok) continue;
      const text=await r.text();
      if(!text||text.trim().startsWith('{')&&!text.includes('<item')) continue; // got JSON error response
      const doc=new DOMParser().parseFromString(text,'text/xml');
      const items=[...doc.querySelectorAll('item')];
      if(!items.length) continue;
      return items.map(el=>{
        // link: sometimes inside CDATA or as text
        const link=el.querySelector('link')?.textContent?.trim()||
                   el.getElementsByTagName('link')?.[0]?.nextSibling?.nodeValue?.trim()||'';
        return{
          title:(el.querySelector('title')?.textContent||'').trim(),
          link, pubDate:(el.querySelector('pubDate')?.textContent||'').trim(),
        };
      }).filter(i=>i.title.length>5);
    }catch(_){continue;}
  }
  return [];
}

function scoreItem(title){
  const t=title.toLowerCase();
  const bull=KWB.filter(k=>t.includes(k)).length,bear=KWR.filter(k=>t.includes(k)).length;
  const hi=['war','invasion','attack','rate cut','rate hike','crash','recession','ceasefire','default','nuclear'].some(k=>t.includes(k))?2:1;
  if(bull>bear){const p=Math.min(1+bull*0.7*hi,5);return{sentiment:'bullish',impact_pct:+p.toFixed(1),impact_label:p>=3?'HIGH':p>=1.5?'MEDIUM':'LOW'};}

    for(const it of items){
      if(!it.title) continue;
      const sc=scoreItem(it.title);
      all.push({headline:it.title,url:it.link,source:feed.s,timestamp:it.pubDate?new Date(it.pubDate).toISOString():new Date().toISOString(),...sc,category:detectCat(it.title),fetchedAt:Date.now()});

async function fetchAllBinanceSymbols(){
  try{
    // Fetch spot + futures in parallel
    const[spotRes,futRes]=await Promise.allSettled([
      fetch('https://api.binance.com/api/v3/ticker/price'),
      fetch('https://fapi.binance.com/fapi/v1/ticker/price')
    ]);
    const seen=new Set();
    const out=[];
    const add=(json,isFutures)=>{
      for(const s of json){
        if(!s.symbol.endsWith('USDT')) continue;
        const base=s.symbol.slice(0,-4);
        const sym=base+'/USDT';
        if(seen.has(sym)) continue;
        seen.add(sym);
        if(isFutures) FUTURES_ONLY.add(s.symbol);
        out.push({symbol:sym,name:KNOWN_NAMES[base]||base,exchange:'Binance',type:'crypto'});
      }
    };
    if(spotRes.status==='fulfilled'&&spotRes.value.ok) add(await spotRes.value.json(),false);
    if(futRes.status==='fulfilled'&&futRes.value.ok) add(await futRes.value.json(),true);
    return out.length>10?out.sort((a,b)=>a.symbol.localeCompare(b.symbol)):null;
  }catch(_){return null;}
}

// ─── SPARKLINE (tiny SVG chart for scanner cards) ─────────────────────────────
function Sparkline({data,color,w=60,h=20}){
  if(!data||data.length<2) return null;
  const mn=Math.min(...data),mx=Math.max(...data),rng=mx-mn||1;
  const pts=data.map((v,i)=>`${(i/(data.length-1))*w},${h-(((v-mn)/rng)*h)}`).join(' ');
  return(<svg className="sparkline" width={w} height={h}><polyline points={pts} fill="none" stroke={color||'#787b86'} strokeWidth="1.5"/></svg>);
}

    const formatted=s.includes('/')?s:s.includes('USDT')?s.slice(0,-4)+'/USDT':s+'/USDT';
    if(favorites.includes(formatted)) return;
    const next=[...favorites,formatted];
    setFavorites(next);localStorage.setItem('smc_favorites',JSON.stringify(next));
  };
  const removeFavorite=(sym)=>{
    const next=favorites.filter(f=>f!==sym);
    setFavorites(next);localStorage.setItem('smc_favorites',JSON.stringify(next));
  };

  // Timeout wrapper for fetch
  const withTimeout=(promise,ms=10000)=>Promise.race([promise,new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),ms))]);

  // Higher TF mapping — used for MTF confirmation
  const HTF_MAP={'1m':'5m','5m':'15m','15m':'1h','1h':'4h','4h':'1d','1d':'1w','1w':'1w'};

  // Scan a single asset — fetches current TF + next higher TF for MTF confirmation
  const scanAsset=useCallback(async(sym,type)=>{
    try{
      const higherTf=HTF_MAP[filterTf]||'4h';
      const needHTF=higherTf!==filterTf;

      // Fetch both TFs in parallel — HTF has shorter timeout (5s) since it's secondary
      const [primary,htfRes]=await Promise.allSettled([
        withTimeout(fetchCandles(sym,filterTf,200),8000),
        needHTF?withTimeout(fetchCandles(sym,higherTf,100),5000):Promise.resolve(null),
      ]);

      const data=primary.status==='fulfilled'?primary.value:null;
      if(!data||data.length<55) return null;
      const price=data[data.length-1].close;
      const setup=generateSetup(data,price);
      if(!setup) return null;
      const momSig=calcMomentumScore(data);
      const microSig=calcMicrostructureScore(data);
      const master=calcMasterBias(setup,momSig,microSig,{score:0},{score:0},{score:0},null,price);
      const score=master?.score||0;

      // Primary signal — always from master bias, never from setup alone
      const masterSignal=score>=10?'LONG':score<=-10?'SHORT':setup.signal;
      const biasDir=score>0?'LONG':score<0?'SHORT':null;

      // Higher TF signal — required for CONFIRMED
      let htfSignal=null,htfScore=0,htfPhase='';
      const htfData=htfRes.status==='fulfilled'?htfRes.value:null;
      if(htfData&&htfData.length>=55){
        const htfSetup=generateSetup(htfData,price);
        if(htfSetup){
          const htfMom=calcMomentumScore(htfData);
          const htfMicro=calcMicrostructureScore(htfData);
          const htfMaster=calcMasterBias(htfSetup,htfMom,htfMicro,{score:0},{score:0},{score:0},null,price);
          htfScore=htfMaster?.score||0;
          htfSignal=htfScore>=10?'LONG':htfScore<=-10?'SHORT':htfSetup.signal;
          htfPhase=htfSetup.phase;
        }
      }

      // MTF agreement: current TF and higher TF must point same direction
      const mtfAgrees=htfSignal===null||htfSignal===masterSignal;

      // Within-TF confirmation pillars
      const setupAgrees=biasDir===setup.signal;
      const momAgrees=biasDir==='LONG'?momSig.score>0:biasDir==='SHORT'?momSig.score<0:false;
      const microAgrees=biasDir==='LONG'?microSig.score>=0:biasDir==='SHORT'?microSig.score<=0:false;

      // Final confirmation — DIVERGING takes priority: no CONFIRMED when TFs disagree
      const confirmation=!biasDir?'NEUTRAL':
        !mtfAgrees?'DIVERGING':                                          // TFs conflict — never trade
        (setupAgrees&&momAgrees&&microAgrees)?'CONFIRMED':               // all agree → safest
        (setupAgrees&&(momAgrees||microAgrees))?'PROBABLE':'WEAK';       // partial agreement

      const confirmColor=confirmation==='CONFIRMED'?'#26a69a':
        confirmation==='PROBABLE'?'#ff9800':
        confirmation==='DIVERGING'?'#ab47bc':
        confirmation==='NEUTRAL'?'#787b86':'#ef535066';

      const c24=data.length>24?data[data.length-25]?.close:data[0]?.close;
      const chg24=c24?((price-c24)/c24*100):0;
      const spark=data.slice(-20).map(c=>c.close);
      const topSignals=(master?.features||[]).slice(0,3).map(f=>({name:f.n,value:Math.round(f.v),weight:Math.round(f.w*100)}));
      // NN inference (uses pre-trained model — fast, no training during scan)
      const nnPred=runNNPredict(data);
      return{
        symbol:sym,type,price,
        score,label:master?.label||'Neutral',color:master?.color||'#787b86',
        mlConf:master?.mlConf||0,
        signal:masterSignal,
        htfBias:setup.htf_bias,phase:setup.phase,
        htfSignal,htfScore,htfPhase,higherTf,mtfAgrees,
        confirmation,confirmColor,
        chg24:chg24.toFixed(2),
        spark,topSignals,
        nnSignal:nnPred?.signal||null,nnConf:nnPred?.confidence||0,nnProb:nnPred?.prob||null,
        strongestTf:filterTf,
        ts:Date.now()
      };
    }catch(_){return null;}
  },[filterTf]);

  // Batch scan — stream results progressively
  const runScan=useCallback(async()=>{
    if(scanRef.current) return;
    scanRef.current=true;
    setScanning(true);
    const seen=new Set();
    const assets=[];
    // Always scan favorites first
    for(const sym of favorites){
      if(seen.has(sym)) continue;seen.add(sym);
      const type=isCrypto(sym)?'crypto':'stock';
      assets.push({sym,type,name:sym.split('/')[0],isFav:true});
    }
    // Crypto: always scan 200+ — use dynamic Binance list merged with hardcoded list
    if(scanType==='crypto'||scanType==='all'){
      // Build a deduplicated pool: dynamic Binance symbols first (sorted by volume), then hardcoded extras
      const dynPool=(binanceSymbols||[]).filter(c=>c.symbol.endsWith('/USDT'));
      const dynSet=new Set(dynPool.map(c=>c.symbol));
      const extras=CRYPTO_LIST.filter(c=>!dynSet.has(c.symbol));
      const cryptoPool=[...dynPool,...extras].slice(0,Math.max(1,scanLimit)); // user-configurable cap
      cryptoPool.forEach(c=>{if(!seen.has(c.symbol)){seen.add(c.symbol);assets.push({sym:c.symbol,type:'crypto',name:c.name||c.symbol.split('/')[0]});}});
    }
    // Stocks: only if explicitly selected — crypto is the default
    if(scanType==='stocks'){
      STOCK_LIST.slice(0,30).forEach(s=>{if(!seen.has(s.symbol)){seen.add(s.symbol);assets.push({sym:s.symbol,type:s.type,name:s.name});}});
    }
    const results=[];
    for(let i=0;i<assets.length;i+=10){
      const batch=assets.slice(i,i+10);
      const batchResults=await Promise.allSettled(batch.map(a=>scanAsset(a.sym,a.type)));
      for(let j=0;j<batchResults.length;j++){
        if(batchResults[j].status==='fulfilled'&&batchResults[j].value){
          const r=batchResults[j].value;
          r.name=batch[j].name;
          r.isFav=batch[j].isFav||false;
          results.push(r);
        }
      }
      setScanResults([...results]);
      if(i+10<assets.length) await new Promise(r=>setTimeout(r,150));
    }
    resultsRef.current=results;
    setScanResults([...results]);
    setLastScan(new Date());
    setScanning(false);
    scanRef.current=false;
  },[scanAsset,scanType,binanceSymbols,favorites,scanLimit]);

  // Auto-scan on mount and every N minutes (user-configurable)
  useEffect(()=>{
    runScan();
    const ms=Math.max(10000,scanIntervalMin*60000); // enforce 10s floor to avoid API hammer
    const id=setInterval(runScan,ms);
    return()=>clearInterval(id);
  },[filterTf,scanType,scanIntervalMin,scanLimit]);

  // Symbol pool for autocomplete (dynamic Binance + hardcoded CRYPTO_LIST)
  const symbolPool=useMemo(()=>{
    const pool=[...(binanceSymbols||[]).filter(s=>s.symbol.endsWith('/USDT')),...CRYPTO_LIST];
    const seen=new Set();
    return pool.filter(s=>{if(seen.has(s.symbol))return false;seen.add(s.symbol);return true;});
  },[binanceSymbols]);

  const getSuggs=useCallback((q)=>{
    if(!q||q.length<1) return[];
    const u=q.toUpperCase();
    return symbolPool.filter(s=>s.symbol.toUpperCase().includes(u)||(s.name||'').toUpperCase().includes(u)).slice(0,8);
  },[symbolPool]);

  // Sort & filter results
  const displayed=useMemo(()=>{
    let arr=[...scanResults];
    if(searchQ){
      const q=searchQ.toUpperCase();
      arr=arr.filter(r=>r.symbol.toUpperCase().includes(q)||(r.name||'').toUpperCase().includes(q));
    }
    // Confirmation filter
    if(filterConf!=='all') arr=arr.filter(r=>r.confirmation===filterConf);
    if(sortBy==='score') arr.sort((a,b)=>Math.abs(b.score)-Math.abs(a.score));
    else if(sortBy==='bullish') arr.sort((a,b)=>b.score-a.score);
    else if(sortBy==='bearish') arr.sort((a,b)=>a.score-b.score);
    else if(sortBy==='alpha') arr.sort((a,b)=>a.symbol.localeCompare(b.symbol));
    else if(sortBy==='change') arr.sort((a,b)=>Math.abs(parseFloat(b.chg24))-Math.abs(parseFloat(a.chg24)));
    return arr;
  },[scanResults,searchQ,sortBy,filterConf]);

  const bullish=displayed.filter(r=>r.score>0);
  const bearish=displayed.filter(r=>r.score<0);
  const strongBull=bullish.filter(r=>r.score>60);
  const modBull=bullish.filter(r=>r.score>30&&r.score<=60);
  const mildBull=bullish.filter(r=>r.score>0&&r.score<=30);
  const strongBear=bearish.filter(r=>r.score<-60);
  const modBear=bearish.filter(r=>r.score<-30&&r.score>=-60);
  const mildBear=bearish.filter(r=>r.score<0&&r.score>=-30);
  // Confirmation counts across all scanned results (not filtered) — for button badges
  const confCounts=useMemo(()=>({
    CONFIRMED: scanResults.filter(r=>r.confirmation==='CONFIRMED').length,
    PROBABLE:  scanResults.filter(r=>r.confirmation==='PROBABLE').length,
    WEAK:      scanResults.filter(r=>r.confirmation==='WEAK').length,
    DIVERGING: scanResults.filter(r=>r.confirmation==='DIVERGING').length,
  }),[scanResults]);

  const isFav=(sym)=>favorites.includes(sym);
  const renderCard=(r)=>(
    <div key={r.symbol} className={`signal-card ${r.score>60?'strong-bull':r.score>30?'mod-bull':r.score<-60?'strong-bear':r.score<-30?'mod-bear':''}`}
      onClick={()=>onNavigate(r.symbol,filterTf)}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
        <div style={{display:'flex',alignItems:'center',gap:4}}>
          <span onClick={e=>{e.stopPropagation();isFav(r.symbol)?removeFavorite(r.symbol):addFavorite(r.symbol);}}
            style={{cursor:'pointer',fontSize:12,color:isFav(r.symbol)?'#ffd600':'#2a2e39',transition:'color .15s'}}
            title={isFav(r.symbol)?'Remove from watchlist':'Add to watchlist'}>{isFav(r.symbol)?'★':'☆'}</span>
          <span style={{fontSize:12,fontWeight:700,color:'#d1d4dc'}}>{r.symbol}</span>
          {r.name&&r.name!==r.symbol.split('/')[0]&&<span style={{fontSize:10,color:'#787b86',marginLeft:4}}>{r.name}</span>}
        </div>
        <div style={{display:'flex',alignItems:'center',gap:6}}>
          <Sparkline data={r.spark} color={r.color}/>
          <span style={{fontSize:11,fontWeight:700,color:r.color}}>{r.score>0?'+':''}{r.score}</span>
        </div>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:5,marginBottom:4,flexWrap:'wrap'}}>
        {/* Signal direction — current TF */}
        <span style={{fontSize:10,fontWeight:700,color:'#131722',background:r.signal==='LONG'?'#26a69a':'#ef5350',padding:'2px 7px',borderRadius:4}}>{r.signal}</span>
        {/* Higher TF signal — shown next to current TF so user sees both */}
        {r.htfSignal&&<span style={{fontSize:9,fontWeight:600,color:r.htfSignal==='LONG'?'#26a69a88':'#ef535088',background:r.htfSignal==='LONG'?'#26a69a11':'#ef535011',padding:'2px 5px',borderRadius:4,border:`1px solid ${r.htfSignal==='LONG'?'#26a69a33':'#ef535033'}`}} title={`${r.higherTf} timeframe signal`}>{r.higherTf} {r.htfSignal}</span>}
        {/* Confirmation badge */}
        <span style={{fontSize:9,fontWeight:700,color:r.confirmColor||'#787b86',background:(r.confirmColor||'#787b86')+'18',padding:'2px 6px',borderRadius:4,border:`1px solid ${r.confirmColor||'#787b86'}44`,letterSpacing:'0.3px'}}>
          {r.confirmation==='CONFIRMED'?'✓ CONFIRMED':r.confirmation==='PROBABLE'?'~ PROBABLE':r.confirmation==='DIVERGING'?'⚡ DIVERGING':r.confirmation==='NEUTRAL'?'NEUTRAL':'✗ WEAK'}
        </span>
        {/* NN badge — shown when model is trained */}
        {r.nnSignal&&<span title={`Neural Net: ${r.nnConf}% confidence`} style={{fontSize:9,fontWeight:700,color:r.nnSignal===r.signal?'#ab47bc':'#ff9800',background:r.nnSignal===r.signal?'#ab47bc18':'#ff980018',padding:'2px 5px',borderRadius:4,border:`1px solid ${r.nnSignal===r.signal?'#ab47bc44':'#ff980044'}`}}>🧠{r.nnSignal}</span>}
        <span style={{fontSize:10,color:'#787b86'}}>{r.phase}</span>
        <span style={{fontSize:10,color:parseFloat(r.chg24)>=0?'#26a69a':'#ef5350',marginLeft:'auto'}}>{parseFloat(r.chg24)>=0?'+':''}{r.chg24}%</span>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:4,marginBottom:2}}>
        <div className="bias-bar-mini" style={{width:60}}>
          <div style={{position:'relative',height:'100%'}}>
            <div style={{position:'absolute',left:r.score>=0?'50%':`${50+r.score/2}%`,width:Math.abs(r.score)/2+'%',height:'100%',background:r.color,borderRadius:2}}/>
          </div>
        </div>
        <span style={{fontSize:9,color:'#787b86'}}>Conf {r.mlConf}%</span>
      </div>
      {r.topSignals&&r.topSignals.length>0&&(
        <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
          {r.topSignals.map((s,i)=>(
            <span key={i} style={{fontSize:9,color:s.value>0?'#26a69a':s.value<0?'#ef5350':'#787b86',background:'#1e222d',padding:'1px 5px',borderRadius:3}}>{s.name} {s.value>0?'+':''}{s.value}</span>
          ))}
        </div>
      )}
    </div>
  );

  const renderSection=(title,items,color,icon)=>(
    items.length>0&&(
      <div style={{marginBottom:4}}>
        <div style={{display:'flex',alignItems:'center',gap:4,padding:'4px 6px',fontSize:10,fontWeight:700,color,textTransform:'uppercase',letterSpacing:'.5px'}}>
          {icon} {title} <span style={{fontSize:9,fontWeight:400,color:'#787b86'}}>({items.length})</span>
        </div>
        {items.map(renderCard)}
      </div>
    )
  );

  return(
    <div style={{height:'100%',display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <div className="scan-controls">
        {/* Search assets with autocomplete */}
        <div style={{position:'relative'}}>
          <input placeholder="Search assets…" value={searchQ}
            onChange={e=>{setSearchQ(e.target.value);setSearchSuggs(getSuggs(e.target.value));setSearchSuggOpen(true);}}
            onFocus={()=>{if(searchQ)setSearchSuggOpen(true);}}
            onBlur={()=>setTimeout(()=>setSearchSuggOpen(false),150)}
            onKeyDown={e=>{if(e.key==='Escape'){setSearchSuggOpen(false);}}}
            style={{width:120}}/>
          {searchSuggOpen&&searchSuggs.length>0&&(
            <div style={{position:'absolute',top:'100%',left:0,zIndex:200,background:'#1e222d',border:'1px solid #2a2e39',borderRadius:4,minWidth:180,maxHeight:220,overflowY:'auto',boxShadow:'0 4px 16px #0008'}}>
              {searchSuggs.map(s=>(
                <div key={s.symbol} onMouseDown={()=>{setSearchQ(s.symbol);setSearchSuggOpen(false);setSearchSuggs([]);}}
                  style={{padding:'5px 10px',cursor:'pointer',display:'flex',alignItems:'center',gap:6,fontSize:11}}
                  onMouseEnter={e=>e.currentTarget.style.background='#2a2e39'}
                  onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                  <span style={{color:'#d1d4dc',fontWeight:700}}>{s.symbol}</span>
                  {s.name&&s.name!==s.symbol.split('/')[0]&&<span style={{color:'#787b86',fontSize:10}}>{s.name}</span>}
                </div>
              ))}
            </div>
          )}
        </div>
        {/* Add to watchlist with autocomplete */}
        <div style={{display:'flex',alignItems:'center',gap:2,position:'relative'}}>
          <div style={{position:'relative'}}>
            <input placeholder="Add to watchlist…" value={favInput}
              onChange={e=>{setFavInput(e.target.value);setFavSuggs(getSuggs(e.target.value));setFavSuggOpen(true);}}
              onFocus={()=>{if(favInput)setFavSuggOpen(true);}}
              onBlur={()=>setTimeout(()=>setFavSuggOpen(false),150)}
              onKeyDown={e=>{
                if(e.key==='Enter'&&favInput.trim()){addFavorite(favInput.trim().toUpperCase());setFavInput('');setFavSuggOpen(false);}
                if(e.key==='Escape')setFavSuggOpen(false);
              }}
              style={{width:130,background:'#131722',border:'1px solid #2a2e39',borderRadius:4,color:'#ffd600',fontSize:11,padding:'4px 8px',outline:'none'}}/>
            {favSuggOpen&&favSuggs.length>0&&(
              <div style={{position:'absolute',top:'100%',left:0,zIndex:200,background:'#1e222d',border:'1px solid #2a2e39',borderRadius:4,minWidth:180,maxHeight:220,overflowY:'auto',boxShadow:'0 4px 16px #0008'}}>
                {favSuggs.map(s=>(
                  <div key={s.symbol} onMouseDown={()=>{addFavorite(s.symbol);setFavInput('');setFavSuggOpen(false);setFavSuggs([]);}}
                    style={{padding:'5px 10px',cursor:'pointer',display:'flex',alignItems:'center',gap:6,fontSize:11}}
                    onMouseEnter={e=>e.currentTarget.style.background='#2a2e39'}
                    onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                    <span style={{color:'#ffd600',fontWeight:700}}>{s.symbol}</span>
                    {s.name&&s.name!==s.symbol.split('/')[0]&&<span style={{color:'#787b86',fontSize:10}}>{s.name}</span>}
                    <span style={{marginLeft:'auto',color:'#ffd60066',fontSize:10}}>★</span>
                  </div>
                ))}
              </div>
            )}
          </div>
          <button onClick={()=>{if(favInput.trim()){addFavorite(favInput.trim().toUpperCase());setFavInput('');setFavSuggOpen(false);}}}
            style={{background:'#ffd60022',border:'1px solid #ffd60044',borderRadius:4,color:'#ffd600',fontSize:10,fontWeight:700,padding:'4px 8px',cursor:'pointer'}}>★ Add</button>
        </div>
        <select value={scanType} onChange={e=>setScanType(e.target.value)}>
          <option value="crypto">Crypto 200+</option>
          <option value="stocks">Stocks Only</option>
          <option value="all">Crypto + Stocks</option>
        </select>
        <select value={filterTf} onChange={e=>setFilterTf(e.target.value)}>
          {TIMEFRAMES.map(t=><option key={t} value={t}>{t}</option>)}
        </select>
        {/* Scan limit — number of assets */}
        <div style={{display:'flex',alignItems:'center',gap:3}} title="How many assets to scan (1-500). Fewer = faster scan + less API load.">
          <span style={{fontSize:10,color:'#787b86'}}>📊</span>
          <input type="number" min="1" max="500" step="1" value={scanLimit}
            onChange={e=>{const v=Math.max(1,Math.min(500,parseInt(e.target.value)||1));setScanLimit(v);localStorage.setItem('smc_scan_limit',String(v));}}
            style={{width:52,background:'#131722',border:'1px solid #2a2e39',borderRadius:4,color:'#d1d4dc',fontSize:11,padding:'3px 6px',outline:'none',textAlign:'center'}}/>
          <span style={{fontSize:9,color:'#787b86'}}>assets</span>
        </div>
        {/* Rescan interval — minutes */}
        <div style={{display:'flex',alignItems:'center',gap:3}} title="Auto-rescan every N minutes (0.5-60). Lower = fresher data but more API calls.">
          <span style={{fontSize:10,color:'#787b86'}}>⏱</span>
          <input type="number" min="0.5" max="60" step="0.5" value={scanIntervalMin}
            onChange={e=>{const v=Math.max(0.5,Math.min(60,parseFloat(e.target.value)||0.5));setScanIntervalMin(v);localStorage.setItem('smc_scan_interval_min',String(v));}}
            style={{width:48,background:'#131722',border:'1px solid #2a2e39',borderRadius:4,color:'#d1d4dc',fontSize:11,padding:'3px 6px',outline:'none',textAlign:'center'}}/>
          <span style={{fontSize:9,color:'#787b86'}}>min</span>
        </div>
        <select value={sortBy} onChange={e=>setSortBy(e.target.value)}>
          <option value="score">Strongest Signal</option>
          <option value="bullish">Most Bullish</option>
          <option value="bearish">Most Bearish</option>
          <option value="change">24h Change</option>
          <option value="alpha">Alphabetical</option>
        </select>
        {/* Confirmation filter toggle buttons */}
        <div style={{display:'flex',gap:3,alignItems:'center'}}>
          {[
            {key:'all',       label:'All',           col:'#787b86', count:scanResults.length,   tip:'Show all signals'},
            {key:'CONFIRMED', label:'✓ Confirmed',   col:'#26a69a', count:confCounts.CONFIRMED, tip:'Current TF + Higher TF + Momentum + Micro all agree — safest trades'},
            {key:'PROBABLE',  label:'~ Probable',    col:'#ff9800', count:confCounts.PROBABLE,  tip:'TFs agree but momentum/micro slightly off — wait for extra confirmation'},
            {key:'WEAK',      label:'✗ Weak',         col:'#ef5350', count:confCounts.WEAK,      tip:'Only bias points direction — low conviction, skip or wait'},
            {key:'DIVERGING', label:'⚡ Diverging',   col:'#ab47bc', count:confCounts.DIVERGING, tip:'Current TF and Higher TF disagree — DO NOT TRADE, conflicting signals'},
          ].map(({key,label,col,count,tip})=>(
            <button key={key} onClick={()=>setFilterConf(key)} title={tip}
              style={{
                padding:'3px 8px',fontSize:10,fontWeight:700,cursor:'pointer',borderRadius:4,transition:'all .15s',
                background:filterConf===key?col+'28':'transparent',
                color:filterConf===key?col:'#787b86',
                border:`1px solid ${filterConf===key?col+'66':'#2a2e39'}`,
              }}>
              {label}{count>0?<span style={{marginLeft:4,fontSize:9,opacity:0.8,background:col+'22',borderRadius:8,padding:'0 4px'}}>{count}</span>:null}
            </button>
          ))}
        </div>
        <div style={{marginLeft:'auto'}} className="scan-status">
          {scanning&&<div style={{width:10,height:10,border:'2px solid #2962ff',borderTopColor:'transparent',borderRadius:'50%',animation:'spin 1s linear infinite'}}/>}
          {scanning?<span style={{color:'#ff9800'}}>Scanning {scanType==='crypto'?`${scanLimit} crypto`:scanType==='stocks'?'stocks':`${scanLimit} crypto+stocks`}…</span>:
            <span style={{color:'#26a69a'}}>✓ {scanResults.length} scanned</span>}
          {lastScan&&<span> · {lastScan.toLocaleTimeString()}</span>}
        </div>
      </div>
      {/* FAVORITES BAR */}
      {favorites.length>0&&(
        <div style={{display:'flex',alignItems:'center',gap:4,padding:'4px 12px',borderBottom:'1px solid #2a2e39',flexWrap:'wrap',background:'#1a1a2e'}}>
          <span style={{fontSize:10,fontWeight:700,color:'#ffd600',marginRight:4}}>★ Watchlist:</span>
          {favorites.map(f=>(
            <span key={f} style={{display:'inline-flex',alignItems:'center',gap:3,background:'#ffd60012',border:'1px solid #ffd60033',borderRadius:10,padding:'2px 8px',fontSize:10,color:'#ffd600'}}>
              {f}
              <span onClick={()=>removeFavorite(f)} style={{cursor:'pointer',color:'#ffd60088',fontSize:12,lineHeight:1}} title="Remove">×</span>
            </span>
          ))}
        </div>
      )}
      <div className="scanner-grid" style={{flex:1,overflow:'auto'}}>
        {/* FAVORITES RESULTS (shown at top of bullish side if any) */}
        {/* BULLISH SIDE */}
        <div className="scan-section">
          <div className="scan-header">
            <span style={{color:'#26a69a',fontWeight:700,fontSize:13}}>▲ Bullish Signals</span>
            <span style={{fontSize:10,color:'#787b86'}}>{bullish.length} assets</span>
          </div>
          <div className="scan-cards">
            {/* Favorite results pinned at top */}
            {(()=>{const favResults=displayed.filter(r=>favorites.includes(r.symbol)&&r.score>=0);return favResults.length>0?renderSection('★ Watchlist',favResults,'#ffd600','★'):null;})()}
            {!scanning&&bullish.length===0&&<p style={{padding:16,textAlign:'center',color:'#787b86',fontSize:11}}>No bullish signals found</p>}
            {renderSection('Strong Bullish (>+60)',strongBull,'#26a69a','🟢')}
            {renderSection('Moderate (+30 to +60)',modBull,'#26a69a','🟡')}
            {renderSection('Mild (0 to +30)',mildBull,'#787b86','⚪')}
          </div>
        </div>
        {/* BEARISH SIDE */}
        <div className="scan-section">
          <div className="scan-header">
            <span style={{color:'#ef5350',fontWeight:700,fontSize:13}}>▼ Bearish Signals</span>
            <span style={{fontSize:10,color:'#787b86'}}>{bearish.length} assets</span>
          </div>
          <div className="scan-cards">
            {/* Favorite results pinned at top */}
            {(()=>{const favResults=displayed.filter(r=>favorites.includes(r.symbol)&&r.score<0);return favResults.length>0?renderSection('★ Watchlist',favResults,'#ffd600','★'):null;})()}
            {!scanning&&bearish.length===0&&<p style={{padding:16,textAlign:'center',color:'#787b86',fontSize:11}}>No bearish signals found</p>}
            {renderSection('Strong Bearish (<-60)',strongBear,'#ef5350','🔴')}
            {renderSection('Moderate (-30 to -60)',modBear,'#ef5350','🟡')}
            {renderSection('Mild (-30 to 0)',mildBear,'#787b86','⚪')}
          </div>
        </div>
      </div>
      <div style={{padding:'6px 12px',borderTop:'1px solid #2a2e39',display:'flex',justifyContent:'space-between',fontSize:10,color:'#787b86',flexShrink:0}}>
        <span>Scanning {scanType==='stocks'?'top 30 stocks':scanType==='crypto'?'200+ crypto':'crypto + stocks'} · {filterTf} timeframe</span>
        <span>Auto-refresh every 2 min · Click card to view chart</span>
      </div>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
const App=()=>{
  const[activeTab,setActiveTab]=useState('chart'); // 'chart' | 'scanner'
  const[symbol,setSymbol]=useState('BTC/USDT');
  const[tf,setTf]=useState('1h');
  const[candles,setCandles]=useState(null);
  const[setup,setSetup]=useState(null);
  const[nd,setNd]=useState(null);
  const[livePrice,setLivePrice]=useState(null);
  const[loading,setLoading]=useState(false);
  const[error,setError]=useState(null);
  const[wsStatus,setWsStatus]=useState('connecting');
  const[showSearch,setShowSearch]=useState(false);
