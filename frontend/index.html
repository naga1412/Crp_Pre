<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMC Pro — Crypto & Stock Analyzer</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script>
  tailwind.config = {
    theme: { extend: {
      fontFamily: { sans: ['Inter','sans-serif'] },
      colors: {
        tv:      '#131722',
        tvpanel: '#1e222d',
        tvbord:  '#2a2e39',
        tvsub:   '#787b86',
        primary: '#2962ff',
        bull:    '#26a69a',
        bear:    '#ef5350',
      }
    }}
  }
</script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#131722;color:#d1d4dc;font-family:'Inter',sans-serif;overflow:hidden}
  ::-webkit-scrollbar{width:4px;height:4px}
  ::-webkit-scrollbar-track{background:#131722}
  ::-webkit-scrollbar-thumb{background:#2a2e39;border-radius:4px}

  /* Symbol search modal */
  .search-modal{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:flex-start;justify-content:center;padding-top:60px}
  .search-box{background:#1e222d;border:1px solid #2a2e39;border-radius:8px;width:580px;max-height:72vh;display:flex;flex-direction:column;overflow:hidden}
  .search-input{background:transparent;border:none;outline:none;color:#d1d4dc;font-size:16px;padding:14px 16px;border-bottom:1px solid #2a2e39;width:100%}
  .search-result{display:flex;align-items:center;padding:9px 16px;cursor:pointer;gap:12px;transition:background .15s}
  .search-result:hover{background:#2a2e39}
  .badge{font-size:10px;padding:2px 6px;border-radius:3px;font-weight:600}
  .badge-crypto{background:#2962ff22;color:#2962ff}
  .badge-stock{background:#26a69a22;color:#26a69a}
  .badge-etf{background:#ff980022;color:#ff9800}
  .badge-commodity{background:#ffd60022;color:#ffd600}
  .badge-index{background:#ab47bc22;color:#ab47bc}

  /* Accordion */
  .acc-header{display:flex;justify-content:space-between;align-items:center;padding:9px 12px;cursor:pointer;border-radius:6px;transition:background .15s;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:#787b86}
  .acc-header:hover{background:#2a2e39}
  .acc-body{padding:0 4px 8px}

  /* Pulse animations */
  .pulse-bull{animation:pBull 2s infinite}
  .pulse-bear{animation:pBear 2s infinite}
  @keyframes pBull{0%{box-shadow:0 0 0 0 rgba(38,166,154,.4)}70%{box-shadow:0 0 0 8px rgba(38,166,154,0)}100%{box-shadow:0 0 0 0 rgba(38,166,154,0)}}
  @keyframes pBear{0%{box-shadow:0 0 0 0 rgba(239,83,80,.4)}70%{box-shadow:0 0 0 8px rgba(239,83,80,0)}100%{box-shadow:0 0 0 0 rgba(239,83,80,0)}}

  /* Summary table */
  .sum-table{width:100%;border-collapse:collapse;font-size:11px}
  .sum-table td{padding:5px 8px;border-bottom:1px solid #2a2e39}
  .sum-table td:first-child{color:#787b86;white-space:nowrap;width:40%}
  .sum-table td:last-child{color:#d1d4dc;font-weight:500}

  /* News panel */
  .news-item{padding:8px 4px;border-bottom:1px solid #2a2e39;cursor:pointer;transition:background .15s}
  .news-item:hover{background:#13172288}
  .nbull{background:#26a69a22;color:#26a69a;font-size:9px;padding:2px 5px;border-radius:3px;font-weight:700}
  .nbear{background:#ef535022;color:#ef5350;font-size:9px;padding:2px 5px;border-radius:3px;font-weight:700}
  .nneutral{background:#787b8622;color:#787b86;font-size:9px;padding:2px 5px;border-radius:3px;font-weight:700}
  .nmacro{background:#ff980022;color:#ff9800;font-size:9px;padding:2px 5px;border-radius:3px;font-weight:600}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

const API = 'http://127.0.0.1:8000';
const WS  = 'ws://127.0.0.1:8000';

// ── tiny helpers ────────────────────────────────────────────────────────────
const TIMEFRAMES = ['1m','5m','15m','1h','4h','1d','1w'];

function smartDec(p){
  if(!p||p<=0)return 2;
  if(p<0.000001)return 8; if(p<0.00001)return 8; if(p<0.0001)return 8;
  if(p<0.001)return 7;    if(p<0.01)return 6;     if(p<0.1)return 5;
  if(p<1)return 4;        if(p<100)return 3;       if(p<10000)return 2;
  return 1;
}
function fmtPrice(v,d){
  if(v==null)return '—';
  d = Math.min(d??2, 8);
  return Number(v).toLocaleString(undefined,{minimumFractionDigits:d,maximumFractionDigits:d});
}
function clsDir(dir){return dir==='Bullish'?'text-bull':'text-bear'}

// UTC-safe timestamp parser: handles "2024-04-12 19:00:00" (space, no Z) → ms
const tsToSec = ts => {
  const s = String(ts).replace(' ','T');
  return Math.floor(new Date(s.endsWith('Z')?s:s+'Z').getTime()/1000);
};

// ── Accordion section ────────────────────────────────────────────────────────
function Section({title, icon, children, open:defOpen=true}){
  const [open,setOpen]=useState(defOpen);
  return(
    <div className="mb-1">
      <div className="acc-header" onClick={()=>setOpen(!open)}>
        <span>{icon} {title}</span>
        <span style={{fontSize:9}}>{open?'▲':'▼'}</span>
      </div>
      {open&&<div className="acc-body">{children}</div>}
    </div>
  );
}

// ── Small stat tile ─────────────────────────────────────────────────────────
function Tile({label,value,color}){
  return(
    <div className="bg-[#131722] rounded p-2">
      <p className="text-[10px] text-tvsub mb-0.5">{label}</p>
      <p className={`text-xs font-semibold ${color||'text-white'}`}>{value||'—'}</p>
    </div>
  );
}

// ── Category colours ─────────────────────────────────────────────────────────
const CAT_COLORS = {
  'FED / RATES':    '#ff9800',
  'WAR / GEO':      '#f44336',
  'CRYPTO REG':     '#2962ff',
  'EARNINGS':       '#26a69a',
  'MACRO / ECONOMY':'#ab47bc',
  'CRYPTO MARKET':  '#00bcd4',
  'STOCK MARKET':   '#8bc34a',
  'MARKET NEWS':    '#787b86',
};

function NewsItem({item}){
  const sentColor = item.sentiment==='bullish'?'#26a69a':item.sentiment==='bearish'?'#ef5350':'#787b86';
  const catColor  = CAT_COLORS[item.category]||'#787b86';
  const impactLbl = item.impact_label||'';
  return(
    <div className="news-item" onClick={()=>item.url&&window.open(item.url,'_blank','noopener,noreferrer')}>
      {/* Row 1: category + sentiment + impact */}
      <div style={{display:'flex',alignItems:'center',gap:4,marginBottom:3,flexWrap:'wrap'}}>
        <span style={{fontSize:9,fontWeight:700,padding:'1px 5px',borderRadius:3,
                      background:catColor+'22',color:catColor}}>
          {item.category}
        </span>
        <span className={item.sentiment==='bullish'?'nbull':item.sentiment==='bearish'?'nbear':'nneutral'}>
          {item.sentiment==='bullish'?'▲ BULL':item.sentiment==='bearish'?'▼ BEAR':'● NEUT'}
        </span>
        {impactLbl==='HIGH'&&(
          <span style={{fontSize:9,fontWeight:700,padding:'1px 5px',borderRadius:3,
                        background:'#ff000022',color:'#ff5252',border:'1px solid #ff525244'}}>
            🔴 HIGH IMPACT
          </span>
        )}
        {impactLbl==='MEDIUM'&&(
          <span style={{fontSize:9,fontWeight:700,padding:'1px 5px',borderRadius:3,
                        background:'#ff980022',color:'#ff9800'}}>
            🟡 MED
          </span>
        )}
        <span style={{fontSize:9,color:'#787b86',marginLeft:'auto',textAlign:'right'}}>{item.source}</span>
      </div>
      {/* Row 2: headline */}
      <p style={{fontSize:11,color:'#d1d4dc',lineHeight:1.45,marginBottom:3}}>{item.headline}</p>
      {/* Row 3: time + impact pct */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <span style={{fontSize:10,color:'#787b86'}}>
          {new Date(item.timestamp).toLocaleString(undefined,
            {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})}
        </span>
        {item.impact_pct>0&&(
          <span style={{fontSize:10,fontWeight:600,color:sentColor}}>
            ~{item.impact_pct}% impact
          </span>
        )}
      </div>
    </div>
  );
}

// ── News Panel component ─────────────────────────────────────────────────────
function NewsPanel({newsData}){
  const [activeTab, setActiveTab] = useState('ALL');

  if(!newsData) return(
    <p style={{fontSize:11,color:'#787b86',padding:'6px 4px'}}>Loading news…</p>
  );

  const allNews      = newsData.news      || [];
  const symbolNews   = newsData.symbol_news|| [];
  const highImpact   = newsData.high_impact|| [];
  const overall      = newsData.overall_sentiment || {};
  const catSummary   = newsData.category_summary  || {};

  if(allNews.length===0)
    return <p style={{fontSize:11,color:'#787b86',padding:'6px 4px'}}>No news available — check back soon.</p>;

  // All unique categories present
  const allCats = ['ALL','HIGH IMPACT','SYMBOL',...Object.keys(CAT_COLORS)].filter(c=>{
    if(c==='ALL') return true;
    if(c==='HIGH IMPACT') return highImpact.length>0;
    if(c==='SYMBOL') return symbolNews.length>0;
    return catSummary[c]?.count > 0;
  });

  const displayNews = activeTab==='ALL'        ? allNews
                    : activeTab==='HIGH IMPACT' ? highImpact
                    : activeTab==='SYMBOL'      ? symbolNews
                    : allNews.filter(n=>n.category===activeTab);

  const labelColor = overall.label==='Risk-ON'?'#26a69a':overall.label==='Risk-OFF'?'#ef5350':'#787b86';

  return(
    <div>
      {/* Overall sentiment bar */}
      <div style={{display:'flex',alignItems:'center',gap:6,padding:'4px 2px 8px',flexWrap:'wrap'}}>
        <span style={{fontSize:11,fontWeight:700,color:labelColor,
                      background:labelColor+'18',padding:'3px 10px',borderRadius:12,
                      border:`1px solid ${labelColor}44`}}>
          {overall.label==='Risk-ON'?'🟢':overall.label==='Risk-OFF'?'🔴':'⚪'} {overall.label}
        </span>
        <span style={{fontSize:10,color:'#26a69a'}}>▲ {overall.bullish}</span>
        <span style={{fontSize:10,color:'#ef5350'}}>▼ {overall.bearish}</span>
        <span style={{fontSize:10,color:'#787b86'}}>● {overall.neutral}</span>
        <span style={{fontSize:9,color:'#787b86',marginLeft:'auto'}}>
          {allNews.length} stories
        </span>
      </div>

      {/* Category tabs */}
      <div style={{display:'flex',gap:3,flexWrap:'wrap',padding:'0 0 8px',borderBottom:'1px solid #2a2e39',marginBottom:6}}>
        {allCats.map(cat=>{
          const active = activeTab===cat;
          const cc = cat==='ALL'?'#2962ff':cat==='HIGH IMPACT'?'#f44336':cat==='SYMBOL'?'#ff9800':CAT_COLORS[cat]||'#787b86';
          return(
            <button key={cat} onClick={()=>setActiveTab(cat)}
              style={{fontSize:9,fontWeight:600,padding:'2px 7px',borderRadius:10,border:'none',
                      cursor:'pointer',
                      background: active ? cc : cc+'18',
                      color: active ? '#fff' : cc}}>
              {cat}
              {catSummary[cat]&&<span style={{marginLeft:3,opacity:.7}}>({catSummary[cat].count})</span>}
              {cat==='HIGH IMPACT'&&<span style={{marginLeft:3,opacity:.7}}>({highImpact.length})</span>}
              {cat==='SYMBOL'&&<span style={{marginLeft:3,opacity:.7}}>({symbolNews.length})</span>}
            </button>
          );
        })}
      </div>

      {/* News list */}
      {displayNews.length===0
        ? <p style={{fontSize:11,color:'#787b86',padding:'4px'}}>No news in this category.</p>
        : displayNews.map((item,i)=><NewsItem key={i} item={item}/>)
      }

      <p style={{fontSize:9,color:'#787b86',padding:'6px 2px 0'}}>
        Sources: CNBC · Yahoo Finance · MarketWatch · CoinDesk · Google News · {new Date(newsData.fetched_at).toLocaleTimeString()}
      </p>
    </div>
  );
}

// ── Main App ─────────────────────────────────────────────────────────────────
const App=()=>{
  // state
  const [symbol,setSymbol]         = useState('BTC/USDT');
  const [timeframe,setTimeframe]   = useState('1h');
  const [data,setData]             = useState(null);
  const [setup,setSetup]           = useState(null);
  const [newsData,setNewsData]     = useState(null);
  const [livePrice,setLivePrice]   = useState(null);
  const [loading,setLoading]       = useState(false);
  const [error,setError]           = useState(null);
  const [showSearch,setShowSearch] = useState(false);
  const [query,setQuery]           = useState('');
  const [searchCat,setSearchCat]   = useState('');      // separate from text query
  const [futureCount,setFutureCount] = useState('');    // '' = use default from TF
  const [wsStatus,setWsStatus]     = useState('connecting');
  const [allMeta,setAllMeta]       = useState([]);
  const [prevClose,setPrevClose]   = useState(null);

  // chart refs
  const chartRef       = useRef(null);
  const chartInst      = useRef(null);
  const candleSeries   = useRef(null);
  const volumeSeries   = useRef(null);
  const wsRef          = useRef(null);
  const searchInputRef = useRef(null);

  // ── chart init ──────────────────────────────────────────────────────────
  useEffect(()=>{
    if(!chartRef.current||chartInst.current) return;
    const chart = LightweightCharts.createChart(chartRef.current,{
      width:  chartRef.current.clientWidth,
      height: chartRef.current.clientHeight,
      layout:{ background:{type:'solid',color:'#131722'}, textColor:'#787b86' },
      grid:{ vertLines:{color:'#1e222d'}, horzLines:{color:'#1e222d'} },
      crosshair:{ mode:LightweightCharts.CrosshairMode.Normal },
      rightPriceScale:{ borderColor:'#2a2e39' },
      timeScale:{ borderColor:'#2a2e39', timeVisible:true, secondsVisible:false },
    });
    chartInst.current = chart;

    candleSeries.current = chart.addCandlestickSeries({
      upColor:'#26a69a', downColor:'#ef5350',
      borderUpColor:'#26a69a', borderDownColor:'#ef5350',
      wickUpColor:'#26a69a',   wickDownColor:'#ef5350',
    });

    volumeSeries.current = chart.addHistogramSeries({
      priceFormat:{type:'volume'},
      priceScaleId:'vol',
      color:'#26a69a44',
    });
    chart.priceScale('vol').applyOptions({ scaleMargins:{top:0.82,bottom:0} });

    const resize=()=>{
      if(chartInst.current&&chartRef.current)
        chartInst.current.applyOptions({width:chartRef.current.clientWidth,height:chartRef.current.clientHeight});
    };
    window.addEventListener('resize',resize);
    return()=>{window.removeEventListener('resize',resize);chart.remove();chartInst.current=null};
  },[]);

  // ── render candles when data/news changes ───────────────────────────────
  useEffect(()=>{
    if(!data?.length||!candleSeries.current) return;
    const dec = smartDec(data[data.length-1]?.close);
    const minMove = parseFloat((1/Math.pow(10,Math.min(dec,8))).toFixed(Math.min(dec,8)));

    candleSeries.current.applyOptions({
      priceFormat:{type:'price',precision:Math.min(dec,8),minMove}
    });

    const hist = data.map(c=>({
      time:  tsToSec(c.timestamp),
      open:  +c.open, high:+c.high, low:+c.low, close:+c.close,
    })).filter(c=>c.open&&c.high&&c.low&&c.close);

    // projected candles — timestamps anchored to last real candle (no gap)
    const TF_SECS = {'1m':60,'3m':180,'5m':300,'15m':900,'30m':1800,
      '1h':3600,'2h':7200,'4h':14400,'6h':21600,'8h':28800,'12h':43200,
      '1d':86400,'3d':259200,'1w':604800};
    const delta = TF_SECS[timeframe] || 3600;
    const lastRealTime = hist[hist.length-1]?.time || 0;
    const maxFuture = futureCount!==''&&!isNaN(parseInt(futureCount))
      ? Math.max(0,parseInt(futureCount)) : undefined;
    const future = (setup?.future_candles||[])
      .slice(0, maxFuture)
      .map((c,i)=>({
        time:  lastRealTime + delta * (i + 1),
        open:  +c.open, high:+c.high, low:+c.low, close:+c.close,
        color:'rgba(255,200,0,.7)', borderColor:'#FFC800', wickColor:'#FFC800',
      })).filter(c=>c.open&&c.high&&c.low&&c.close);

    const merged=[...hist,...future].sort((a,b)=>a.time-b.time);
    candleSeries.current.setData(merged);
    chartInst.current.timeScale().scrollToRealTime();

    // volume
    const volData = data.map(c=>({
      time:  tsToSec(c.timestamp),
      value: +c.volume||0,
      color: +c.close>=+c.open?'rgba(38,166,154,.4)':'rgba(239,83,80,.4)',
    })).filter(c=>c.value>0);
    volumeSeries.current.setData(volData);

    // markers: BOS, FVG, predicted candle start, news events
    const markers=[];
    data.forEach(c=>{
      const t=tsToSec(c.timestamp);
      if(c.bullish_break) markers.push({time:t,position:'belowBar',color:'#26a69a',shape:'arrowUp',  text:'BOS↑'});
      if(c.bearish_break) markers.push({time:t,position:'aboveBar',color:'#ef5350',shape:'arrowDown',text:'BOS↓'});
      if(c.bullish_fvg)   markers.push({time:t,position:'belowBar',color:'#2962ff',shape:'circle',   text:'FVG↑'});
      if(c.bearish_fvg)   markers.push({time:t,position:'aboveBar',color:'#ef5350',shape:'circle',   text:'FVG↓'});
    });
    if(future.length>0)
      markers.push({time:future[0].time,position:'aboveBar',color:'#FFC800',shape:'arrowDown',text:'Predicted'});

    // News event markers (snap to nearest available candle time)
    const newsList = newsData?.news || [];
    if(newsList.length>0){
      const chartTimes = new Set(merged.map(c=>c.time));
      newsList.forEach(n=>{
        if(!n.timestamp) return;
        const nt = Math.floor(new Date(n.timestamp).getTime()/1000);
        // Find closest chart bar within ±2 candles
        let closest = null, minDiff = Infinity;
        for(const t of chartTimes){
          const diff = Math.abs(t - nt);
          if(diff < minDiff && diff <= delta * 2){ minDiff=diff; closest=t; }
        }
        if(closest!=null){
          markers.push({
            time:     closest,
            position: n.sentiment==='bullish'?'belowBar':'aboveBar',
            color:    n.sentiment==='bullish'?'#26a69a':n.sentiment==='bearish'?'#ef5350':'#787b86',
            shape:    'square',
            text:     n.category==='macro'?'📰M':'📰',
          });
        }
      });
    }

    // Sort markers by time (required by LightweightCharts)
    markers.sort((a,b)=>a.time-b.time);
    candleSeries.current.setMarkers(markers);

    if(hist.length>0) setPrevClose(hist[hist.length-1].close);
  },[data,setup,newsData,futureCount]);

  // ── WebSocket real-time ─────────────────────────────────────────────────
  useEffect(()=>{
    if(wsRef.current){ wsRef.current.close(); wsRef.current=null; }
    setWsStatus('connecting');

    let dead = false;
    const connect = ()=>{
      if(dead) return;
      const enc = encodeURIComponent(symbol);
      const ws  = new WebSocket(`${WS}/ws/${enc}?timeframe=${timeframe}`);
      wsRef.current = ws;

      ws.onopen  = ()=>setWsStatus('live');
      ws.onclose = ()=>{ setWsStatus('reconnecting'); if(!dead) setTimeout(connect,3000); };
      ws.onerror = ()=>{ setWsStatus('error'); };

      ws.onmessage=(e)=>{
        try{
          const msg=JSON.parse(e.data);
          if(msg.type==='price_update'){
            setLivePrice(msg.price);
            const t=Math.floor((msg.timestamp||0)/1000);
            if(t>0&&candleSeries.current){
              candleSeries.current.update({time:t,open:msg.open,high:msg.high,low:msg.low,close:msg.close});
              volumeSeries.current?.update({time:t,value:msg.volume||0,
                color:msg.close>=msg.open?'rgba(38,166,154,.4)':'rgba(239,83,80,.4)'});
            }
          }
        }catch(_){}
      };
    };
    connect();
    return()=>{ dead=true; try{ wsRef.current?.close(); }catch(_){} };
  },[symbol,timeframe]);

  // ── fetch REST data ─────────────────────────────────────────────────────
  const fetchAll = useCallback(async(sym,tf,quiet=false)=>{
    if(!quiet) setLoading(true);
    try{
      const [dRes,sRes]=await Promise.all([
        fetch(`${API}/api/market/data?symbol=${encodeURIComponent(sym)}&timeframe=${tf}&limit=1000`),
        fetch(`${API}/api/analysis/trade-setup?symbol=${encodeURIComponent(sym)}&timeframe=${tf}`),
      ]);
      if(!dRes.ok) throw new Error((await dRes.json().catch(()=>({}))).detail||`HTTP ${dRes.status}`);
      if(!sRes.ok) throw new Error((await sRes.json().catch(()=>({}))).detail||`HTTP ${sRes.status}`);
      const [dj,sj]=await Promise.all([dRes.json(),sRes.json()]);
      setData(dj.data);
      setSetup(sj.setup);
      setError(null);
      // Fetch news separately (non-blocking — don't fail on news error)
      fetch(`${API}/api/news?symbol=${encodeURIComponent(sym)}`)
        .then(r=>r.ok?r.json():null)
        .then(j=>{ if(j) setNewsData(j); })
        .catch(()=>{});
    }catch(err){
      setError(err.message);
    }finally{
      if(!quiet) setLoading(false);
    }
  },[]);

  // ── symbols meta for search ─────────────────────────────────────────────
  useEffect(()=>{
    fetch(`${API}/api/market/symbols`)
      .then(r=>r.json())
      .then(j=>setAllMeta(j.meta||[]))
      .catch(()=>{});
  },[]);

  // ── initial load + 30s data refresh ────────────────────────────────────
  useEffect(()=>{
    fetchAll(symbol,timeframe);
    const id=setInterval(()=>fetchAll(symbol,timeframe,true),30000);
    return()=>clearInterval(id);
  },[symbol,timeframe]);

  // ── 60s news-only refresh (near real-time headlines) ────────────────────
  useEffect(()=>{
    const pollNews=()=>{
      fetch(`${API}/api/news?symbol=${encodeURIComponent(symbol)}`)
        .then(r=>r.ok?r.json():null)
        .then(j=>{ if(j) setNewsData(j); })
        .catch(()=>{});
    };
    const nid=setInterval(pollNews,60000);
    return()=>clearInterval(nid);
  },[symbol]);

  // ── search focus ────────────────────────────────────────────────────────
  useEffect(()=>{ if(showSearch) setTimeout(()=>searchInputRef.current?.focus(),50); },[showSearch]);

  // ── search filter (type-category + text query are independent) ──────────
  const filtered = useMemo(()=>{
    const q=(query||'').toUpperCase().trim();
    let pool = searchCat
      ? allMeta.filter(s=>s.type===searchCat)
      : allMeta;
    if(!q) return pool.slice(0,100);
    return pool.filter(s=>
      s.symbol.toUpperCase().includes(q)||s.name?.toUpperCase().includes(q)
    ).slice(0,100);
  },[query,searchCat,allMeta]);

  const selectSym=(sym)=>{
    setShowSearch(false);setQuery('');setSearchCat('');
    setSymbol(sym);
  };
  const changeTimeframe=(tf)=>{ setTimeframe(tf); fetchAll(symbol,tf); };

  // ── derived values ──────────────────────────────────────────────────────
  const price    = livePrice ?? setup?.current_price ?? null;
  const dec      = setup?.decimals ?? smartDec(price??0);
  const mtf      = setup?.mtf_prediction;
  const chg      = price && prevClose ? price - prevClose : null;
  const chgPct   = chg && prevClose ? (chg/prevClose*100) : null;
  const chgPos   = chg != null ? chg >= 0 : null;

  // Macro sentiment from news
  const overall    = newsData?.overall_sentiment || {};
  const macroLabel = overall.label || (newsData ? 'Neutral' : '');
  const macroColor = macroLabel==='Risk-ON'?'#26a69a':macroLabel==='Risk-OFF'?'#ef5350':'#787b86';
  const highImpactCount = (newsData?.high_impact||[]).length;

  // ── render ──────────────────────────────────────────────────────────────
  return(
    <div style={{height:'100vh',display:'flex',flexDirection:'column',background:'#131722'}}>

      {/* ── HEADER ── */}
      <header style={{height:46,display:'flex',alignItems:'center',gap:8,padding:'0 12px',
                      borderBottom:'1px solid #2a2e39',background:'#1e222d',flexShrink:0}}>
        {/* Logo */}
        <span style={{color:'#2962ff',fontWeight:700,fontSize:14,marginRight:4}}>⚡ SMC</span>

        {/* Symbol button */}
        <button onClick={()=>setShowSearch(true)}
          style={{display:'flex',alignItems:'center',gap:6,background:'#131722',
                  border:'1px solid #2a2e39',borderRadius:4,padding:'4px 10px',
                  color:'#d1d4dc',cursor:'pointer',fontSize:13,fontWeight:600}}>
          {symbol}
          <span style={{fontSize:9,color:'#787b86'}}>▼</span>
        </button>

        {/* Live price */}
        {price!=null&&(
          <span style={{fontSize:14,fontWeight:700,color:chgPos===false?'#ef5350':chgPos?'#26a69a':'#d1d4dc'}}>
            {fmtPrice(price,dec)}
          </span>
        )}
        {chgPct!=null&&(
          <span style={{fontSize:11,color:chgPos?'#26a69a':'#ef5350'}}>
            {chgPos?'+':''}{chgPct.toFixed(2)}%
          </span>
        )}

        {/* Macro pulse */}
        {macroLabel&&(
          <span style={{fontSize:10,color:macroColor,background:macroColor+'18',
                        padding:'2px 7px',borderRadius:10,border:`1px solid ${macroColor}44`,cursor:'pointer'}}>
            📰 {macroLabel}{highImpactCount>0?` · 🔴${highImpactCount}`:''}
          </span>
        )}

        <div style={{flex:1}}/>

        {/* Future candle count input */}
        <div style={{display:'flex',alignItems:'center',gap:4,background:'#131722',
                     border:'1px solid #2a2e39',borderRadius:4,padding:'2px 6px'}}>
          <span style={{fontSize:10,color:'#787b86',whiteSpace:'nowrap'}}>🕯 Candles:</span>
          <input
            type="number" min="0" max="200"
            value={futureCount}
            onChange={e=>setFutureCount(e.target.value)}
            placeholder="auto"
            style={{width:46,background:'transparent',border:'none',outline:'none',
                    color:'#FFC800',fontSize:11,fontWeight:600,textAlign:'center'}}
          />
        </div>

        {/* Timeframes */}
        <div style={{display:'flex',gap:2,background:'#131722',border:'1px solid #2a2e39',
                     borderRadius:4,padding:2}}>
          {TIMEFRAMES.map(tf=>(
            <button key={tf} onClick={()=>changeTimeframe(tf)}
              style={{padding:'3px 8px',borderRadius:3,border:'none',cursor:'pointer',
                      fontSize:11,fontWeight:500,
                      background:timeframe===tf?'#2962ff':'transparent',
                      color:timeframe===tf?'#fff':'#787b86'}}>
              {tf}
            </button>
          ))}
        </div>

        {/* Status dot */}
        <div style={{display:'flex',alignItems:'center',gap:4,fontSize:10,color:'#787b86'}}>
          <div style={{width:6,height:6,borderRadius:'50%',
                       background:error?'#ef5350':
                                  wsStatus==='live'?'#26a69a':
                                  wsStatus==='reconnecting'?'#ff9800':'#787b86'}}/>
          {error?'Error':wsStatus==='live'?'Live':wsStatus==='reconnecting'?'Reconnecting…':'Connecting…'}
        </div>
      </header>

      {/* ── MAIN WORKSPACE ── */}
      <div style={{flex:1,display:'flex',overflow:'hidden'}}>

        {/* Chart */}
        <div style={{flex:1,position:'relative'}}>
          {loading&&(
            <div style={{position:'absolute',inset:0,background:'rgba(19,23,34,.8)',
                         zIndex:10,display:'flex',alignItems:'center',justifyContent:'center',
                         flexDirection:'column',gap:12}}>
              <div style={{width:32,height:32,border:'3px solid #2962ff',
                           borderTopColor:'transparent',borderRadius:'50%',animation:'spin 1s linear infinite'}}/>
              <span style={{color:'#787b86',fontSize:12}}>Loading {symbol} {timeframe}…</span>
            </div>
          )}
          <div ref={chartRef} style={{width:'100%',height:'100%'}}/>
        </div>

        {/* ── ANALYSIS PANEL ── */}
        <div style={{width:340,borderLeft:'1px solid #2a2e39',background:'#1e222d',
                     overflowY:'auto',flexShrink:0,padding:'8px 6px'}}>

          {/* Error */}
          {error&&(
            <div style={{background:'#ef535015',border:'1px solid #ef535040',
                         borderRadius:6,padding:'8px 12px',marginBottom:8,fontSize:11}}>
              <span style={{color:'#ef5350'}}>⚠ {error}</span>
            </div>
          )}

          {!setup?(
            <div style={{height:'100%',display:'flex',alignItems:'center',
                         justifyContent:'center',color:'#787b86',fontSize:12,textAlign:'center',padding:24}}>
              Select a symbol and click a timeframe to load analysis.
            </div>
          ):(
            <>
              {/* Signal badge */}
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',
                           padding:'6px 8px 10px'}}>
                <div>
                  <p style={{fontSize:11,color:'#787b86'}}>Trade Signal</p>
                  <p style={{fontSize:13,fontWeight:700,color:'#d1d4dc',marginTop:2}}>{symbol} · {timeframe}</p>
                </div>
                <span className={setup.signal==='LONG'?'pulse-bull':'pulse-bear'}
                  style={{padding:'4px 14px',borderRadius:20,fontSize:12,fontWeight:700,
                          background:setup.signal==='LONG'?'#26a69a22':'#ef535022',
                          color:setup.signal==='LONG'?'#26a69a':'#ef5350',
                          border:`1px solid ${setup.signal==='LONG'?'#26a69a55':'#ef535055'}`}}>
                  {setup.signal}
                </span>
              </div>

              {/* ── STEP 1-3: HTF Bias ── */}
              <Section title="HTF Bias & Structure" icon="📊">
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:4,marginBottom:6}}>
                  <Tile label="HTF Bias"   value={mtf?.htf_bias}   color={clsDir(mtf?.htf_bias)}/>
                  <Tile label="Phase"      value={mtf?.phase}/>
                  <Tile label="Confidence" value={mtf?.confidence}
                    color={mtf?.confidence==='High'?'text-bull':mtf?.confidence==='Medium'?'text-yellow-400':'text-bear'}/>
                  <Tile label="Condition"  value={mtf?.condition}/>
                </div>
                {/* Bias bar */}
                <div style={{display:'flex',alignItems:'center',gap:6,padding:'4px 4px'}}>
                  <span style={{fontSize:10,color:'#787b86',minWidth:28}}>Bull</span>
                  <div style={{flex:1,height:5,background:'#2a2e39',borderRadius:3,overflow:'hidden'}}>
                    <div style={{height:'100%',borderRadius:3,
                                 background:'linear-gradient(90deg,#26a69a,#2962ff)',
                                 width:`${mtf?.bullish_score_pct||50}%`}}/>
                  </div>
                  <span style={{fontSize:10,color:'#787b86',minWidth:28,textAlign:'right'}}>Bear</span>
                </div>
                <p style={{fontSize:10,color:'#787b86',padding:'4px 4px 0'}}>
                  {mtf?.bullish_score_pct}% bull · {mtf?.bearish_score_pct}% bear
                </p>
                {/* MTF Consistency */}
                {mtf?.mtf_consistency&&(
                  <div style={{marginTop:6,padding:'5px 8px',borderRadius:5,
                               background: mtf.mtf_consistency==='ALIGNED'?'#26a69a11':'#ff980011',
                               border:`1px solid ${mtf.mtf_consistency==='ALIGNED'?'#26a69a33':'#ff980033'}`}}>
                    <span style={{fontSize:10,fontWeight:600,
                      color:mtf.mtf_consistency==='ALIGNED'?'#26a69a':'#ff9800'}}>
                      TF Consistency: {mtf.mtf_consistency}
                    </span>
                  </div>
                )}
              </Section>

              {/* ── STEP 4: Next Candle ── */}
              <Section title="Next Candle Prediction" icon="🕯">
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:4,marginBottom:6}}>
                  <Tile label={`${timeframe} Type`}      value={mtf?.next_candle_type}/>
                  <Tile label={`${timeframe} Direction`} value={mtf?.next_candle_direction}
                    color={clsDir(mtf?.next_candle_direction)}/>
                  <Tile label="Body Size"  value={mtf?.next_candle_body}/>
                  <Tile label="Alignment"  value={mtf?.alignment}
                    color={mtf?.alignment==='YES'?'text-bull':'text-bear'}/>
                </div>
                <p style={{fontSize:10,color:'#787b86',padding:'0 4px'}}>Wicks: {mtf?.next_candle_wicks}</p>
                {mtf?.alignment==='NO'&&(
                  <p style={{fontSize:10,color:'#ef5350',padding:'4px 4px 0'}}>⚠ {mtf?.alignment_note}</p>
                )}
                {/* 1H candle */}
                {mtf?.nc_1h&&(
                  <div style={{marginTop:6,padding:'6px 8px',background:'#131722',borderRadius:6}}>
                    <p style={{fontSize:10,color:'#787b86',marginBottom:4}}>1H Candle</p>
                    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                      <span style={{fontSize:11,color:'#d1d4dc'}}>{mtf.nc_1h.type}</span>
                      <span style={{fontSize:10,fontWeight:600,
                                    color:mtf.nc_1h.direction==='Bullish'?'#26a69a':'#ef5350'}}>
                        {mtf.nc_1h.direction} · {mtf.nc_1h.body}
                      </span>
                    </div>
                  </div>
                )}
              </Section>

              {/* ── STEP 5: Trade Setup ── */}
              <Section title="Trade Setup" icon="🎯">
                <div style={{padding:'4px 8px 8px',background:'#131722',borderRadius:6,marginBottom:6,
                             borderLeft:`3px solid ${setup.signal==='LONG'?'#26a69a':'#ef5350'}`}}>
                  <p style={{fontSize:10,color:'#787b86',marginBottom:4}}>Entry Zone</p>
                  <p style={{fontSize:14,fontWeight:700,fontFamily:'monospace',color:'#d1d4dc'}}>
                    {fmtPrice(setup.entry_zone?.[0],dec)} – {fmtPrice(setup.entry_zone?.[1],dec)}
                  </p>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:4,marginBottom:4}}>
                  <div style={{background:'#131722',borderRadius:6,padding:'6px 8px',
                               border:'1px solid #26a69a33'}}>
                    <p style={{fontSize:10,color:'#26a69a',fontWeight:600}}>TP 1</p>
                    <p style={{fontSize:12,fontFamily:'monospace',color:'#d1d4dc',marginTop:2}}>
                      {fmtPrice(setup.take_profit_1,dec)}
                    </p>
                    <p style={{fontSize:10,color:'#787b86',marginTop:1}}>{setup.rr_ratio_tp1} R:R</p>
                  </div>
                  <div style={{background:'#131722',borderRadius:6,padding:'6px 8px',
                               border:'1px solid #2962ff33'}}>
                    <p style={{fontSize:10,color:'#2962ff',fontWeight:600}}>TP 2</p>
                    <p style={{fontSize:12,fontFamily:'monospace',color:'#d1d4dc',marginTop:2}}>
                      {fmtPrice(setup.take_profit_2,dec)}
                    </p>
                    <p style={{fontSize:10,color:'#787b86',marginTop:1}}>{setup.rr_ratio_tp2} R:R</p>
                  </div>
                </div>
                <div style={{background:'#131722',borderRadius:6,padding:'6px 8px',
                             border:'1px solid #ef535033',marginBottom:4}}>
                  <p style={{fontSize:10,color:'#ef5350',fontWeight:600}}>Stop Loss</p>
                  <p style={{fontSize:12,fontFamily:'monospace',color:'#d1d4dc',marginTop:2}}>
                    {fmtPrice(setup.stop_loss,dec)}
                  </p>
                </div>
                <div style={{display:'flex',justifyContent:'space-between',
                             padding:'6px 8px',background:'#131722',borderRadius:6,marginBottom:4}}>
                  <span style={{fontSize:11,color:'#787b86'}}>Leverage</span>
                  <span style={{fontSize:11,fontWeight:700,color:'#2962ff'}}>{setup.leverage_suggested}x</span>
                </div>
                {setup.pattern&&(
                  <div style={{padding:'6px 8px',background:'#2962ff11',borderRadius:6,
                               border:'1px solid #2962ff22',textAlign:'center'}}>
                    <p style={{fontSize:10,color:'#2962ff',fontWeight:600,marginBottom:2}}>
                      Pattern {setup.pattern_confidence?`(${setup.pattern_confidence})`:''}
                    </p>
                    <p style={{fontSize:11,color:'#d1d4dc'}}>{setup.pattern}</p>
                    {setup.pattern_bias&&(
                      <p style={{fontSize:10,marginTop:2,
                        color:setup.pattern_bias==='Bullish'?'#26a69a':setup.pattern_bias==='Bearish'?'#ef5350':'#787b86'}}>
                        Bias: {setup.pattern_bias}
                      </p>
                    )}
                  </div>
                )}
                {setup.setup_invalidation&&(
                  <p style={{fontSize:10,color:'#787b86',padding:'6px 4px 0'}}>
                    ⚠ Invalidated: {setup.setup_invalidation}
                  </p>
                )}
              </Section>

              {/* ── Key Levels ── */}
              <Section title="Key Levels" icon="📍" open={false}>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:4}}>
                  <div>
                    <p style={{fontSize:10,color:'#26a69a',fontWeight:600,padding:'4px 8px'}}>BSL (Stop Hunt↑)</p>
                    {(mtf?.bsl||[]).length>0
                      ? mtf.bsl.map((l,i)=>(
                          <p key={i} style={{fontSize:11,fontFamily:'monospace',color:'#d1d4dc',padding:'2px 8px'}}>
                            {fmtPrice(l,dec)}
                          </p>))
                      : <p style={{fontSize:10,color:'#787b86',padding:'2px 8px'}}>None detected</p>
                    }
                  </div>
                  <div>
                    <p style={{fontSize:10,color:'#ef5350',fontWeight:600,padding:'4px 8px'}}>SSL (Stop Hunt↓)</p>
                    {(mtf?.ssl||[]).length>0
                      ? mtf.ssl.map((l,i)=>(
                          <p key={i} style={{fontSize:11,fontFamily:'monospace',color:'#d1d4dc',padding:'2px 8px'}}>
                            {fmtPrice(l,dec)}
                          </p>))
                      : <p style={{fontSize:10,color:'#787b86',padding:'2px 8px'}}>None detected</p>
                    }
                  </div>
                </div>
                {/* Per-TF key levels */}
                {(mtf?.tf_analyses||[]).filter(a=>!a.error).map(a=>(
                  <div key={a.tf} style={{marginTop:6,padding:'6px 8px',background:'#131722',borderRadius:6}}>
                    <p style={{fontSize:10,fontWeight:600,color:'#787b86',marginBottom:4}}>{a.tf.toUpperCase()}</p>
                    <div style={{display:'flex',justifyContent:'space-between',fontSize:10,flexWrap:'wrap',gap:4}}>
                      <span style={{color:'#ef5350'}}>R: {fmtPrice(a.resistance,dec)}</span>
                      <span style={{color:'#26a69a'}}>S: {fmtPrice(a.support,dec)}</span>
                      {a.bullish_ob_level&&<span style={{color:'#2962ff'}}>OB↑: {fmtPrice(a.bullish_ob_level,dec)}</span>}
                    </div>
                  </div>
                ))}
              </Section>

              {/* ── Liquidation Heatmap ── */}
              <Section title="Liquidation Heatmap" icon="🔥" open={false}>
                {(setup.liquidation_zones||[]).map((z,i)=>(
                  <div key={i} style={{display:'flex',justifyContent:'space-between',
                                       padding:'5px 8px',borderBottom:'1px solid #2a2e39',fontSize:11}}>
                    <span style={{color:'#787b86',minWidth:70}}>{z.leverage}x</span>
                    <span style={{color:'#ef5350',fontFamily:'monospace'}}>
                      ↑ {fmtPrice(z.short_liquidation,dec)}
                    </span>
                    <span style={{color:'#26a69a',fontFamily:'monospace'}}>
                      ↓ {fmtPrice(z.long_liquidation,dec)}
                    </span>
                  </div>
                ))}
              </Section>

              {/* ── NEWS & MACRO IMPACT ── */}
              <Section title={`News & Macro Impact${highImpactCount>0?` 🔴${highImpactCount}`:''}`} icon="📰" open={true}>
                <NewsPanel newsData={newsData}/>
              </Section>

              {/* ── STEP 6: Summary Table ── */}
              <Section title="Analysis Summary" icon="📋">
                <table className="sum-table">
                  <tbody>
                    <tr><td>Asset</td><td>{symbol}</td></tr>
                    <tr><td>HTF Bias</td>
                        <td style={{color:mtf?.htf_bias==='Bullish'?'#26a69a':
                                         mtf?.htf_bias==='Bearish'?'#ef5350':'#d1d4dc'}}>
                          {mtf?.htf_bias}
                        </td></tr>
                    <tr><td>TF Consistency</td>
                        <td style={{color:mtf?.mtf_consistency==='ALIGNED'?'#26a69a':'#ff9800',fontSize:10}}>
                          {mtf?.mtf_consistency||'—'}
                        </td></tr>
                    <tr><td>Structure</td><td>{mtf?.condition}</td></tr>
                    <tr><td>Phase</td><td>{mtf?.phase}</td></tr>
                    <tr><td>{timeframe} Candle</td>
                        <td>{mtf?.next_candle_type} — <span style={{color:mtf?.next_candle_direction==='Bullish'?'#26a69a':'#ef5350'}}>{mtf?.next_candle_direction}</span></td></tr>
                    <tr><td>1H Candle</td>
                        <td>{mtf?.nc_1h?.type||'—'} — <span style={{color:mtf?.nc_1h?.direction==='Bullish'?'#26a69a':'#ef5350'}}>{mtf?.nc_1h?.direction||'—'}</span></td></tr>
                    <tr><td>Alignment</td>
                        <td style={{color:mtf?.alignment==='YES'?'#26a69a':'#ef5350'}}>
                          {mtf?.alignment}
                        </td></tr>
                    <tr><td>Confidence</td><td>{mtf?.confidence}</td></tr>
                    <tr><td>Entry</td>
                        <td>{fmtPrice(setup.entry_zone?.[0],dec)} – {fmtPrice(setup.entry_zone?.[1],dec)}</td></tr>
                    <tr><td>Stop Loss</td><td>{fmtPrice(setup.stop_loss,dec)}</td></tr>
                    <tr><td>TP1 / TP2</td>
                        <td>{fmtPrice(setup.take_profit_1,dec)} / {fmtPrice(setup.take_profit_2,dec)}</td></tr>
                    <tr><td>R:R</td><td>{setup.rr_ratio_tp1} / {setup.rr_ratio_tp2}</td></tr>
                    <tr><td>Pattern</td><td>{setup.pattern}</td></tr>
                    <tr><td>Macro Sentiment</td>
                        <td style={{color:macroColor}}>{macroLabel||'—'}{highImpactCount>0?` (${highImpactCount} high impact)`:''}</td></tr>
                    <tr><td>ATR</td><td>{setup.atr}</td></tr>
                    <tr><td>RSI</td><td>{setup.rsi}</td></tr>
                  </tbody>
                </table>
                <p style={{fontSize:9,color:'#787b86',padding:'8px 4px 0'}}>
                  ⚠ Technical analysis only. Not financial advice.
                </p>
              </Section>

              {/* Projection note */}
              {(setup.future_candles?.length>0)&&(
                <p style={{fontSize:10,color:'#FFC800',padding:'4px 8px',marginTop:4}}>
                  ● {setup.future_candles.length} neon yellow predicted candles on chart
                </p>
              )}

              {/* Footer */}
              <div style={{padding:'8px 8px 4px',borderTop:'1px solid #2a2e39',marginTop:8,
                           display:'flex',justifyContent:'space-between',fontSize:10,color:'#787b86'}}>
                <span>Binance REST + yFinance</span>
                <span>⚡ 30s refresh</span>
              </div>
            </>
          )}
        </div>
      </div>

      {/* ── SYMBOL SEARCH MODAL ── */}
      {showSearch&&(
        <div className="search-modal" onClick={()=>{setShowSearch(false);setSearchCat('');setQuery('');}}>
          <div className="search-box" onClick={e=>e.stopPropagation()}>
            <div style={{display:'flex',alignItems:'center',padding:'0 16px',borderBottom:'1px solid #2a2e39'}}>
              <span style={{color:'#787b86',marginRight:8}}>🔍</span>
              <input ref={searchInputRef} className="search-input"
                placeholder="Search — BTC/USDT, AAPL, GLD, GC=F, ^GSPC…"
                value={query} onChange={e=>setQuery(e.target.value)}
                onKeyDown={e=>{
                  if(e.key==='Enter'&&filtered.length>0) selectSym(filtered[0].symbol);
                  if(e.key==='Escape') setShowSearch(false);
                }}
              />
              <button onClick={()=>{setShowSearch(false);setSearchCat('');setQuery('');}}
                style={{background:'none',border:'none',color:'#787b86',cursor:'pointer',fontSize:16}}>✕</button>
            </div>

            {/* Category tabs */}
            <div style={{display:'flex',gap:0,padding:'6px 12px',borderBottom:'1px solid #2a2e39',flexWrap:'wrap'}}>
              {[
                {label:'All',         val:''},
                {label:'Crypto',      val:'crypto'},
                {label:'Stocks',      val:'stock'},
                {label:'ETFs',        val:'etf'},
                {label:'Commodities', val:'commodity'},
                {label:'Indices',     val:'index'},
              ].map(({label,val})=>(
                <button key={label}
                  style={{padding:'3px 9px',borderRadius:4,border:'none',cursor:'pointer',
                          fontSize:10,marginRight:3,marginBottom:2,
                          background:searchCat===val?'#2962ff':'transparent',
                          color:searchCat===val?'#fff':'#787b86'}}
                  onClick={()=>setSearchCat(val)}>
                  {label}
                </button>
              ))}
            </div>

            <div style={{overflowY:'auto',flex:1}}>
              {filtered.length===0&&(
                <p style={{padding:16,color:'#787b86',fontSize:12,textAlign:'center'}}>
                  No results. Try any yFinance ticker (e.g. RELIANCE.NS, BTC-USD)
                </p>
              )}
              {filtered.map(s=>(
                <div key={s.symbol} className="search-result" onClick={()=>selectSym(s.symbol)}>
                  <span className={`badge badge-${s.type||'stock'}`}>{(s.type||'stock').toUpperCase()}</span>
                  <div style={{flex:1}}>
                    <p style={{fontSize:13,fontWeight:600,color:'#d1d4dc'}}>{s.symbol}</p>
                    {s.name&&<p style={{fontSize:11,color:'#787b86'}}>{s.name}</p>}
                  </div>
                  <span style={{fontSize:10,color:'#787b86'}}>{s.exchange}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* spin keyframe */}
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
